# Memoria de usuario y feedback (memsys3 dogfooding)
# ADR-020. Schema en memory/templates/memory-template.yaml.

metadata:
  ultima_actualizacion: "2026-05-07"
  file_version: "0.1.0"

principios_fundacionales:
  - id: "cdc"
    nombre: "Casualidad de Contexto (CDC)"
    definicion: |
      Lucidez agéntica generada por eventualidad del contexto de la sesión actual,
      y no por archivos canónicos (context.yaml, memory.yaml, project-status.yaml,
      adr.yaml). Es decir: que el agente "acierte" porque ha leído algo justo
      antes en esta sesión, no porque el sistema lo haya garantizado.
    rol_de_memsys3: |
      memsys3 ES una solución a la CDC. Su propósito es propiciar lucidez
      agéntica SOSTENIDA en el tiempo, garantizada por archivos canónicos,
      no fluctuante según el azar del contexto de cada sesión.
    implicacion_diseno: |
      Toda decisión de diseño (qué guardar, dónde, cuándo leer) debe evaluarse
      contra CDC: "¿esto reduce dependencia del azar del contexto, o la perpetúa?"
      Si una conducta deseable solo emerge cuando el agente "ha leído X justo antes",
      entonces X debe estar en un archivo canónico que se lea siempre (newSession,
      compile-context). Si solo emerge en una sesión específica, es CDC y hay que
      eliminarla.
    fecha: "2026-05-07"

  - id: "olvidan-que-olvidan"
    nombre: "Meta-amnesia agéntica: olvidan que olvidan"
    definicion: |
      Los agentes LLM operan con metacognición ausente sobre la efimeridad de su
      propio contexto de sesión. NO solo olvidan al cambiar de turno: NO SABEN
      que están olvidando. La conversación se "siente" continua aunque no lo sea.
      Por eso el comportamiento por defecto NO es canonizar lo que emerge — es
      proseguir, como si el insight ya estuviera guardado por el simple hecho de
      haberse pronunciado.
    consecuencia: |
      Reglas tipo "detecta candidatos canonizables" fallan en aislamiento porque
      presuponen una metacognición que el agente no tiene. Detectar requiere
      sentir la efimeridad, y la disposición por defecto es la opuesta (sentir
      continuidad).
    enfoque_correcto: |
      Reformular el DEFAULT mental, no añadir una tarea. Una invariante en
      main-agent.yaml del tipo: "Tu estado por defecto es el olvido. Cualquier
      cosa articulada en esta conversación que no esté en archivo canónico se
      está perdiendo en este momento. La continuidad sentida es ilusión del
      turno actual." Opera al nivel disposicional, no instrumental.
    relacion_con_cdc: |
      Este principio explica POR QUÉ existe la CDC operacionalmente, no solo
      como condición externa. La CDC es síntoma; la meta-amnesia es la causa
      agéntica subyacente. memsys3 ataca ambos niveles:
      - Sistémico: archivos canónicos (resuelve "olvidan").
      - Disposicional: framing de efimeridad (resuelve "olvidan que olvidan").
    fecha: "2026-05-08"
    relacionado: ["EXPLORATION-004 (canonización proactiva)", "PRINCIPLES.md #1 (Anti-CDC)"]

usuario:
  - nota: "Mantenedor principal de memsys3 (open source, github.com/iv0nis/memsys3). Trabaja en español. Prioriza agnosticismo de modelo y human-in-the-loop."
    fecha: "2026-05-07"

feedback:
  - regla: "No firmar commits/tags con Co-Authored-By: Claude"
    motivo: "Convención del proyecto. Defensa multi-capa en github.md (4 capas) tras incidente reunión 030226_1. Margen error histórico 70% LLM."
    fecha: "2026-05-07"
  - regla: "Antes de cualquier git commit/push/tag/merge/rebase, leer @memsys3/prompts/github.md"
    motivo: "github.md documenta workflow obligatorio (sin firma, AskUserQuestion para tag, verificación post-commit). Cargarlo solo cuando se va a operar git."
    fecha: "2026-05-07"
  - regla: "Main Agent NO ejecuta compile-context, solo sugiere endSession (con aviso si N≥5 sesiones sin compilar)"
    motivo: "ADR-008. Compilación en sesión cargada acumula tokens y sesga síntesis. Validación: intento 2026-03-08 revertido."
    fecha: "2026-05-07"
  - regla: "Main Agent y Context Agent NO modifican infraestructura (prompts/, agents/, memory/templates/)"
    motivo: "ADR-017. Solo /actualizar-memsys3 puede tocar archivos de infraestructura. En dogfooding (este repo) la restricción se quita por deadlock."
    fecha: "2026-05-07"

  - regla: "Test mental anti-CDC para cada decisión de diseño: '¿esto requiere que un agente fresco adivine, o le doy archivo canónico?'"
    motivo: "Operacionalización del principio CDC. Si una conducta deseable solo emerge cuando el agente 'ha leído X justo antes' en sesión, X debe estar en archivo canónico que se lea siempre (newSession, compile-context). Si solo emerge en sesión específica, es CDC y hay que eliminarla. Aplicable a: dónde guardar feedback nuevo, qué documentar en backlog/docs/, qué meter en PRINCIPLES.md, qué dejar implícito."
    fecha: "2026-05-07"

  - regla: "coordinacion_paralela / blocked_files_log.md aplica SOLO con paralelismo humano confirmado"
    motivo: "Multi-work es para agentes lanzados por humanos en paralelo (otra sesión Claude abierta simultáneamente por el mismo usuario u otro), NO para una sesión solitaria. Reservar locks 'por defensa' cuando trabajas solo añade ruido. Antes de invocar el sistema, confirmar con el usuario que va a operar otra sesión humana en paralelo. Clarificación canonizada por el usuario al revisar plan Frente 7 (2026-05-08)."
    fecha: "2026-05-08"

  - regla: "Plans deben cubrir explícitamente sub-pasos opcionales del scope, no solo el camino principal"
    motivo: |
      Feedback del usuario al revisar plan Frente 7 (2026-05-08): un plan que dice 'Test deploy.md Paso 2'
      deja fuera Pasos 8 (gitignore A/B) y 9 (MEMORY.md bridge), aunque pendientes prioritarios los
      mencionan. Reglas:
      (1) Inspección estática debe especificar el checklist concreto (ej: '4 items: launcher pattern,
          sync con frentes recientes, permisos, sobreescritura'), no decir 'coherencia con ADR-X' (vago).
      (2) Lectura crítica de un Paso debe cubrir TODA la lógica del paso, no solo la primera línea
          (ej: Paso 6.4.5 deprecation incluye sub-paso 1 'detectar deprecations' Y sub-paso 2 'huérfanos').
      (3) Cuando el agent prompt mencione pendientes prioritarios cubiertos, mapear cada uno a un test
          concreto en el plan (no asumir cobertura implícita).
    fecha: "2026-05-08"

  - regla: "Heurística de orquestación de forks (Agent sin subagent_type) para ahorrar contexto"
    motivo: |
      Tres casos:
      (1) Si la pregunta es '¿qué dice X en el código?' o requiere lectura/grep masivo → fork (Explore).
          Ejemplos: auditoría ADRs vs código, grep residualidad multi-archivo, inventario de scaffold.
      (2) Si la pregunta es '¿qué deberíamos hacer?' (diseño, conversación con usuario) → sesión principal.
          Forks sin contexto de la conversación producen trabajo genérico.
      (3) Si hay que leer >2 archivos largos solo para info puntual → fork.
      No forkear escritura de ADRs/templates/BLUEPRINTs (escribir ES la síntesis). Para BLUEPRINT-001
      Frente 2 (auditoría ADRs) y Frente 5 (residualidad) son candidatos claros a fork. Frentes 1, 6 a sesión principal.
    fecha: "2026-05-07"

