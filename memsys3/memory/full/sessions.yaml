          Documentada decisión arquitectónica de adoptar "Main Agent" como término estándar único.
          Razón: Deja espacio conceptual para agentes especializados futuros (Development Agent,
          Testing Agent, etc.) sin conflictos. Alternativas evaluadas: mantener Development Agent
          (descartado: conflicto futuro), sistema dual (descartado: over-engineering), Agent genérico
          (descartado: ambiguo). ADR completa con context, alternatives, consequences.

      - nombre: "IMPROVEMENT-006: Backlog item para depuración completa"
