    data: "2026-05-08"
    duracion: "~1.5h"
    peso: "alto"
    objetivo: |
      Cerrar el sexto frente del BLUEPRINT-001 (release v1.0): formalizar el rol de
      memsys3/ (instancia dogfooting) en el repo memsys3 e implementar protocolo
      anti-leak sistémico que cierre el vector IMPROVEMENT-008 (leak histórico
      dogfooting → distribuible). Distinto en perfil a frentes 2/3/5 (search-heavy):
      éste es decisión arquitectónica con tradeoffs reales, conversacional con el
      usuario.

    contexto_inicial: |
      Punto de partida (newSession 2026-05-08): Frentes 1-5 cerrados, branch master
      con working tree dirty (M en context.yaml/operations.log/memory.yaml +
      memory.yaml con principio "olvidan-que-olvidan" añadido por usuario fuera de
      sesión + EXPLORATION-004/PRINCIPLES.md/newSession.md ×2 modificados; 4
      untracked: agent6_prompt_frente6.txt como prompt de misión, multi_work.md y
      blocked_files_log.md como sistema de locks multi-agente catalán de origen
      CLIENT_A, ISSUE-027 sobre migrar principios_fundacionales de memory.yaml
      → PRINCIPLES.md). Disciplina de scope: ninguna de esas modificaciones se toca
      en este frente.

    que_es_va_fer:
      - "Plan mode con investigación previa: leídos PRINCIPLES.md, BLUEPRINT-001 item, plan_BLUEPRINT-001 sección Frente 6, informe_BLUEPRINT-001 §3.5"
      - "Hallazgo crítico anti-CDC: ADR-011 (que el prompt mencionaba como base a revisar) NO EXISTE — confirmado por ISSUE-024 del Frente 2 (010/011 son las dos ADRs ausentes). Reframing: ADR-025 NO es 'extensión de ADR-011' sino primera ADR formal sobre dogfooting versionado; la convención previa vivía solo en README:235-247"
      - "AskUserQuestion plan A/B/C: usuario eligió C (híbrido). Razones de fondo confirmadas: coherencia con deploy.md Paso 8 (memsys3 recomienda al usuario INCLUIR memsys3/), anti-CDC sistémico (la disciplina humana/agéntica ya falló en IMPROVEMENT-008), A subóptimo"
      - "AskUserQuestion mecanismos: 1+2 (hook pre-commit + auditoría comprobar_alineamiento). 3 (regla en actualizar.md) descartado: capa equivocada. 4 (CI check) descartado: no hay pipeline → ISSUE-028 abierto para futuro"
      - "Rotación pre-doc adr.yaml → adr_1.yaml (1994 líneas, 24 ADRs hasta ADR-024). Nuevo adr.yaml con ADR-025 + índice completo señalando archivo por ADR"
      - "ADR-025 escrita: contexto + decisión + 4 alternativas descartadas con razón + consecuencias + anclaje PRINCIPLES.md #2/#3/#4/#9 + relación con ADR-016 + nota explícita sobre no-extensión-de-ADR-011"
      - ".githooks/pre-commit creado (bash 21 líneas, agnóstico, exit=1 si detecta items [A-Z]+-[0-9]+-*.md en memsys3_templates/backlog/)"
      - "comprobar_alineamiento.md extendido con PASO 6.5 'Auditoría anti-leak': 2 checks bash (ls backlog + find memsys3_templates) y diagnóstico explícito"
      - "ISSUE-028 creado: plan para GitHub Action cuando se establezca CI, dos opciones (workflow propio vs reutilizar hook como script invocable)"
      - "README raíz: línea en sección Contribuciones con 'git config core.hooksPath .githooks' (activación una sola vez por dev)"
      - "BLUEPRINT-001-release-memsys3-v1.md: Frente 6 [x] con resumen completo. project-status.yaml: metadata + fase + ultima_feature + siguiente_milestone actualizados (6/8 → siguiente Frente 7)"
      - "Verificación end-to-end: hook activado, test positivo passed (TEST-999-leak.md → exit=1 con mensaje correcto, archivo limpiado), auditoría manual ejecutada → 0 hits"
      - "6 commits atómicos sin firma (defensa multi-capa funcionando): rotation+ADR025, hook, comprobar_alineamiento, ISSUE-028, README, blueprint+project-status"

    decisiones_tomadas:
      - "Opción C (híbrido) sobre A (statu quo) y B (.gitignore memsys3/): la disciplina ya falló (IMPROVEMENT-008), B es incoherente con la propia recomendación de memsys3 a usuarios"
