        tipo: "feature Claude opcional"
        proposito: "Pensamiento extendido para tareas complejas que requieren criterio inteligente, balance multi-factor, síntesis arquitectónica. Perfecto para compile-context.md"
        notas: "Específico Claude, otros modelos pueden no soportar. Fall back: subagent estándar (sigue mejor que duplicación)"

