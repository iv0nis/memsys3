      - "Frente 8 BLUEPRINT-001: Comunicación / release v1.0 (CHANGELOG, web memsys3.org placeholder, wiki sincronizada, tag v1.0.0)"
      - "Pendiente independiente: decidir destino de multi_work.md + blocked_files_log.md (migrar a memsys3/prompts/ tras agnostización + traducción, o prompts-dev/, o .gitignore)"
      - "Pendiente independiente: ejecutar ISSUE-027 (migrar principios_fundacionales de memory.yaml → PRINCIPLES.md)"
      - "Pendiente independiente: refresh de pendientes_prioritarios en project-status.yaml — stale"

    notas_adicionales: |
