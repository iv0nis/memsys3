      dogfooting ↔ distribuible. Formalizar y nombrar el criterio que decide qué
      necesita template y qué no, para que sea citable en futuras decisiones.

    contexto_inicial: |
      Punto de partida (newSession): Frente 3 cerrado y pusheado en sesión previa
      (commit c81f148). Branch master limpio, untracked irrelevantes
      (agent4_prompt_frente4.txt, blocked_files_log.md, multi_work.md). adr.yaml
      en 1843 líneas (margen). Pendiente prioritario 3 de project-status apuntaba
      explícitamente a este frente.
      Usuario instruyó: plan first vía ExitPlanMode + lectura obligatoria de 5
      archivos en orden + side-finding integrado si aparecía.

    highlights:
      - "Verificación 1:1 data ↔ template: 8/9 archivos data ya tenían template; único faltante operations.log (FEATURE-009)"
      - "operations-template.log creado en memsys3_templates/memory/templates/ + sync dogfooting (memsys3/memory/templates/)"
      - "ADR-024 documenta criterio **data-vs-as-is** con handle citable: 'un archivo necesita template si es data evolutiva del usuario; no si es infraestructura/docs canónicos versionados por /actualizar-memsys3'"
      - "Decisión extensión .log (no .yaml) para operations-template — espejar el data file (mismo patrón que informe-template.md espeja informe_*.md)"
      - "Side-finding sync: memsys3/memory/templates/context-template.yaml L3 'DevAI' → 'Main Agent' (ADR-015 brecha latente en dogfooting), L13 placeholder más informativo (sync forward desde distribuible)"
      - "Side-finding adicional fuera de scope Frente 4: 3 hits DevAgent en memsys3_templates/prompts/ (deploy.md L3 ya en ISSUE-026 + endSession.md L3/L7 + compile-context.md L299) — ampliado ISSUE-026 para que Frente 5 (residualidad) los recoja en bloque"
      - "Cierra pendiente prioritario 3 de project-status.yaml (operations-template). Milestone → Frente 5 (residualidad)"
      - "BLUEPRINT-001 marca [x] Frente 4 con resumen 1-línea"
      - "Commit atómico 6cd7f70 sin firma sin tag, pusheado limpio (verificación grep co-authored OK)"

    decisiones_tomadas:
      - decision: "Criterio data-vs-as-is con handle citable"
        justificacion: |
          Sin nombre formal, cada futura decisión sobre 'qué necesita template' redefiniría
          el criterio (CDC operativa). Nombrarlo una vez (ADR-024) crea léxico sistémico
          reutilizable. Patrón propuesto explícitamente por el usuario en planning.
        adr_relacionada: "024"
      - decision: "Extensión .log (no .yaml) para operations-template"
        justificacion: |
          Consistencia data ↔ template prima sobre coherencia contenido ↔ extensión.
          El archivo data es .log (FEATURE-009 lo fijó); el template lo espeja igual
          que informe-template.md espeja informe_*.md.
        adr_relacionada: "024"
      - decision: "No inflar Frente 4 con los hits DevAgent en prompts/"
        justificacion: |
          Disciplina de scope: Frente 4 es completitud de templates (memory/templates/),
          no auditoría general ADR-015. Los 3 hits adicionales detectados por grep son
          residualidad (Frente 5). Ampliado ISSUE-026 para que Frente 5 los recoja
          en bloque, sin perder trazabilidad.
        adr_relacionada: null
      - decision: "Sin tag (acumular hasta cierre BLUEPRINT-001)"
        justificacion: |
          Coherencia con línea Frentes 1-3 (sin tags intermedios). El tag llegará en
          Frente 8 cuando se cierre BLUEPRINT-001 → v1.0.0. AskUserQuestion ejecutado
          según regla dura github.md. Usuario eligió 'Sin tag por ahora (Recomendado)'.
        adr_relacionada: null

    proximos_pasos:
      - "Frente 5 (Eliminación de residualidad) — ISSUE-026 ampliado (3 hits DevAgent extra), grep catalán [àèéíòóúïü], referencias muertas viz/mind.md, archivos huérfanos. Sesión fresca recomendada (anti-CDC)."
      - "adr.yaml en 1994 líneas (margen ~6 líneas hasta 2000) — la próxima ADR cruzará el umbral. Considerar rotación adr.yaml → adr_1.yaml en próxima sesión que cree ADR (Escenario B pre-doc)."
      - "Recomendar al usuario abrir agente nuevo para Frente 5 (anti-CDC, plan + informe + ADR-024 son auto-suficientes)."

    notas_adicionales: |
      Anti-CDC operacional: la sesión arrancó cargando newSession.md + 5 archivos prescritos
      en orden (PRINCIPLES, BLUEPRINT, plan, informe Frente 2, ADR-023). El plan verbal
      del usuario fue redundante con esos archivos — confirma que la documentación canónica
      del frente era suficiente sin lucidez de sesión previa.

      Disciplina de scope demostrada: el grep detectó 4 hits totales de DevAgent en
      memsys3_templates/, pero solo 1 está en alcance Frente 4 (templates). Resistir la
      tentación de "ya que estamos, los arreglo todos" → Frente 5 los maneja en bloque
      con visión de residualidad completa (probablemente más hits catalán + viz/mind.md).

      Vocabulario sistémico nuevo: "criterio data-vs-as-is (ADR-024)" se incorpora al
      léxico del proyecto. Cualquier futura ADR/PRINCIPLES.md que enfrente la pregunta
      "¿esto necesita template?" puede citar ADR-024 sin redefinir.

  - id: "2026-05-07-blueprint001-frente3-scaffold-completo-deploy"
    titulo: "BLUEPRINT-001 Frente 3 ejecutado: scaffold completo en deploy + ADR-023 + EXPLORATION-004 commiteado"
    data: "2026-05-07"
    duracion: "~1.5h"
    peso: "alto"
    objetivo: "Cerrar la brecha del scaffold distribuible: definir inventario canónico, eliminar leak IMPROVEMENT-008 en memsys3_templates/backlog/, refactorizar deploy.md Paso 2 para usar memsys3_templates/memory/full/ como fuente única de archivos vacíos (eliminando heredocs divergentes). Cerrar el matiz semántico 'infraestructura vs datos según ubicación' en ADR-023. Smoke test del scaffold post-deploy."
    contexto_inicial: |
      Punto de partida (newSession): BLUEPRINT-001 Frente 2 cerrado en sesión previa
      (commit 245550e). Estaba pendiente Frente 3 según plan_BLUEPRINT-001.md.
      Branch master limpio, 2 untracked irrelevantes (blocked_files_log.md, multi_work.md)
      + 1 untracked relevante: memsys3/backlog/EXPLORATION-004-canonizacion-proactiva-agentes.md
      (articulado al final de la sesión anterior, sin commitear).
      Usuario indicó: commitear EXPLORATION-004 atómico ANTES de Frente 3 + plan first vía
      ExitPlanMode + leer plan + informe.
    highlights:
      - "EXPLORATION-004 (canonización proactiva anti-CDC meta) commiteado primero como árbol limpio (commit 294c620)"
      - "Plan articulado en plan mode con AskUserQuestion para variante de Opción B (B-simple aceptada: cp directo memsys3_templates/memory/full/* sin sufijo -empty)"
      - "Eliminado leak memsys3_templates/backlog/IMPROVEMENT-008-deploy-agnostico-memoria-antes-agente.md (commit aae28d5)"
      - "Saneado side-finding: 'Operations Log - memsys3' hardcoded en operations.log template → 'Operations Log' neutro"
      - "deploy.md Paso 2 refactorizado en AMBOS sitios (memsys3_templates/ + memsys3/ dogfooting): heredocs cat << EOF eliminados, cp directo + templates/*.md añadido (informe-template, plan-template) (commit a57edd1)"
      - "ADR-023 creada (153 líneas, índice incluido): inventario canónico + B-simple + alternativas A/B-explícita descartadas + matiz semántico incluido por sugerencia del usuario (commit 45a52ef)"
      - "Smoke test en mktemp -d: 19 archivos en scaffold post-deploy coinciden 1:1 con inventario canónico"
      - "4 commits atómicos sin firma Co-Authored-By, push a origin/master, sin tag (acumular hasta v1.0.0 al cerrar BLUEPRINT-001)"
    decisiones_clave:
      - decision: "Opción B-simple (cp directo) frente a B-explícita (sufijo *-empty.yaml en templates/)"
        motivo: "Los archivos en memsys3_templates/memory/full/ YA son los empty templates correctos (con # version: 0.1.0). Crear duplicados con sufijo -empty.yaml añade complejidad sin valor: 3 archivos nuevos + un rename en deploy.md."
        alternativas_descartadas: ["A statu quo (heredocs)", "B-explícita (-empty suffix)"]
      - decision: "Documentar matiz semántico 'misma forma física, distinta semántica según ubicación' en ADR-023 notes"
        motivo: "Sugerencia del usuario al revisar el plan. Cierra para siempre la confusión 'adr.yaml ¿es infraestructura o datos?' → depende de dónde esté: en memsys3_templates/ scaffold infraestructural; tras cp al destino, datos del usuario."
      - decision: "Sin tag para los 4 commits del Frente 3"
        motivo: "Coherente con la línea acumular para v1.0.0 al cerrar BLUEPRINT-001 Frente 8. Mantiene actualizar.md apuntando a v0.23.0."
    adr_relacionada: "ADR-023"
    gotchas:
      - tipo: "smoke-test"
        problema: "git clone --quiet --depth 1 file:///<repo> falla silenciosamente cuando el repo tiene commits locales no pusheados (--quiet oculta el error). Smoke test inicial dio inventario vacío sin mostrar causa."
        solucion: "Para validar cambios LOCALES, NO usar git clone — copiar directamente con cp -r memsys3_templates/ a tmpdir. Eliminar --quiet ayuda a ver el error real cuando se quiere reproducir el clone."
        criticidad: "media"
      - tipo: "leak-template"
        problema: "Aunque el leak macro (IMPROVEMENT-008.md) era el conocido, había un leak menor adicional: 'memsys3' hardcoded en el header de operations.log del template distribuible."
        solucion: "Heurística: cuando se sanee un leak en backlog/, grep paralelo en memsys3_templates/ por nombre del proyecto dogfooting puede destapar leaks análogos."
        criticidad: "baja"
    proximos_pasos:
      - "Frente 4 (Completitud de templates) en sesión fresca — agente nuevo lee plan + informe + ADR-023 para anti-CDC"
      - "Considerar rotación adr.yaml: ahora 1891 líneas (Escenario A flexible 1800-2000). Próxima sesión que añada ADR debería rotar primero"
      - "Resolver ISSUE-025 (link roto README:217) e ISSUE-026 (deploy.md DevAgent → Main Agent) antes de v1.0"
      - "EXPLORATION-004 sigue Propuesto — explorar Opción A (defensiva en endSession) cuando se priorice"
    archivos_modificados:
      - "memsys3/backlog/EXPLORATION-004-canonizacion-proactiva-agentes.md (nuevo, pre-Frente 3)"
      - "memsys3_templates/backlog/IMPROVEMENT-008-deploy-agnostico-memoria-antes-agente.md (eliminado)"
      - "memsys3_templates/memory/full/operations.log (header saneado)"
      - "memsys3_templates/prompts/deploy.md (refactor Paso 2)"
      - "memsys3/prompts/deploy.md (sync dogfooting)"
      - "memsys3/memory/full/adr.yaml (ADR-023 añadida + entry index)"
      - "memsys3/memory/project-status.yaml (Frente 3 completado, próximo Frente 4)"
    commits:
      - "294c620 docs(backlog): EXPLORATION-004 canonizacion proactiva (anti-CDC meta)"
      - "aae28d5 chore(templates): eliminar leak IMPROVEMENT-008 + sanear header operations.log"
      - "a57edd1 refactor(deploy): cp directo memory/full/ y templates/*.md (ADR-023)"
      - "45a52ef docs(adr,status): ADR-023 scaffold completo en deploy + Frente 3 completado"

  - id: "2026-05-07-blueprint001-frente2-auditoria-adrs"
    titulo: "BLUEPRINT-001 Frente 2 ejecutado: auditoría 20 ADRs vs código real (3 forks Explore en paralelo) + 3 ISSUEs"
    data: "2026-05-07"
    duracion: "~2h"
    peso: "alto"
    objetivo: "Verificar 1 a 1 que las ADRs aceptadas se respetan en prompts/agents/templates/scaffold, usando PRINCIPLES.md como vara de medir. Documentar brechas como ISSUEs. Foundational para confianza en el corpus ADR antes de release v1.0."

    highlights:
      - "Auditoría ejecutada con 3 forks Agent (subagent_type Explore) en paralelo, división por bloques: Fork A (ADRs 001-009), Fork B (ADRs 012-016), Fork C (ADRs 017-022). Cada fork read-only, output estructurado <500-800 palabras (asimetría: cumplidas 1 línea, brechas detalladas). Heurística orquestación documentada en memory.yaml feedback (sesión 2026-05-07 anterior) — primer caso de uso real validando la heurística."
      - "Conteo real corregido: 20 ADRs aceptadas (no 22 como decía blueprint inicial, no 21 como decía informe principal). ADRs 010-011 ausentes — skipped en numeración (verificado: no en adr.yaml ni rotados, no hay adr_1.yaml). Meta-finding documentado en ISSUE-024 (deuda histórica menor)."
      - "Cumplimiento global: 18/20 ADRs (90%). 0 brechas críticas. Ninguna bloquea release v1.0. Anclaje cruzado: cada uno de los 10 principios PRINCIPLES.md tiene al menos 1 ADR de respaldo — corpus coherente."
      - "Brechas accionables detectadas (2): ADR-007 — README.md raíz línea 217 linkea docs/UPDATE.md que NO existe en raíz repo (solo en memsys3/docs/ dogfooting). Lugar correcto: raíz repo, no scaffold (DEVELOPMENT/UPDATE son audiencia contribuidores/upgraders del repo, no usuarios desplegados). ADR-015 — deploy.md:3 contiene 'Tu (DevAgent)' en lugar de 'Main Agent' (escapó a la erradicación de sesión 2026-04-16)."
      - "Brecha ADR-021 detectada (leak IMPROVEMENT-008 en memsys3_templates/backlog/) NO se documenta como ISSUE separado — ya identificada en informe_BLUEPRINT-001.md §3.3 y será resuelta por Frente 3 (Scaffold completo). Anti-duplicación."
      - "Observación ADR-016 (README sin mención explícita jerarquía agnóstica templates→prompts→commands): NO ISSUE creado — PRINCIPLES.md ya formaliza el principio. Si se quiere reforzar el README es Frente 8 (comunicación), no brecha."
      - "Reporte canónico: memsys3/backlog/docs/informe_BLUEPRINT-001-auditoria.md (tabla maestra 20 ADRs + brechas detalladas + observaciones + meta-finding + anclaje cruzado a los 10 principios). Anti-CDC: agente futuro fresco puede consumir reporte sin necesidad de los transcripts efímeros de los forks."
      - "3 ISSUEs creados en memsys3/backlog/: ISSUE-024 (010-011 ausentes, baja, sin urgencia), ISSUE-025 (docs/UPDATE.md link roto, media, antes de v1.0.0), ISSUE-026 (deploy.md DevAgent → Main Agent, media, fix trivial 1 línea)."
      - "BLUEPRINT-001-release-memsys3-v1.md: Frente 2 marcado [x] con resumen + corrección '21 ADRs' → '20 ADRs (010-011 ausentes, ver ISSUE-024)' en sección Problema/Necesidad."
      - "project-status.yaml: ultima_feature actualizada con Frente 2 cierre, siguiente_milestone apunta a Frente 3 (Scaffold completo). Pendientes prioritarios reorganizados: prioridad 1 = Frente 3 + resolver ISSUE-025/026 antes v1.0.0."
      - "2 commits atómicos en master: (1) docs(sessions) deuda Frente 1 que quedó tras endSession del agente Frente 1, (2) docs(blueprint-001) Frente 2 auditoría + ISSUEs + entry endSession Frente 2. Verificado SIN Co-Authored-By en ambos. Sin tag (continuum BLUEPRINT — tag v1.0.0 al cierre Frente 8)."

    decisions:
      - tema: "División de trabajo: 3 forks paralelos vs lectura secuencial"
        decision: "3 forks Explore read-only en paralelo, división por bloques de ADRs. Síntesis en sesión principal."
        motivo: "Auditoría es búsqueda exhaustiva (20 ADRs × N archivos cada una). Lectura secuencial saturaría tokens en ~30K antes de completar. Forks devuelven síntesis estructurada (~500 palabras), reducción ~10× tokens en sesión principal. Caso paradigmático de la heurística documentada en memory.yaml feedback."

      - tema: "Conteo de ADRs: 22 (blueprint) vs 21 (informe) vs 20 (real)"
        decision: "20 ADRs aceptadas. 010-011 ausentes documentados como meta-finding (ISSUE-024 baja). NO renumerar."
        motivo: "Renumerar rompería referencias históricas en sessions.yaml, ADRs cruzadas y commits. La numeración no garantiza secuencialidad — convivir con el gap es preferible a romper trazabilidad."

      - tema: "Brecha ADR-021 (leak IMPROVEMENT-008): ISSUE separado vs cubierta por Frente 3"
        decision: "NO crear ISSUE separado. Anotada en informe de auditoría con referencia a Frente 3 que la abordará."
        motivo: "Ya identificada en informe principal §3.3. Crear ISSUE duplicaría el tracking. Frente 3 tiene scope definido para limpieza de scaffold."

      - tema: "Lugar correcto de DEVELOPMENT.md / UPDATE.md (ADR-007)"
        decision: "Raíz repo (docs/), NO scaffold distribuible (memsys3_templates/docs/). Documentado en ISSUE-025."
        motivo: "ADR-007 define audiencias: DEVELOPMENT.md = contribuidores del repo memsys3; UPDATE.md = quien actualiza memsys3 (también nivel repo, no nivel usuario desplegado). Un usuario desplegado no contribuye al desarrollo upstream — recibe el sistema, no lo evoluciona. El fork A propuso ubicación errónea (templates/docs/), corregida en síntesis."

      - tema: "Granularidad commits: 1 vs 2 atómicos"
        decision: "2 commits: (1) deuda Frente 1 endSession (sessions.yaml entry), (2) Frente 2 completo (informe + 3 ISSUEs + BLUEPRINT [x] + project-status + entry sessions Frente 2)."
        motivo: "Limpia el árbol antes de mezclar contextos. Cada commit revertible independientemente. Patrón identificado: endSession escribe DESPUÉS del commit principal del frente, generando deuda recurrente — registrar como gotcha del flow."

    issues_creados:
      - id: "ISSUE-024"
        titulo: "ADRs 010 y 011 ausentes — auditar si fueron descartadas o nunca creadas"
        prioridad: "Baja"
      - id: "ISSUE-025"
        titulo: "README.md raíz linkea docs/UPDATE.md y docs/DEVELOPMENT.md que no existen en raíz repo"
        prioridad: "Media"
      - id: "ISSUE-026"
        titulo: "deploy.md:3 usa DevAgent en lugar de Main Agent (brecha ADR-015)"
        prioridad: "Media"

    gotchas:
      - tipo: "gotcha"
        problema: "endSession escribe en sessions.yaml + project-status.yaml + BLUEPRINT [x] DESPUÉS del commit principal del frente, generando deuda recurrente sin commitear."
        solucion: "Patrón observado en Frente 1 → Frente 2. Estrategia: ejecutar endSession ANTES del commit final del frente para que el commit capture todo en un único snapshot. Si endSession ya se ejecutó después, usar commit 'puente' separado (docs(sessions)) antes de mezclar nuevos contextos."
        criticidad: "media"

    proximos_pasos:
      - "Ejecutar BLUEPRINT-001 Frente 3 (Scaffold completo en deploy) en sesión fresca anti-CDC. Plan en memsys3/backlog/docs/plan_BLUEPRINT-001.md. Resuelve brecha ADR-021 leak."
      - "Resolver ISSUE-025 (docs/UPDATE.md link roto) y ISSUE-026 (deploy.md DevAgent fix trivial) antes de v1.0.0 — naturalmente en Frente 8 o como pre-trabajo."
      - "context.yaml última compilación 2026-05-05. Tras Frente 2: 2 sesiones sin compilar (Frente 1 + Frente 2). Bajo umbral 5, no urgente. Compilar fresca tras 2-3 frentes más."

    referencias:
      - "memsys3/backlog/docs/informe_BLUEPRINT-001-auditoria.md (reporte canónico)"
      - "memsys3/backlog/BLUEPRINT-001-release-memsys3-v1.md (item)"
      - "memsys3/PRINCIPLES.md (vara de medir)"
      - "memsys3/memory/full/adr.yaml (corpus auditado)"

  - id: "2026-05-07-blueprint001-frente1-principles-md-adr022"
    titulo: "BLUEPRINT-001 Frente 1 ejecutado: PRINCIPLES.md canónico (10 principios) + ADR-022 + propagación deploy/actualizar"
    data: "2026-05-07"
    duracion: "~2h"
    peso: "alto"
    objetivo: "Ejecutar Frente 1 del BLUEPRINT-001 (release memsys3 v1.0): crear documento canónico de principios sistémicos eliminando dispersión actual. Foundational — define la vara para medir Frentes 2-7."

    highlights:
      - "Creado PRINCIPLES.md canónico con 10 principios sistémicos: 1.Anti-CDC (foundational, primero), 2.Agnosticismo IA, 3.Una sola carpeta, 4.Human-in-the-loop, 5.Criterio inteligente vs límites arbitrarios, 6.Templates como doc activa permanente, 7.file_version inmutable salvo /actualizar-memsys3, 8.Datos siempre preservados, 9.Separation of Concerns, 10.Restricciones infraestructura agents. Cada principio enlaza ADRs que lo formalizan."
      - "Arquitectura 'fuente única vs copias' implementada según decisión usuario: memsys3_templates/PRINCIPLES.md (SSoT, 164 líneas, file_version 0.1.0) + memsys3/PRINCIPLES.md (copia real dogfooting, idéntica) + PRINCIPLES.md raíz repo (stub corto pointer al template, descubrimiento OSS). Multi-plataforma sin symlinks."
      - "ADR-022 creada con context, decision, 3 alternativas descartadas (solo en raíz, 3 copias paralelas, symlinks), consecuencias positivas/negativas/impacto, notes con herencia explícita ADR-017 + ADR-018. Cierra el 'pendiente' anotado en notes de ADR-021 sobre PRINCIPLES.md canónico."
      - "Régimen infraestructura para PRINCIPLES.md: hereda ADR-017 (file_version inmutable salvo /actualizar-memsys3) + ADR-018 (sustitución diferencial). PRINCIPLES.md NO es datos, es infraestructura — sigue el mismo régimen que prompts/agents/templates."
      - "deploy.md Paso 2 actualizado: copia memsys3_templates/PRINCIPLES.md → memsys3/PRINCIPLES.md durante deployment inicial. Mensaje final lista PRINCIPLES.md como artefacto creado."
      - "actualizar.md Paso 6.6 NUEVO: sincronización PRINCIPLES.md en proyectos ya desplegados con sustitución diferencial (helper extract_md_version para formato HTML comment + reuse compare_versions del Paso 6.4). Sin esta lógica los proyectos antiguos NUNCA recibirían PRINCIPLES.md ni sus actualizaciones."
      - "newSession.md (templates + dogfooting): instrucción 'Lee @memsys3/PRINCIPLES.md si existe — referencia canónica de los principios sistémicos (ADR-022)' añadida tras lectura de README.md. Notas finales actualizadas."
      - "README.md raíz: nueva sección '📐 Principios' antes de 🤝 Contribuciones + bullet en '✨ Qué incluye'. memsys3_templates/memory/README.md: banner inicial enlazando PRINCIPLES.md."
      - "BLUEPRINT-001 Frente 1 marcado [x] completado. project-status.yaml: ultima_feature actualizada, siguiente_milestone apunta a Frente 2 (auditoría 22 ADRs vs código real usando PRINCIPLES.md como vara de medir)."
      - "3 commits atómicos pusheados a origin/master: feat(principles), feat(deploy,actualizar), chore(BLUEPRINT-001). Verificado SIN Co-Authored-By en ninguno (defensa 4 capas funcionando). Sin tag (decisión usuario: acumular más frentes antes de tagear)."

    decisions:
      - tema: "Distribución PRINCIPLES.md: solo raíz vs distribuible vs híbrido"
        decision: "Distribuible con fuente única en memsys3_templates/, propagación vía deploy/actualizar. Stub corto en raíz repo dev (descubrimiento OSS), copia real en dogfooting (representativo de proyecto desplegado). NO 3 copias paralelas mantenidas en paralelo."
        motivo: "Anti-CDC: usuarios externos deben tener acceso a los principios tras deploy. Si solo viviera en raíz, agente desplegado operaría sin saber qué principios rigen el sistema."
        adr_relacionada: "ADR-022"

      - tema: "PRINCIPLES.md como datos vs infraestructura"
        decision: "Infraestructura. Hereda ADR-017 (file_version inmutable) + ADR-018 (sustitución diferencial)."
        motivo: "El usuario NO edita PRINCIPLES.md por contrato — los principios evolucionan en upstream. Tratarlo como datos rompería el modelo de versionado independiente y abriría puerta a divergencia silenciosa por proyecto."
        adr_relacionada: "ADR-022"

      - tema: "Dogfooting: stub vs copia real en memsys3/PRINCIPLES.md"
        decision: "Copia real (idéntica al template). NO stub."
        motivo: "El dogfooting debe ser representativo de lo que recibe un proyecto desplegado. Stub solo en raíz del repo dev (que NO se distribuye)."

      - tema: "ADR-022 dentro o fuera del alcance del Frente 1"
        decision: "Dentro. Creación + documentación atómicas en mismo frente."
        motivo: "Evita dejar la decisión arquitectónica sin formalizar. Si Frente 2 (auditoría) detecta brecha, ADR-022 es referencia."

      - tema: "Granularidad commits"
        decision: "3 commits atómicos: (1) PRINCIPLES.md+ADR-022+integración newSession/READMEs, (2) deploy.md+actualizar.md propagación, (3) chore BLUEPRINT/project-status."
        motivo: "Navegabilidad histórica. Cada commit es revertible independientemente."

      - tema: "Tag v0.23.0 ahora vs sin tag"
        decision: "Sin tag por ahora. Acumular más frentes (2/3...) antes de tagear v0.23.0 minor."
        motivo: "Decisión del usuario. Reduce ruido de releases para BLUEPRINT-001."

    features_implementadas:
      - "PRINCIPLES.md canónico (3 ubicaciones: SSoT en templates, copia dogfooting, stub raíz)"
      - "ADR-022 con herencia explícita ADR-017 + ADR-018"
      - "deploy.md propaga PRINCIPLES.md (proyectos nuevos)"
      - "actualizar.md Paso 6.6 sincroniza PRINCIPLES.md vía sustitución diferencial (proyectos existentes)"
      - "newSession.md instruye carga PRINCIPLES.md (templates + dogfooting)"
      - "BLUEPRINT-001 Frente 1 completado (1/8)"
      - "Verificación end-to-end ejecutada (10 headers, CDC #1, copias bit-idénticas, links presentes, file_version OK)"

    archivos_modificados:
      nuevos:
        - "memsys3_templates/PRINCIPLES.md (164 líneas, fuente única, file_version 0.1.0)"
        - "memsys3/PRINCIPLES.md (copia real dogfooting, idéntica al template)"
        - "PRINCIPLES.md (raíz repo, stub corto pointer al template)"
      modificados_pares_dogfooding_y_templates:
        - "prompts/newSession.md (instrucción cargar PRINCIPLES.md tras README)"
        - "prompts/deploy.md (Paso 2 copia PRINCIPLES.md, mensaje final actualizado)"
        - "prompts/actualizar.md (Paso 6.6 nuevo sustitución diferencial PRINCIPLES.md, checklist final)"
      modificados_solo_dogfooding:
        - "memsys3/memory/full/adr.yaml (ADR-022 entry + entrada índice)"
        - "memsys3/backlog/BLUEPRINT-001-release-memsys3-v1.md (Frente 1 marcado [x])"
        - "memsys3/memory/project-status.yaml (metadata + ultima_feature + siguiente_milestone + pendiente prioridad 1)"
      modificados_solo_repo:
        - "README.md (sección 📐 Principios + bullet en Qué incluye)"
        - "memsys3_templates/memory/README.md (banner enlazando PRINCIPLES.md)"

    proximos_pasos:
      - "Frente 2 BLUEPRINT-001: auditoría 22 ADRs vs código real (revisar 1 a 1, documentar brechas como ISSUEs). Usar PRINCIPLES.md como vara de medir. Recomendable sesión fresca (anti-CDC) leyendo plan + informe + PRINCIPLES.md."
      - "Smoke test actualizar.md Paso 6.6 (PRINCIPLES.md sustitución diferencial) + Pasos 6.4/6.4.5 (templates schema). Cubierto por Frente 7 BLUEPRINT."
      - "Frente 3 BLUEPRINT: scaffold completitud en deploy + limpiar leak IMPROVEMENT-008-*.md de memsys3_templates/backlog/."
      - "Considerar v0.23.0 minor cuando se acumulen 2-3 frentes más."

    gotchas:
      - tipo: "consideracion_arquitectonica"
        problema: "Tentación inicial de poner PRINCIPLES.md solo en raíz del repo (más limpio para el repo dev) habría dejado a los proyectos desplegados sin acceso al doc canónico, perpetuando CDC."
        solucion: "Decisión 'fuente única + copia real distribuible' tomada antes de planificar. Doc canónico debe llegar a quien desarrolle CON memsys3, no solo a quien desarrolle memsys3."
        criticidad: "media"
        leccion: "Para cualquier doc que rige comportamiento del sistema desplegado: pregunta 'esto debe estar en proyectos cliente o solo en repo dev?' antes de elegir ubicación."

      - tipo: "anti_cdc"
        problema: "Si actualizar.md no propagaba PRINCIPLES.md, los proyectos ya desplegados (anteriores a este cambio) NUNCA habrían recibido el documento canónico ni sus actualizaciones futuras."
        solucion: "Paso 6.6 con sustitución diferencial añadido (no solo deploy.md). El usuario lo señaló como corrección crítica durante revisión del plan."
        criticidad: "alta"
        leccion: "Cualquier nuevo archivo de infraestructura distribuible debe tener AMBOS caminos: deploy.md (proyectos nuevos) Y actualizar.md (proyectos existentes). Olvidar uno deja a una mitad de usuarios fuera."

    notas_compilation_aware: |
      Sesión foundational para BLUEPRINT-001. PRINCIPLES.md ahora es referencia
      canónica que cualquier ADR/sesión futura puede invocar (en lugar de re-explicar
      principios desde cero). Cada frente posterior del BLUEPRINT operará con
      PRINCIPLES.md cargado por newSession, eliminando CDC sobre los principios.

  - id: "2026-05-07-cdc-adr020-memory-yaml-adr021-backlog-docs-blueprint001"
    titulo: "Principio CDC + ADR-020 (memory.yaml agnóstica + bridge MEMORY.md) + ADR-021 (backlog docs anti-CDC) + BLUEPRINT-001 release v1.0"
    data: "2026-05-07"
    duracion: "~3h"
    peso: "alto"
    objetivo: "Cubrir gap de memoria de usuario/feedback agnóstica, formalizar patrón anti-CDC en backlog, abrir BLUEPRINT release v1.0 dog-foodeando el patrón."

    highlights:
      - "Articulado principio fundacional CDC (Casualidad de Contexto): lucidez agéntica generada por eventualidad del contexto de la sesión actual y NO por archivos canónicos. memsys3 ES solución a CDC — su propósito es propiciar lucidez agéntica sostenida garantizada, no fluctuante. Anotado como principio fundacional en memsys3/memory/memory.yaml dogfooding."
      - "ADR-020 creada: memoria de usuario/feedback agnóstica (memsys3/memory/memory.yaml) con bridge opcional MEMORY.md para auto-memory de Claude Code. Cierra ISSUE-021 con Opción D. Schema flexible (usuario/feedback/referencias). Main Agent escribe append+datado, Context Agent solo lectura. Bridge graceful degradation (ADR-016)."
      - "ADR-021 creada: backlog extendido con informe_*.md y plan_*.md opcionales en backlog/docs/ como solución anti-CDC. Items cortos generan CDC en items complejos cuando agente fresco los ejecuta — docs canónicos eliminan dependencia del azar. Templates en memory/templates/. Aplica a los 6 prefijos (incluido EXPLORATION)."
      - "Implementación completa ADR-020: memory.yaml + memory-template.yaml en ambos sitios, integración en newSession (lectura), compile-context (Tier 1 lectura), main-agent.yaml (permiso escritura), context-agent.yaml (Tier 1 solo lectura + restricción no-escritura), deploy.md (Paso 9 bridge MEMORY.md opcional)."
      - "Implementación completa ADR-021: informe-template.md + plan-template.md en ambos sitios, backlog/docs/ + .gitkeep, backlog/README.md actualizado con tabla cuándo crear docs por tipo de item, prompts/backlog.md añade 4ª operación 'documentar', deploy.md y actualizar.md crean backlog/docs/ en scaffold, compile-context.md regla anti-explosión Tier 3 (NO leer docs/ por defecto)."
      - "BLUEPRINT-001-release-memsys3-v1 creado dog-foodeando el patrón ADR-021: item corto (85 líneas) + informe profundo (190 líneas, hallazgos por frente, alternativas, open questions) + plan ejecutable (290 líneas, 8 frentes con pasos/criterios/restricciones/riesgos). 7 frentes para release: principios canónicos, auditoría ADRs, scaffold completo, completitud templates, residualidad, dogfooding strategy, pulir deploy/actualizar."
      - "Regla dura firma_commits añadida a main-agent.yaml (ambos sitios): PROHIBIDO Co-Authored-By: Claude. Defensa multi-capa adicional al recordatorio de github.md."
      - "Nota dogfooting explícita en memsys3/agents/main-agent.yaml: 'la restricción infraestructura_memsys3 NO está aquí intencionalmente, este es el repo del propio memsys3, aplicarla causa deadlock'. Elimina ambigüedad para agente fresco."
      - "Verificación lucidez file_version: la asimetría dogfooding/distribuido (dogfooding sin restricción, distribuido con restricción) está codificada en archivos canónicos main-agent.yaml de cada sitio, NO depende de CDC. Validado anti-CDC."
      - "Hallazgos para BLUEPRINT-001: 10 principios memsys3 dispersos sin core canónico (frente 1 → PRINCIPLES.md), 5 brechas ADRs sospechosas (frente 2), leak IMPROVEMENT-008-*.md en memsys3_templates/backlog/ (frente 3), operations.log sin template (frente 4)."

    decisions:
      - tema: "Formato memory.yaml: .yaml vs .md"
        decision: ".yaml (consistencia con resto de memory/: project-status, context, sessions, adr)"
        motivo: "Romper consistencia por simetría visual con MEMORY.md de Claude no compensa coste de parsing/síntesis"
        adr_relacionada: "ADR-020"

      - tema: "Bridge MEMORY.md raíz: contenido vs solo puntero"
        decision: "Solo puntero corto. MEMORY.md NO contiene memoria real, solo redirige a memsys3/memory/memory.yaml"
        motivo: "Preserva 'una sola carpeta'. Memoria real vive dentro de memsys3/, MEMORY.md es bridge Claude-específico opt-in"
        adr_relacionada: "ADR-020"

      - tema: "Granularidad docs en backlog: por tipo de item vs siempre"
        decision: "Opcionales con tabla por tipo (BLUEPRINT siempre, IMPROVEMENT pequeño nunca, EXPLORATION recomendado, etc.)"
        motivo: "Coste proporcional al riesgo CDC. Items triviales no necesitan burocracia, items complejos sí"
        adr_relacionada: "ADR-021"

      - tema: "Ubicación docs: backlog/docs/ vs memsys3/docs/backlog_docs/"
        decision: "backlog/docs/ (cohesión local con items)"
        motivo: "Trabajar un item no requiere navegar a otra carpeta. Reduce riesgo de docs huérfanos"
        adr_relacionada: "ADR-021"

      - tema: "CA y backlog/docs/: lectura por defecto vs selectiva"
        decision: "NO leer docs/ por defecto en Tier 3. Solo si item está en pendientes prioritarios + complejo + corto no basta"
        motivo: "Informes pueden ser largos (cientos de líneas). Lectura por defecto explotaría tokens del CA"
        adr_relacionada: "ADR-021"

      - tema: "Regla firma commits: recordatorio vs regla dura"
        decision: "Regla dura inline en main-agent.yaml (defensa adicional a github.md)"
        motivo: "Recordatorio en github.md es lectura on-demand. Regla dura cargada en cada newSession reduce margen error"
        adr_relacionada: "ADR-016 + memory.yaml feedback"

    features_implementadas:
      - "ADR-020: memoria de usuario/feedback agnóstica + bridge MEMORY.md opcional Claude"
      - "ADR-021: backlog extendido con informe/plan opcionales (anti-CDC)"
      - "Sistema memory.yaml: archivo + template + integración en agents y prompts"
      - "Sistema backlog docs: 2 templates + actualización backlog.md + scaffold automático"
      - "Bridge opcional MEMORY.md raíz para Claude Code (graceful degradation)"
      - "Regla dura firma_commits en main-agent.yaml (ambos sitios)"
      - "Nota dogfooting explícita en memsys3/agents/main-agent.yaml (anti-CDC)"
      - "BLUEPRINT-001 + informe + plan: primer item dog-foodeando ADR-021"

    archivos_modificados:
      nuevos:
        - "memsys3/memory/memory.yaml (con seed real dogfooding)"
        - "memsys3_templates/memory/memory.yaml (vacío Modelo D)"
        - "memsys3/memory/templates/memory-template.yaml"
        - "memsys3_templates/memory/templates/memory-template.yaml"
        - "memsys3/memory/templates/informe-template.md"
        - "memsys3_templates/memory/templates/informe-template.md"
        - "memsys3/memory/templates/plan-template.md"
        - "memsys3_templates/memory/templates/plan-template.md"
        - "memsys3/backlog/docs/.gitkeep"
        - "memsys3_templates/backlog/docs/.gitkeep"
        - "memsys3/backlog/BLUEPRINT-001-release-memsys3-v1.md"
        - "memsys3/backlog/docs/informe_BLUEPRINT-001.md"
        - "memsys3/backlog/docs/plan_BLUEPRINT-001.md"
      modificados_pares_dogfooding_y_templates:
        - "agents/main-agent.yaml (memoria_usuario + restricción firma_commits + bump 0.2.0→0.3.0)"
        - "agents/context-agent.yaml (memory.yaml en Tier 1 lectura + restricción no-escritura + bump 0.1.0→0.2.0)"
        - "prompts/newSession.md (lectura memory.yaml + bump 0.1.0→0.2.0)"
        - "prompts/compile-context.md (memory.yaml en Tier 1 + regla docs/ selectiva en Tier 3 + bump 0.1.0→0.2.0)"
        - "prompts/deploy.md (Paso 9 bridge MEMORY.md + scaffold backlog/docs/ + bump 0.1.0→0.2.0)"
        - "prompts/actualizar.md (crear backlog/docs/ si falta, ADR-021)"
        - "prompts/backlog.md (4ª operación documentar + bump 0.1.0→0.2.0)"
        - "backlog/README.md (sección docs/, tabla por tipo, fecha actualización)"
      modificados_solo_dogfooding:
        - "memory/full/adr.yaml (ADRs 020 y 021 + índice)"

    proximos_pasos:
      - "Ejecutar Frente 1 BLUEPRINT-001: PRINCIPLES.md canónico con CDC como #1"
      - "Smoke test actualizar.md con lógica nueva Pasos 6.4/6.4.5 (pendiente prioritario 1, ahora frente 7 BLUEPRINT)"
      - "Limpiar leak memsys3_templates/backlog/IMPROVEMENT-008-*.md (frente 3 BLUEPRINT)"
      - "Decidir distribución PRINCIPLES.md (raíz repo, templates, ambos)"
      - "Refactorizar EXPLORATION-001/002/003 al patrón item+informe (validación adicional ADR-021)"

    gotchas:
      - tipo: "convencion-naming"
        problema: "Inicialmente conversación usaba 'informe_ISSUE-NNN.md' sesgando hacia ISSUE-only. Confusión potencial: ¿aplica a otros prefijos?"
        solucion: "ADR-021 + templates + backlog/README usan PREFIJO-NNN consistentemente. Tabla explícita por tipo (incluye EXPLORATION recomendado). Verificar siempre lo escrito en archivos canónicos, no la conversación."
        criticidad: "media"

      - tipo: "principio-anti-CDC"
        problema: "Lucidez agéntica que solo emerge porque agente leyó algo concreto en sesión actual viola propósito de memsys3"
        solucion: "Test mental para cada decisión de diseño: '¿esto requiere que agente fresco adivine, o le doy archivo canónico?'. Si emerge solo de contexto-en-sesión, formalizar en archivo (memory.yaml, ADR, PRINCIPLES.md, etc.)"
        criticidad: "alta"

      - tipo: "reflejo-bumpeo-file-version"
        problema: "Agente bumpó memory.yaml file_version 0.1.0→0.1.1 al añadir contenido, pese a tener la regla escrita en el propio archivo (regla feedback) y en ADR-017. Reflejo automático 'modifico archivo → bumpo versión' se dispara antes de pasar por la regla."
        solucion: "Defensa multi-capa: (1) mantener regla en memory.yaml feedback, (2) añadir restricción dura 'file_version_inmutable' en main-agent.yaml ambos sitios (cargada en cada newSession), (3) reglas en feedback NO bastan si solo se leen retrospectivamente — deben estar en restricciones del agent. Aplicado en sesión 2026-05-07 antes de cerrar."
        criticidad: "alta"

    referencias:
      adrs_creadas: ["ADR-020", "ADR-021"]
      blueprint_creado: "BLUEPRINT-001-release-memsys3-v1"
      issues_cerrados: ["ISSUE-021 (auto-memory Claude — cerrado por ADR-020)"]
      principios_articulados: ["CDC (Casualidad de Contexto) — primer principio fundacional anotado"]

  - id: "2026-05-06-adrs-017-018-019-limpieza-scaffolds-release-v0220"
    titulo: "ADRs 017-019 (file_version + sustitución diferencial + deprecation contextualizada) + limpieza scaffolds memsys3_templates + release v0.22.0"
    data: "2026-05-06"
    duracion: "~3h"
    peso: "alto"
    objetivo: "Investigar reporte CLIENT_D sobre desalineación schema, formalizar modelo de versionado/actualización/evolución en ADRs, integrar lógica en actualizar.md, release."

    highlights:
      - "Reporte CLIENT_D (agente externo) apuntaba a desalineación schema en project-status.yaml; investigación reveló que el archivo problemático NO era el dog-fooding (estaba limpio) sino los archivos operativos legacy en memsys3_templates/memory/ (snapshots dog-fooding congelados v1.3 con catalán residual, fugas hacia el producto distribuible)"
      - "4 archivos vaciados a scaffold puro Modelo D (estructura mínima, sin placeholders, sin referencias, # version: 0.1.0): project-status.yaml, context.yaml, full/adr.yaml, full/sessions.yaml en memsys3_templates/memory/"
      - "operations.log NO tocado (sin template equivalente, queda para plan paralelo)"
      - "Tres ADRs arquitectónicas creadas: ADR-017 (sistema file_version), ADR-018 (sustitución diferencial), ADR-019 (deprecation contextualizada)"
      - "Lógica nueva en actualizar.md Paso 6.4 (sustitución diferencial con extract_version + compare_versions + AskUserQuestion en estado anómalo) + Paso 6.4.5 (detección deprecated/huérfanos en modo Extendido)"
      - "ISSUE-023 documentado y marcado completado (caso CLIENT_D resuelto)"
      - "Release v0.22.0 (Minor): 4 commits atómicos sin firma + tag annotated con metadata rica + push exitoso"

    features_implementadas:
      - nombre: "ADR-017: Sistema file_version por archivo"
        descripcion: |
          Versionado independiente de infraestructura, formato 0.Y.Z. Tres ubicaciones según tipo:
          - .md (prompts): última línea como <!-- version: X.Y.Z -->
          - .yaml templates: primera línea como # version: X.Y.Z
          - .yaml agents: campo file_version: "X.Y.Z" al final
          Solo se bumpa con /actualizar-memsys3. MA y CA no lo modifican.
          Alcance: 21 archivos infraestructura. NO aplica a datos vivos ni context.yaml (compilado).

      - nombre: "ADR-018: Sustitución diferencial de templates de schema"
        descripcion: |
          actualizar.md compara file_version upstream vs destino para memory/templates/ (alcance acotado):
          - upstream > destino → sobrescribir
          - iguales → no tocar
          - destino > upstream → AskUserQuestion (estado anómalo)
          - destino sin file_version (legacy pre-ADR-017) → tratar como v0, sustituir
          NO aplica a prompts/agents (personalizables, no inmutables).

      - nombre: "ADR-019: Política de evolución de schema (deprecation contextualizada)"
        descripcion: |
          upstream propone deprecation con motivo, agente contextualizado en proyecto destino evalúa
          si aplica al caso, usuario decide (mantener / migrar / eliminar). upstream NUNCA elimina
          automáticamente. Templates pueden vivir con campos deprecated indefinidamente.
          Encaja con modo Extendido de actualizar.md (precedente sesión 2026-04-15).

      - nombre: "Lógica diferencial + deprecation en actualizar.md"
        descripcion: |
          Paso 6.4 reescrito con bash helpers (extract_version usando grep+sed, compare_versions
          usando sort -V) y bucle for sobre cada template. Paso 6.4.5 (modo Extendido) busca
          # DEPRECATED en templates y campos huérfanos en datos vivos. file_version actualizar.md:
          0.1.0 → 0.2.0.

      - nombre: "Limpieza scaffolds memsys3_templates/memory/"
        descripcion: |
          Modelo D: scaffold puro vacío sin placeholders [RELLENAR], sin referencias a otros
          archivos (acoplamiento cero). Convención: agente sabe ir a templates/ por documentación.
          Eliminadas 1145+ líneas legacy de fugas dog-fooding al producto distribuible.

      - nombre: "ISSUE-023 backlog"
        descripcion: |
          Documentado caso CLIENT_D, diagnóstico, resolución y comunicación al colaborador externo.
          Estado: Completado. Aprendizajes incluidos. Plan paralelo enumerado.

    problemas_resueltos:
      - problema: "Reporte CLIENT_D apuntaba a dog-fooding como problemático cuando el real era archivo paralelo legacy"
        solucion: "Verificación con grep + comparación tamaños (live 24K vs legacy 7K) + análisis git log de últimos commits. Localizado el verdadero foco: memsys3_templates/memory/*.yaml (no memsys3/memory/*.yaml)."

      - problema: "Modelo de contenido para archivo operativo vs template (¿idénticos? ¿diferentes? ¿ejemplo lleno?)"
        solucion: "Modelo D: scaffold puro vacío (no idéntico, no ejemplo, no referencias). Convención > acoplamiento. El template-guía con [RELLENAR] vive en templates/, el operativo es estructura mínima vacía."

      - problema: "Palabra 'inmutable' aplicada incorrectamente a prompts/agents"
        solucion: "Reformulación en 3 clases (templates de schema canónicos / personalizables / datos vivos). memsys3 es agnóstico de dominio: software, escritura, marketing, dirección. Solo memory/templates/ es realmente inmutable por contrato."

      - problema: "Política rígida de deprecation contradice agnosticismo memsys3"
        solucion: "Decisión final NO la toma upstream sino el agente contextualizado en el proyecto destino. upstream propone con motivo, agente evalúa contra contexto del proyecto, usuario decide. Templates pueden conservar campos legacy indefinidamente si proyectos los justifican."

    decisiones_tomadas:
      - decision: "Sistema file_version por archivo (formato 0.Y.Z)"
        justificacion: "Trazabilidad fina, audit trail, hot-fixes individuales sin bump global, prerequisito para sustitución diferencial"
        adr_relacionada: "017"

      - decision: "Sustitución diferencial acotada a memory/templates/ (no aplica a prompts/agents)"
        justificacion: "Templates de schema son inmutables por contrato; prompts/agents son personalizables (precedente ISSUE-018 WORKSPACE_Y). Sustitución directa solo segura donde el contrato garantiza no-edición."
        adr_relacionada: "018"

      - decision: "Deprecation contextualizada por agente del proyecto, sin imposición upstream"
        justificacion: "Agnosticismo memsys3: solo el usuario y agente contextualizado conocen su proyecto. upstream propone, no impone."
        adr_relacionada: "019"

      - decision: "Modelo D scaffold puro para archivos operativos (vacío, sin referencias)"
        justificacion: "Cero acoplamiento entre archivos. Convención (agente consulta templates/) > referencia explícita (más mantenimiento)"

      - decision: "Release Minor v0.22.0 en lugar de Patch v0.21.2"
        justificacion: "3 ADRs arquitectónicas + lógica nueva en actualizar.md > cosmético/fix; pero backward-compatible (sin breaking changes)"

    gotchas:
      - tipo: "warning"
        problema: "Archivos operativos en memsys3_templates/memory/ duplican estructura de dog-fooding y se desincronizan silenciosamente. Riesgo de fugas de datos del repo dev al producto distribuible si se rellenan en lugar de mantener vacíos."
        solucion: "Mantener como scaffold puro Modelo D (vacío). NO rellenar con datos del propio memsys3. Vigilar en cada release."
        criticidad: "media"

      - tipo: "gotcha"
        problema: "Reporte CLIENT_D apuntaba al archivo equivocado. La verificación contra master del repo es esencial antes de actuar sobre un reporte inter-proyecto."
        solucion: "Siempre comparar diff sizes + dates entre los archivos sospechosos del dog-fooding y del producto distribuible. El reportante puede tener un deployment antiguo + interpretación errónea."
        criticidad: "baja"

      - tipo: "warning"
        problema: "Push directo a master/main mostró warning 'master renamed to main'. Verificar si el repo tiene branch protection o conventions de PR."
        solucion: "Por ahora push a master funcionó (origin/HEAD -> origin/master). Pendiente: revisar si conviene migrar default a main."
        criticidad: "baja"

    proximos_pasos:
      - "Comunicar a CLIENT_D: ISSUE-023 cerrado, ejecutar /actualizar-memsys3 en su deployment"
      - "Plan paralelo: ADR sobre completitud del scaffold en deploy + auditoría templates faltantes (operations.log sin template, etc.)"
      - "Plan paralelo: ADR sobre estrategia de actualización para prompts/agents personalizables (precedente ISSUE-018)"
      - "Desplegar web memsys3.org (pendiente desde sesión 2026-05-05)"
      - "FEATURE-012 (glosario de conceptos)"
      - "Ejecutar compile-context.md en nueva instancia limpia (3 ADRs nuevas + cambios de release merecen recompilación)"

    notas_adicionales: |
      Sesión metodológicamente disciplinada: plan mode → ADR vía prompt → release vía github.md
      con 4 commits atómicos.

      Aprendizaje clave: la analogía software-dev (refactor, ADR, sessions) es prestada en memsys3
      por ser la práctica más madura en disciplina iterativa, pero el sistema sirve para CUALQUIER
      construcción (libro, marketing, dirección). La rigidez de "inmutable" es incompatible con
      esa universalidad. Solo memory/templates/ es canónico inmutable; el resto es andamio
      adaptable.

      Aprendizaje secundario: cuando un colaborador externo reporta un bug, verificar primero
      el master upstream antes de actuar. Su deployment puede estar desactualizado y su
      interpretación puede errar el foco.

      Smoke test de actualizar.md con la lógica nueva pendiente (validar en proyecto de prueba
      tipo WORKSPACE_Y). Idealmente probar tres casos: archivo sin file_version, archivo con
      file_version igual, archivo con file_version mayor en destino.

  - id: "2026-05-05-release-v0211-dominio-memsys3-org"
    titulo: "Release v0.21.1 + decisión dominio memsys3.org canónico"
    data: "2026-05-05"
    duracion: "~30min"
    peso: "bajo"
    highlights:
      - "Release v0.21.1 ejecutada siguiendo workflow github.md (commit + tag + push, sin firma, AskUserQuestion para versión)"
      - "Restricción operaciones_git en MA validada en uso real: prompt github.md cargado correctamente antes de operar git"
      - "Decisión dominio: memsys3.org como canónico, memsys3.com con redirect 301 → consolidar SEO en .org (cultura OSS)"
      - "URL oficial https://memsys3.org propagada: README.md + project-status.yaml (urls.website) + context.yaml (urls.website) + wiki GitHub (Home + _Sidebar)"
      - "Web aún no desplegada (URL añadida proactivamente, usuario despliega placeholder en paralelo)"
    decisions:
      - "Dominio canónico: .org sobre .com. Razón: convención OSS (python.org, kernel.org, gnu.org). .com como red de seguridad anti-squatting + captura tráfico default"
      - "Redirect 301 (no 302) desde .com → .org preservando path. Canonical tag en HTML del .org. Mismo path al redirigir para no perder SEO"
      - "Templates (memsys3_templates/) NO reciben campo urls.website: son agnósticos por proyecto. Solo dog-fooding (memsys3/) lleva la URL real"
    proximos_pasos:
      - "Commit + push de cambios README/yaml/wiki (URL memsys3.org)"
      - "Desplegar web en .org (aunque sea placeholder) para evitar enlace 404"
      - "Configurar redirect 301 .com → .org una vez la web esté live"

