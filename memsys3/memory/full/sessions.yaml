      - "🔑 MOMENTO CLAVE: Usuario explica principio fundamental de /actualizar-memsys3: 'implementar mejoras/fixes/features acumuladas, NO desplegar de nuevo el sistema'"
      - "Claude realiza merge inteligente de newSession.md conservando personalizaciones (español, saludo, estructura) + integrando mejoras v0.8.1 (README.md, notas)"
      - "Validación del principio: acumulación de valor vs reseteo, merge contextual LLM vs cp tradicional"
