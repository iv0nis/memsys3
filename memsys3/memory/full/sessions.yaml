          blocked_files_log.md, ISSUE-027, agent6_prompt_frente6.txt) y M no
          relacionados (PRINCIPLES.md, memory.yaml con olvidan-que-olvidan,
          newSession.md ×2). Tentación: 'mientras estamos aquí, los limpiamos
          también'. Riesgo: scope creep en frente arquitectónico que requiere
          disciplina de alcance.
        solucion: |
          Out-of-scope explícito en el plan (sección dedicada). Selective `git add`
          por archivo, NUNCA `git add -A` en sesiones con working tree mixto.
        criticidad: "media"

      - tipo: "regex-bash-special-chars"
        problema: "Verificación 'grep -c \"Frente 6.*\\[x\\]\"' devolvió 0 por escape incorrecto del bracket regex (clase de caracteres). Falso negativo."
        solucion: "Usar grep -F (literal) para verificar marcas [x] en docs Markdown."
        criticidad: "baja"

    proximos_pasos:
