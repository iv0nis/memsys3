          main-agent.yaml (templates + dog-fooding), compile-context.md (ambos), README.md (ambos),
          prompts varios, ADRs históricas. Estrategia: depuración sistemática completa (Opción A).
          Criterios aceptación: 0 resultados grep "Development Agent|DevAI". Prioridad ALTA.

    decisiones_clau:
      - decision: "Main Agent como terminología estándar única del sistema"
        justificacio: "Deja espacio conceptual para agentes especializados futuros sin conflictos terminológicos. 'Development Agent' sería confuso si existe agente especialista en desarrollo"
        alternatives_descartades: "Development Agent (conflicto), sistema dual (over-engineering), Agent genérico (ambiguo)"
        impacte: "Claridad conceptual, escalabilidad, documentación consistente"
