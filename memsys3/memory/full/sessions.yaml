      - problema: "Restriccion infraestructura en main-agent.yaml dog-fooding creaba deadlock"
        solucion: "Quitada restriccion infraestructura_memsys3 del dog-fooding. Template la mantiene para proyectos destino"
        impacto: "Main Agent puede modificar prompts/, agents/, templates/ en el propio repo de memsys3"
      - problema: "Terminologia Development Agent/DevAI limitaba memsys3 a solo desarrollo"
        solucion: "Erradicado de todos los templates y docs publicos (15 archivos). AI Agents o Main Agent segun contexto"
        impacto: "memsys3 correctamente posicionado como agnostico de dominio"

