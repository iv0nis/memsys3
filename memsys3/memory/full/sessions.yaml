# Sessions Log - memsys3
# Histórico de sesiones de desarrollo de memsys3
# Sesiones anteriores rotadas a: sessions_1.yaml (1849 líneas, hasta 2025-12-03)

sessions:
  - id: "2025-12-30-bug-fix-issue-005-adr-016-agnostico"
    data: "2025-12-30"
    duracion: "~2.5h"
    titulo: "Bug Fix ISSUE-005 + ADR-016: Principio Agnóstico memsys3"

    objetivo: "Investigar bug reportado por usuario (archivos faltantes tras actualización v0.6.1→v0.8.1) y documentar principio arquitectónico fundamental de memsys3 sobre agnosticismo de modelo de IA"

    que_es_va_fer:
      - "Usuario reporta: tras actualizar Taller Colomer (v0.6.1→v0.8.1), falta adr.md"
      - "Investigación completa: actualizar.md PASO 6.1 no incluye 3 archivos nuevos (adr.md v0.8.0, backlog.md v0.7.0, commands.md v0.8.1)"
      - "Confirmación con instancia que hizo actualización: bug confirmado al 100%"
      - "ISSUE-005 creado: documentación exhaustiva (evidencia, causa raíz, 3 opciones evaluadas)"
      - "Fix aplicado: Opción A (manual) agregando 3 líneas en actualizar.md PASO 6.1"
      - "Fix sincronizado: memsys3_templates/ + memsys3/ (dog-fooding)"
      - "Actualizado PASO 4 documentación con nuevos prompts"
      - "Discusión arquitectónica: rol de commands en memsys3 (¿core u opcional?)"
      - "ADR-016 creada: memsys3 agnóstico de modelo IA, commands opcional Claude-específico"
      - "Documentación actualizada: commands.md (warning OPCIONAL), README.md (compatibilidad agnóstica)"
      - "Usuario detecta 2 issues adicionales: backups versionados + detectar prompts/agents proyecto"
      - "ISSUE-006 creado: backups memsys3_backup_*/ siempre en .gitignore (alta prioridad)"
      - "FEATURE-004 creado: detectar y preservar prompts/agents del proyecto durante deploy/actualizar"

    features_implementadas:
      - nombre: "ISSUE-005: Bug fix actualizar.md archivos faltantes"
        descripcion: |
          Corregido bug crítico en actualizar.md PASO 6.1 que no copiaba 3 prompts nuevos:
          - adr.md (introducido v0.8.0)
          - backlog.md (introducido v0.7.0)
          - commands.md (introducido v0.8.1)

          Causa raíz: patrón de olvido sistemático (3 archivos en 3 versiones diferentes).
          Fix manual aplicado (Opción A). Opción B (loop automático) evaluada pero pendiente.

          Archivos modificados:
          - memsys3_templates/prompts/actualizar.md PASO 6.1 (+3 líneas)
          - memsys3/prompts/actualizar.md (sincronizado)
          - Ambos PASO 4 documentación (+3 prompts en lista)

      - nombre: "ADR-016: Principio agnóstico memsys3 + Commands opcional Claude-específica"
        descripcion: |
          Documentada decisión arquitectónica fundamental: memsys3 es agnóstico de modelo de IA.

          Arquitectura de fuente de verdad:
          1. memsys3_templates/prompts/ = AGNÓSTICOS (distribuible, universal)
          2. memsys3/prompts/ = ESPECÍFICOS (pueden adaptarse al proyecto)
          3. .claude/commands/ = COMANDOS LOCALES (workaround opcional Claude Code)

          Decisiones concretas:
          - Commands NO es parte del core de memsys3
          - Commands es workaround opcional para .gitignore + @ mentions
          - Usuarios Gemini/Codex/otros pueden IGNORAR commands completamente
          - Documentación debe dejar MUY CLARO que commands es OPCIONAL

          Alternativas evaluadas:
          - Hacer commands obligatorio → ❌ Rompe agnosticismo
          - Eliminar commands → ❌ Quita workaround útil
          - Sistema universal → ❌ No existe estándar

          ADR completa con context, 3 alternatives, consequences, impacto.

      - nombre: "Warnings en commands.md (OPCIONAL - Solo Claude Code)"
        descripcion: |
          Agregado warning explícito al inicio de commands.md (templates + dog-fooding):

          > ⚠️ OPCIONAL - Solo Claude Code
          > Este prompt es ESPECÍFICO de Claude Code. Si usas otro modelo de IA
          > (Gemini, Codex, etc.), puedes IGNORAR completamente este archivo.

          Clarifica que prompts .md funcionan universalmente, commands es workaround.

      - nombre: "README.md actualizado con compatibilidad agnóstica"
        descripcion: |
          Agregadas 2 menciones del principio agnóstico:

          1. Stack Tecnológico: "Compatibilidad: Agnóstico de modelo de IA (Claude, Gemini, Codex, etc.)"
          2. Requisitos: Nota explícita sobre agnosticismo y features opcionales específicas de herramientas

          Refuerza mensaje: memsys3 funciona en cualquier modelo de IA.

      - nombre: "ISSUE-006: Backups memsys3 siempre .gitignore (documentado)"
        descripcion: |
          Creado ISSUE-006 documentando riesgo crítico de seguridad:

          Problema: Si memsys3/ NO está en .gitignore (Opción B deploy), backups
          memsys3_backup_*/ se versionan en git → datos sensibles expuestos.

          Solución propuesta: Agregar regla automática a .gitignore durante deploy/actualizar:
          grep -q "memsys3_backup_" .gitignore || echo "memsys3_backup_*/" >> .gitignore

          Filosofía: Backups SIEMPRE temporales, NUNCA versionados.
          Prioridad ALTA. Testing pendiente.

      - nombre: "FEATURE-004: Detectar prompts/agents del proyecto (documentado)"
        descripcion: |
          Creado FEATURE-004 para detectar y preservar /prompts o /agents existentes
          en raíz del proyecto (fuera de memsys3/) durante deployment/actualización.

          Workflow propuesto:
          1. Detección automática de directorios existentes
          2. Consulta al usuario (listar, usar como fuente info, ignorar)
          3. Opcional: usar para personalizar deployment
          4. Preservación en backup (memsys3_backup_original/)

          Casos de uso: proyectos con deploy-production.md, test-runner.yaml propios.
          Prioridad MEDIA. Fase 1 (MVP) vs Fase 2 (personalización inteligente).

    problemas_resueltos:
      - problema: "Bug crítico ISSUE-005: actualizar.md no copiaba 3 prompts (adr.md, backlog.md, commands.md)"
        solucion: "Fix manual aplicado agregando 3 líneas cp en PASO 6.1. Documentado en ISSUE-005 con 3 opciones (A manual aplicada, B loop automático evaluada, C verificación post-update). Sincronizado templates + dog-fooding"

      - problema: "Confusión arquitectónica sobre rol de commands: ¿es parte del core o workaround opcional?"
        solucion: "ADR-016 creada documentando principio fundamental: memsys3 agnóstico de modelo IA, commands es workaround OPCIONAL específico de Claude Code. Jerarquía clara: templates (agnóstico) → prompts (específico) → commands (opcional Claude)"

      - problema: "Usuario reporta caso real: actualización v0.6.1→v0.8.1 en Taller Colomer perdió adr.md"
        solucion: "Colaboración con instancia que hizo actualización: confirmación exhaustiva del bug (seguido literalmente actualizar.md PASO 6.1 que no incluía adr.md). Fix aplicado previene futuros casos"

    decisiones_tomadas:
      - decision: "memsys3 es agnóstico de modelo de IA (principio arquitectónico fundamental)"
        justificacion: "Debe funcionar en Claude, Gemini, Codex, cualquier modelo. Features específicas de herramientas (commands) son OPCIONALES, nunca obligatorias. Prompts .md y YAML son el estándar universal"
        adr_relacionada: "016"

      - decision: "Commands como workaround opcional Claude-específico (NO parte del core)"
        justificacion: "Commands solo resuelve limitación Claude Code con @ mentions + .gitignore. Usuarios de otros modelos pueden IGNORAR completamente. Documentación debe ser explícita sobre opcionalidad"
        adr_relacionada: "016"

      - decision: "Fix manual (Opción A) aplicado inmediatamente, Opción B (loop automático) pendiente evaluación"
        justificacion: "Opción A resuelve bug inmediatamente sin riesgo. Opción B (for loop copiando todos los prompts) más robusta pero requiere testing que no rompe nada. Evaluación futura recomendada"
        adr_relacionada: null

      - decision: "Backups memsys3_backup_*/ SIEMPRE deben estar en .gitignore"
        justificacion: "Backups son temporales y pueden contener datos sensibles. No deben versionarse NUNCA, independiente de si memsys3/ está versionado o no. Protección automática es mejor que depender del usuario"
        adr_relacionada: null

    tecnologies_afegides: []
    tecnologies_eliminades: []

    gotchas:
      - tipo: "gotcha"
        problema: "Backups de memsys3 (memsys3_backup_*/) pueden versionarse en git si memsys3/ NO está en .gitignore (Opción B deploy)"
        solucion: "Agregar regla explícita a .gitignore durante deploy/actualizar: grep -q 'memsys3_backup_' .gitignore || echo 'memsys3_backup_*/' >> .gitignore. Backups SIEMPRE deben estar ignorados"
        criticidad: "alta"

      - tipo: "gotcha"
        problema: "Patrón de deuda técnica: 3 archivos olvidados en actualizar.md en 3 versiones diferentes (backlog.md v0.7.0, adr.md v0.8.0, commands.md v0.8.1)"
        solucion: "Cada nuevo prompt debe recordarse agregar manualmente a actualizar.md PASO 6.1. Considerar Opción B (loop automático) para prevenir olvidos futuros. Implementar checklist o verificación post-update"
        criticidad: "media"

    proximos_pasos:
      - "Testing fix ISSUE-005 en Taller Colomer (actualizar nuevamente con actualizar.md corregido)"
      - "Implementar ISSUE-006: agregar protección backups .gitignore en deploy.md + actualizar.md"
      - "Evaluar Opción B de ISSUE-005: reemplazar lista manual con loop automático en actualizar.md"
      - "Evaluar FEATURE-004 Fase 1 (detección + preservación prompts/agents proyecto)"
      - "Subir cambios a GitHub con tag (sesión documentada + ADR-016 + bug fixes)"

    notas_adicionales: |
      Sesión altamente productiva con 3 componentes principales:

      1. Bug Fix Real (ISSUE-005):
         - Caso confirmado por usuario en proyecto real
         - Colaboración con otra instancia de Claude que hizo la actualización
