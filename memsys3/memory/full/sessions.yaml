      - problema: "Onboarding de nuevos miembros requería 10+ pasos manuales propensos a errores"
        solucion: "Prompt commands.md automatiza detección, creación y verificación de todos los comandos globales en 1 ejecución"

      - problema: "Inconsistencia entre /deploy-memsys3 (curl) y /actualizar-memsys3 (clone)"
