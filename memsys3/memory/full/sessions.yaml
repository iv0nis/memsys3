# Sessions Log - memsys3
# Histórico de sesiones de desarrollo de memsys3
# Sesiones anteriores rotadas a: sessions_1.yaml (1849 líneas, hasta 2025-12-03), sessions_2.yaml (1837 líneas, hasta 2026-03-26)

sessions:
  - id: "2026-04-13-context-agent-ingesta-tiers"
    data: "2026-04-13"
    duracion: "~1.5h"
    peso: medio
    titulo: "Context Agent: sistema de ingesta por tiers hasta 150K tokens"
    highlights:
      - "Rediseño CA para maximizar ingesta de conocimiento antes de sintetizar (problema: CA se quedaba en ~30K tokens cuando podía llegar a 150K)"
      - "Sistema de 5 tiers de prioridad con presupuesto ~150K tokens explícito"
      - "Eliminados límites arbitrarios por sección en context-agent.yaml (max 7 ADRs, 150 chars/gotcha, etc.)"
      - "Nuevo mecanismo docs_contextuales: ciclo virtuoso Main Agent → CA → Main Agent"
      - "Release v0.19.2 publicada"
    features_implementadas:
      - "compile-context.md reescrito con Tier 1 (memory/full + rotados obligatorio), Tier 2 (README), Tier 3 (backlog completo), Tier 4 (docs_contextuales editables), Tier 5 (git log)"
      - "context-agent.yaml v2.0: único límite rígido 2000 líneas output, guías orientativas por peso en lugar de límites rígidos por sección"
      - "endSession.md paso 4.5: Main Agent referencia docs importantes en docs_contextuales de compile-context.md"
      - "Tier 3 lee backlog completo (antes solo items referenciados en pendientes)"
      - "CA puede reordenar docs_contextuales tras compilar para afinar prioridades futuras"
    decisions:
      - "Presupuesto fijo 150K tokens sin detección de modelo: simplicidad sobre adaptabilidad"
      - "docs_contextuales arranca vacío — Main Agent y CA lo van llenando con el tiempo"
      - "Tier 1 incluye explícitamente archivos rotados (sessions_1.yaml, sessions_2.yaml, etc.) — antes no se leían sistemáticamente"
    proximos_pasos:
      - "Ejecutar compile-context en sesión nueva para validar el nuevo sistema de tiers"
      - "Implementar FEATURE-012 (glosario conceptos)"
      - "Evaluar FEATURE-010 (checkpoint mid-session) y FEATURE-011 (Main Agent proactivo)"

  - id: "2026-03-27-exploracion-gentle-ai-backlog-meet-glosario"
    data: "2026-03-27"
    duracion: "~2.5h"
    peso: "medio"
    titulo: "Análisis comparativo gentle-ai + backlog exploración + reunión glosario conceptos"
    highlights:
      - "Análisis comparativo exhaustivo gentle-ai/Engram vs memsys3: arquitectura, tokens, trade-offs"
      - "5 items backlog creados inspirados en análisis: EXPLORATION-001 (consulta historial bajo demanda), FEATURE-010 (checkpoint mid-session), FEATURE-011 (Main Agent proactivo), ISSUE-020 (protocolo post-compact), FEATURE-012 (glosario conceptos)"
      - "Reunión 20260327_1 con Agent B (gitkigai): deliberación sobre parcelas, submodules, estructura mental → reenfocado a glosario de conceptos"
      - "FEATURE-012 acordada en meet: glosario.yaml como índice de lookup bajo demanda en memory/full/"
    que_hizo:
      - "Investigación gentle-ai (Gentleman-Programming): configurador ecosistema multi-agente + Engram (MCP server SQLite). ~15K tokens system prompt base, agente decide qué guardar, progressive disclosure"
      - "Identificadas 3 ideas accionables de Engram para memsys3: consulta bajo demanda, checkpoint mid-session, protocolo post-compact"
      - "Feedback usuario: Main Agent debería sugerir proactivamente cuándo hacer mid/end session → FEATURE-011"
      - "Reunión multi-agente 20260327_1: Agent A (memsys3) + Agent B (gitkigai), moderador Ivonis"
      - "Agent B reenfocó discusión: no necesitamos mindsys/contenedor, necesitamos glosario de conceptos como índice buscable"
      - "Acordado: glosario.yaml en memory/full/, formato punteros (nombre+ref+sesión), mantenimiento híbrido endSession con AskUserQuestion, NO cargado por Context Agent"
    decisions:
      - "Glosario como feature agnóstica de memsys3, no específica de gitkigai"
      - "Glosario es lookup bajo demanda, NO se compila en context.yaml"
      - "Mantenimiento híbrido: paso final de endSession propone conceptos, usuario confirma"
      - "Parcelas son contenido específico de gitkigai, no pertenecen al core agnóstico de memsys3"
    gotchas:
      - tipus: "observacion"
        problema: "gentle-ai inyecta ~15K tokens de system prompt base (protocolo Engram 3.5K + SDD 9K + persona 2.8K) — más que el contexto compilado de memsys3 (~3K)"
        criticitat: "baja"
      - tipus: "proceso"
        problema: "Polling de meet timeout 3 veces seguidas — Agent B en WSL Ubuntu no tenía acceso inmediato al archivo en ruta Windows"
        solucio: "Verificar conectividad entre agentes antes de lanzar polling"
        criticitat: "media"
    proximos_pasos:
      - "Implementar FEATURE-012 (glosario conceptos) — short-term, acordado en meet"
      - "Evaluar implementación FEATURE-010 (checkpoint mid-session) y FEATURE-011 (Main Agent proactivo)"
      - "EXPLORATION-001 (query.md) requiere más exploración antes de implementar"
