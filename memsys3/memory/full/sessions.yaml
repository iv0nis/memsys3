  - id: "2025-12-17-terminologia-main-agent"
    data: "2025-12-17"
    duracion: "~30min"
    titulo: "ADR-015 + IMPROVEMENT-006: Unificación Terminología 'Main Agent'"

    objetivo: "Resolver inconsistencias terminológicas detectadas durante feedback de compilación context.yaml. Establecer 'Main Agent' como nomenclatura estándar única del sistema"

    que_es_va_fer:
      - "Usuario solicita feedback sobre main-agent.yaml y alineamiento tras compilación"
      - "Feedback entregado: main-agent.yaml vacío (decisión correcta), inconsistencia terminológica detectada (Development Agent vs Main Agent vs DevAI), mensaje compile-context desalineado"
      - "Usuario aclara: 'Main Agent' es correcto (agente principal), 'Development Agent' sería especialista futuro, mensaje debe ser genérico"
      - "ADR-015 creada documentando decisión: Main Agent como nomenclatura estándar única"
      - "IMPROVEMENT-006 creada en backlog: depuración sistemática de 8+ ubicaciones con referencias desalineadas"
      - "Correcciones aplicadas inmediatamente en 4 archivos:"
      - "  • memsys3_templates/prompts/compile-context.md línea 7: 'Development Agents' → 'el Main Agent'"
      - "  • memsys3/prompts/compile-context.md línea 7: mismo cambio"
      - "  • memsys3_templates/agents/main-agent.yaml líneas 3-4: 'Development Agent' → 'Main Agent', agregado 'principal'"
      - "  • memsys3/agents/main-agent.yaml líneas 3-4: mismo cambio"
      - "Índice ADRs actualizado (ahora 15 ADRs totales)"

    features_implementadas:
      - nombre: "ADR-015: Terminología unificada Main Agent"
        descripcion: |
          Documentada decisión arquitectónica de adoptar "Main Agent" como término estándar único.
          Razón: Deja espacio conceptual para agentes especializados futuros (Development Agent,
          Testing Agent, etc.) sin conflictos. Alternativas evaluadas: mantener Development Agent
          (descartado: conflicto futuro), sistema dual (descartado: over-engineering), Agent genérico
          (descartado: ambiguo). ADR completa con context, alternatives, consequences.

      - nombre: "IMPROVEMENT-006: Backlog item para depuración completa"
        descripcion: |
          Creado item en backlog identificando 8+ ubicaciones que requieren actualización:
          main-agent.yaml (templates + dog-fooding), compile-context.md (ambos), README.md (ambos),
          prompts varios, ADRs históricas. Estrategia: depuración sistemática completa (Opción A).
          Criterios aceptación: 0 resultados grep "Development Agent|DevAI". Prioridad ALTA.

    decisiones_clau:
      - decision: "Main Agent como terminología estándar única del sistema"
        justificacio: "Deja espacio conceptual para agentes especializados futuros sin conflictos terminológicos. 'Development Agent' sería confuso si existe agente especialista en desarrollo"
        alternatives_descartades: "Development Agent (conflicto), sistema dual (over-engineering), Agent genérico (ambiguo)"
        impacte: "Claridad conceptual, escalabilidad, documentación consistente"
        adr_relacionada: "ADR-015"

    tecnologies_afegides: []
    tecnologies_eliminades: []

    problemes_resolts:
      - problema: "Inconsistencia terminológica: 3 términos diferentes (Main Agent, Development Agent, DevAI) para mismo concepto"
        solucio: "Unificación en 'Main Agent' como estándar. ADR-015 documenta decisión con justificación arquitectónica completa"
        impacte: "Sistema ahora tiene terminología clara y escalable para agentes especializados futuros"

    gotchas: []

    proxims_passos:
      - tasca: "Ejecutar IMPROVEMENT-006: depuración sistemática completa"
        prioritat: "alta"
        detall: "Actualizar README.md (raíz + templates), prompts restantes (newSession, endSession), ADRs históricas (notas UPDATE). Validación final: grep exhaustivo 0 resultados"

      - tasca: "Testing: ejecutar newSession + compile-context tras depuración"
        prioritat: "media"
        detall: "Validar que terminología actualizada funciona correctamente en flujo completo"

    notes_adicionals: |
      Sesión corta (~30min) pero conceptualmente importante.

      Cambio es cosmético (renombrado) pero arquitectónicamente significativo:
      establece nomenclatura clara que escala con agentes especializados futuros.

      Usuario proporcionó feedback claro sobre decisión correcta de main-agent.yaml vacío
      (contexto se suministra via archivos) y necesidad de unificar terminología.

      4 correcciones aplicadas inmediatamente, resto trackeado en IMPROVEMENT-006 para
      depuración sistemática completa.

    calidad: "9/10 (decisión arquitectónica clara, implementación parcial, pendiente depuración completa)"

