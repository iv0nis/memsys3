        adr_relacionada: "013"
      - decision: "Unificar versionado en v0.x.x con git tags como fuente de verdad única"
        justificacion: "actualizar.md DEPENDE de git tags para funcionar (git log, diff). Git tags NO son opcionales. Versión interna v1.9 → v0.8.0 para sincronizar. SemVer: v0.x = desarrollo, v1.0 = estable"
        resuelve: "ISSUE-002"
      - decision: "github.md SIEMPRE propone tag con justificación (usuario confirma)"
        justificacion: "Filosofía memsys3: sesión documentada = progreso significativo = merece tag. Workflow semi-automático: agente analiza y propone, usuario decide. Metadata rica en tags"
      - decision: "README repo memsys3 sin versión explícita, enlazar a GitHub Releases"
        justificacion: "Dog-fooding: git tags son fuente de verdad. En proyectos con memsys3 desplegado: README del proyecto tiene su versión, project-status.yaml tiene memsys3_version"

