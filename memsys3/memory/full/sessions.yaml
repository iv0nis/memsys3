      - "Usuario aclara: 'Main Agent' es correcto (agente principal), 'Development Agent' sería especialista futuro, mensaje debe ser genérico"
      - "ADR-015 creada documentando decisión: Main Agent como nomenclatura estándar única"
      - "IMPROVEMENT-006 creada en backlog: depuración sistemática de 8+ ubicaciones con referencias desalineadas"
