    gotchas:
      - tipo: "verificacion-prerequisito-adr-citada"
        problema: |
          El prompt del Frente 6 daba como referencia 'ADR-011 (separación
          agnóstico/específico)' en múltiples sitios (informe, BLUEPRINT, README),
          pero ADR-011 NUNCA existió — ISSUE-024 del Frente 2 ya lo había
          identificado como ADR ausente. Si no se hubiera leído ISSUE-024 primero,
          el frente habría arrancado con framing equivocado ('extensión de ADR-011')
          y la ADR-025 habría salido mal anclada.
        solucion: |
          Antes de escribir una ADR que cite o extienda otra: VERIFICAR que la ADR
          citada existe (grep en adr.yaml). Documentar el reframing explícitamente
          en la nueva ADR para que el agente futuro encuentre la corrección en el
          archivo canónico (no tenga que reconstruirla).
        criticidad: "media"

