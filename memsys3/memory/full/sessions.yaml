      - "Redirect 301 (no 302) desde .com → .org preservando path. Canonical tag en HTML del .org. Mismo path al redirigir para no perder SEO"
      - "Templates (memsys3_templates/) NO reciben campo urls.website: son agnósticos por proyecto. Solo dog-fooding (memsys3/) lleva la URL real"
    proximos_pasos:
