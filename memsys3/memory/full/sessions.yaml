      - "Ejecutar @memsys3/prompts/mind.md en proyecto UOC (validar visualizador)"
      - "Ejecutar @memsys3/prompts/newSession.md en proyecto UOC (validar merge funcionando)"
      - "Uso en 1-2 sesiones reales del proyecto UOC para validación completa"
      - "Commitear actualización después de validar funcionamiento"
      - "Eliminar backup memsys3_backup_20251215_115410 después de validación exitosa"

    meta_aprendizaje:
      - "El valor de /actualizar-memsys3 NO es sobrescribir archivos, es merge inteligente contextual usando capacidad LLM"
      - "Software tradicional: cp -r upstream/* local/ → pérdida de personalizaciones"
      - "Software inteligente (agentes LLM): merge contextual → acumulación de valor sobre tiempo"
      - "Cada actualización ENRIQUECE en lugar de resetear (principio fundamental diferencial)"
      - "Testing reveló: launchers requieren confirmación Bash manual, pero esto es ventaja para seguridad y validación"
