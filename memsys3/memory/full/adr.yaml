# Architecture Decision Records - memsys3
# Decisiones arquitectónicas del proyecto memsys3
# ADRs anteriores rotadas a: adr_1.yaml (1994 líneas, hasta ADR-024, 2026-05-07)

adrs:
  - id: "031"
    titulo: "Extensión del corolario anti-CDC: detectabilidad asimétrica (la lucidez casual da falsa sensación de seguridad)"
    data: "2026-06-03"
    estado: aceptado
    area: "process,documentación"

    context: |
      El principio #1 (Anti-CDC) define la CDC como lucidez agéntica casual (que el agente
      "acierte" por el contexto eventual de la sesión, no por archivo canónico) e incluye un
      corolario disposicional: la meta-amnesia agéntica (el agente no sabe que olvida → su
      default es proseguir sin canonizar). Ese corolario describe la CARA DEL AGENTE.

      En sesión 2026-06-03, durante una conversación sobre dos drifts detectados (el bug
      sistémico del CHANGELOG en github.md y un pendiente stale en project-status), el usuario
      articuló una cara complementaria no canonizada: la CDC es MÁS peligrosa en su forma
      positiva (acierto casual) que negativa (fallo), por ASIMETRÍA DE DETECTABILIDAD. El
      fallo se autodelata y se corrige; el acierto casual no deja rastro y el observador
      humano lo lee como prueba de que el sistema funciona → falsa sensación de seguridad →
      no se canoniza → la sesión siguiente falla sin causa visible. Es el espejo-observador
      de la meta-amnesia (cara del HUMANO).

      Varias reglas operativas del proyecto ya son curas de esta cara sin nombrarla: validación
      cross-harness (memory.yaml 2026-05-14, "probar solo donde se desarrolló no aporta
      evidencia") y verificar contra código/git en vez del resumen (memory.yaml 2026-05-29).
      Pero el insight general no estaba articulado en §1.

    decision: |
      Extender el principio #1 con un corolario nuevo —"detectabilidad asimétrica / falsa
      sensación de seguridad"— como espejo-observador del corolario de meta-amnesia. Se edita
      `PRINCIPLES.md` §1 (SSoT en memsys3_templates/ + copia dogfooding; el stub raíz del repo
      es puntero y no se toca). `file_version` NO se bumpa (diferido a /actualizar-memsys3).

      Esta ADR-031 es el artefacto que el protocolo de evolución de PRINCIPLES.md exige
      ("se crea/actualiza una ADR que justifique el cambio") antes de editar el documento.

    alternatives:
      - nombre: "Capturarlo como regla en memory.yaml"
        pros:
          - "Barato: append datado, sin protocolo ni bump"
        contras:
          - "memory.yaml acumula reglas OPERATIVAS sin poda ni promoción → driftan"
          - "Un corolario conceptual se enterraría entre reglas y nunca alcanzaría estatus de principio"
          - "El puntero 'promover después' crea el limbo donde las cosas mueren (cf. consecuencia autocurativa de ADR-027, nunca implementada)"
        por_que_descartada: |
          Esto es teoría del sistema, no procedimiento. Su hogar es PRINCIPLES.md, que no
          drifta igual porque describe invariantes (no apunta a estado mutable). El propio
          temor del usuario al drift de memory.yaml fue la señal de que era el sitio equivocado.

      - nombre: "No canonizar (dejarlo implícito en las reglas operativas existentes)"
        pros:
          - "Cero trabajo; las curas operativas ya existen"
        contras:
          - "El insight general queda sin paraguas conceptual"
          - "Es exactamente la CDC que el corolario describe: lucidez de esta sesión que la meta-amnesia perdería"
        por_que_descartada: "Auto-contradictorio: no canonizar el corolario sobre no-canonizar."

    consecuencias:
      positivas:
        - "El principio fundacional #1 queda completo: cara-agente (meta-amnesia) + cara-humano (falsa seguridad)"
        - "Da paraguas conceptual a reglas operativas dispersas (cross-harness, verificar contra git)"
        - "Léxico citable: 'detectabilidad asimétrica (ADR-031)' / 'falsa sensación de seguridad'"
      negativas:
        - "PRINCIPLES.md gana un párrafo (~6 líneas; justificado: es el principio fundacional)"
      impacto: |
        Afecta:
        - `memsys3/PRINCIPLES.md` §1 (copia dogfooding) + `memsys3_templates/PRINCIPLES.md` (SSoT).
        - `./PRINCIPLES.md` (stub raíz): NO se toca (es puntero).
        - Convención conceptual aplicable a todo el sistema y a proyectos desplegados.

    notes: |
      Origen: sesión 2026-06-03. Insight del usuario ("casualidad de contexto sería también
      que el agente actúe de forma muy lúcida por casualidad... eso da falsa sensación de
      seguridad").

      Dogfooding de ADR-029 (disciplina de ciclo de vida de ADRs): se EXTIENDE el principio #1
      añadiendo un corolario (aditivo, no reescribe la decisión original) y se respalda con
      ADR nueva en lugar de editar destructivamente. No contradice el corolario de meta-amnesia:
      lo complementa (otra cara del mismo fenómeno).

      Reglas operativas derivadas ya canónicas: memory.yaml 2026-05-14 (validación cross-harness)
      y 2026-05-29 (verificar contra código/git, no el resumen).

      Anclaje a PRINCIPLES.md: #1 (Anti-CDC, este ADR lo extiende).

  - id: "030"
    titulo: "Reconciliación activa de auto-memory del harness: verbo activo-condicional + tabla de rutas conocidas"
    data: "2026-06-03"
    estado: aceptado
    area: "arquitectura,agnosticismo"

    context: |
      ADR-020 propuso un bridge `MEMORY.md` en la RAÍZ del proyecto para redirigir la
      auto-memory de Claude Code a `memory.yaml`. ADR-027 lo extendió a un diseño multi-capa
      (invariante textual + AGENTS.md + stubs per-modelo) cuyo verbo es PASIVO: el mecanismo
      de auto-memory del harness "debe redirigirse o quedar inerte".

      Dos problemas detectados en sesión 2026-06-03:
      1. **Mala ubicación del bridge original.** La auto-memory de Claude Code NO vive en
         `<root>/MEMORY.md`; vive en `~/.claude/projects/<hash>/memory/` (índice `MEMORY.md`
         DENTRO de esa carpeta). Un puntero en root nunca lo lee el harness. El bridge de
         ADR-020 asumía una ubicación sin verificarla.
      2. **El verbo pasivo no cubre la contaminación heredada.** "Quedar inerte" no resuelve
         el caso en que una sesión PREVIA dejó memoria de usuario en la ubicación del harness:
         ese contenido competiría con `memory.yaml`. ADR-027 previó en sus consecuencias una
         pasada "autocurativa" en endSession (migrar + vaciar) que NUNCA se implementó (grep
         0 hits en endSession.md, 2026-06-03).

      Verificación empírica (2026-06-03): las 8 carpetas `~/.claude/projects/*/memory/` de
      esta máquina están VACÍAS, incluso en proyectos de hace meses. El harness NO auto-puebla
      esas carpetas; solo se llenan si una instancia escribe en ellas. Conclusión: el riesgo
      no es un harness que rellena solo, sino una instancia que obedece al harness en vez del
      invariante. El invariante textual lleva meses conteniendo (0 incidentes).

    decision: |
      Sustituir el verbo PASIVO ("quedar inerte") por un verbo ACTIVO-CONDICIONAL de
      reconciliación, implementado en `newSession.md` §2:

      1. **Reconciliación condicional.** El agente localiza dónde guarda memoria persistente
         SU harness (viva donde viva). Si está vacía → no hace nada (caso normal). Si contiene
         memoria de usuario → migra lo canónico a `memory.yaml` (append + datado), avisa al
         usuario, y vacía la ubicación del harness. NO pre-escribe punteros en ubicaciones
         inertes (sería ensuciar una carpeta limpia; evidencia: el harness no la puebla solo).

      2. **Tabla de rutas conocidas (incremental).** Ayuda para quien no conoce su propia
         ubicación. Hoy: Claude Code = `~/.claude/projects/<hash>/memory/` (hash = path del
         cwd con `/`→`-`). Codex/Gemini aproximadas, por confirmar. Se amplía a medida que se
         descubre cómo gestiona la memoria cada harness. La tabla es scaffolding, no ley: el
         invariante declarativo ("reconcilia tu auto-memory esté donde esté") manda.

      **Relación con ADRs previas (ver disciplina ADR-029).** ADR-030 NO marca `superseded_by`
      global en ADR-020 ni ADR-027 — ambas son multi-decisión y su núcleo (`memory.yaml`
      canónica, MA escribe / CA lee, invariante declarativo agnóstico) sigue VIGENTE. ADR-030:
      - EXTIENDE ADR-027: refina la Capa 1 de pasivo a activo-condicional y cubre la CARPETA
        de auto-memory (ADR-027 Capa 3 solo cubría archivos de INSTRUCCIONES en root).
      - COMPLETA la consecuencia "autocurativa" que ADR-027 prometió y no implementó.
      - DEJA ATRÁS el bridge `MEMORY.md`-en-root original de ADR-020 (mal ubicado), ya
        de facto superado por la migración a AGENTS.md de ADR-027.
      Se añade un `update_` forward-pointer en ADR-027 (aditivo, permitido por ADR-029).

    alternatives:
      - nombre: "Pre-escribir un puntero MEMORY.md en la carpeta del harness"
        pros:
          - "Barandilla proactiva: cualquier inyección futura del harness reafirmaría el invariante con recencia"
        contras:
          - "Añade un artefacto a una carpeta que la evidencia muestra inerte"
          - "Persistencia/inyección no verificada: el harness podría regenerar su índice y pisar el puntero"
        por_que_descartada: |
          Defensa contra un fantasma (anti over-defensive scaffolding, memory.yaml 2026-05-16):
          el harness no auto-puebla las carpetas. Reconciliar solo si hay contenido es el
          coste-beneficio correcto.

      - nombre: "Solo reforzar el invariante textual (no tocar carpetas)"
        pros:
          - "Cambio mínimo; el invariante lleva meses funcionando (0 incidentes)"
        contras:
          - "No resuelve la contaminación heredada de una sesión previa que sí escribió"
          - "Deja sin cerrar la consecuencia autocurativa prometida por ADR-027"
        por_que_descartada: |
          Cubre el caso común pero no el de reconciliación. El coste de la pasada condicional
          es un `ls` (no hace nada si está vacío), así que el caso borde se cubre barato.

    consecuencias:
      positivas:
        - "Cierra el caso de contaminación heredada (memoria de usuario dejada por sesión previa)"
        - "Corrige la mala ubicación del bridge ADR-020 (carpeta del harness, no root)"
        - "Implementa la pasada autocurativa que ADR-027 dejó pendiente"
        - "Tabla de rutas conocidas: agnóstica (invariante manda) + práctica (ayuda incremental)"
        - "Condicional: cero ruido cuando las carpetas están limpias (caso normal)"
      negativas:
        - "newSession.md gana ~20 líneas (justificado: contenido anti-CDC, no scaffolding)"
        - "La tabla de rutas requiere mantenimiento incremental al descubrir nuevos harnesses"
      impacto: |
        Afecta:
        - `memsys3/prompts/newSession.md` §2 (verbo activo-condicional + tabla rutas) + espejo templates.
        - `memsys3/memory/full/adr.yaml` (este ADR-030 + `update_` forward-pointer en ADR-027).
        - NO toca `adr_1.yaml` (ADR-020 rotada): su evolución pasa por ADR-027.

    notes: |
      Origen: sesión 2026-06-03. El usuario detectó que el auto-memory de Claude no vive en
      root ("no hemos caído en que vive en su carpeta, no en la root") y propuso "instar al
      modelo a modificar su auto-memory, viva donde viva + rutas conocidas incrementales". La
      verificación empírica (carpetas vacías) reorientó el verbo de "pre-escribir" a
      "reconciliar condicionalmente".

      Es el primer dogfooding de ADR-029 (disciplina de ciclo de vida de ADRs): se aplicó el
      test del tipo de cambio y se eligió ADR nueva + `update_` aditivo en lugar de reescribir
      ADR-020/027.

      Side-finding (no resuelto aquí): los ADRs multi-decisión (020, 026, 027) complican la
      supersesión Nygard (no se puede marcar `superseded_by` global sin mentir sobre las
      sub-decisiones vigentes). Candidato futuro: principio/convención "una decisión por ADR".

      Anclaje a PRINCIPLES.md:
      - #1 (Anti-CDC): la reconciliación evita que memoria heredada contamine sesiones nuevas.
      - #2 (Agnosticismo): el invariante no enumera modelos; la tabla de rutas es ayuda, no ley.
      - #3 (Una sola carpeta): refuerza que la única fuente de memoria de usuario es memory.yaml.

  - id: "029"
    titulo: "Disciplina de ciclo de vida de ADRs: inmutabilidad + UPDATE aditivo + supersesión (convención Nygard adaptada)"
    data: "2026-06-03"
    estado: aceptado
    area: "process,documentación"

    context: |
      memsys3 distribuye un sistema de gestión de ADRs (prompt `adr.md` + `adr-template.yaml`)
      pero NUNCA había fijado una disciplina explícita sobre cómo evoluciona un ADR una vez
      aceptado. `adr.md` §3 ya decía "NO cambies id/titulo/data/context/decision/alternatives
      (son históricos)" — coherente con el estándar Nygard — pero el repo usa de facto un
      patrón contradictorio sin documentar: claves fechadas `update_YYYY_MM_DD:` que editan
      el cuerpo del ADR tras su aceptación (ej. ADR-027 `update_2026_05_11`). Convivían una
      regla escrita ("no toques") y una práctica ("toco vía update") sin árbitro, dejando a
      cada agente fresco adivinar cuándo editar in-place y cuándo crear un ADR nuevo (CDC
      operativa).

      El estándar de industria (Michael Nygard, 2011) trata cada ADR aceptado como registro
      histórico inmutable: la evolución se modela creando un ADR nuevo que *supersede* al
      anterior (este cambia solo su estado a `superseded_by`), nunca editando el viejo.

    decision: |
      Adoptar una **disciplina híbrida con límite**, ÚNICA para dogfooding y proyectos
      desplegados (sin bifurcar):

      1. **Inmutabilidad.** `id`, `titulo`, `data`, `context`, `decision`, `alternatives`
         de un ADR aceptado NUNCA se editan para borrar, reescribir o contradecir.

      2. **Test del tipo de cambio** (antes de tocar un ADR): *¿lo que voy a escribir
         contradice lo que el ADR ya decidió?*

      3. **NO contradice → UPDATE aditivo.** Refinamientos que aclaran, registran impacto
         real o enlazan trabajo derivado se añaden como clave fechada `update_YYYY_MM_DD: |`
         al final del cuerpo, sin tocar `decision`/`context`. Formaliza el patrón ya usado.

      4. **SÍ contradice → ADR nuevo + supersesión.** La decisión que cambia genera un ADR
         nuevo (siguiente ID) que indica a quién supersede; el ADR viejo cambia SOLO su
         `estado` a `superseded_by: "NNN"`. La contradicción vive ENTRE ADRs (cadena de
         supersesión), jamás DENTRO de uno.

      5. **Disciplina única (no bifurcar dogfooding vs producción).** El híbrido es
         superconjunto del Nygard puro: un proyecto que nunca use `update_` y siempre
         supersede ya es 100% estricto. El rigor extra es opt-in del proyecto, no una
         divergencia de la infraestructura.

      Canonización operativa: la disciplina se escribe en `adr.md` §3 y en la cabecera de
      `adr-template.yaml` (lo que disciplina a producción, por ser infraestructura
      distribuible). Este ADR-029 registra el porqué (no viaja al scaffold: es dato).

    alternatives:
      - nombre: "Nygard puro (erradicar el patrón update_)"
        pros:
          - "Estándar estricto, sin ambigüedad sobre qué se puede editar"
          - "Toda evolución trazable como cadena de ADRs"
        contras:
          - "Más verboso: un ADR nuevo por cada aclaración menor"
          - "Obligaría a migrar ADR-027 (y futuros update_) a ADRs separados"
        por_que_descartada: |
          El refinamiento aditivo no-contradictorio es barato y legible como clave fechada
          in-place; forzar un ADR nuevo para "registrar impacto real tras implementar" infla
          el índice sin aportar trazabilidad real. El híbrido ya contiene al puro.

      - nombre: "Disciplina distinta: híbrida en dogfooding, Nygard puro en producción"
        pros:
          - "Dogfooding conserva sus update_ sin migrar; producción nace estricta"
        contras:
          - "Rompe la fidelidad del dogfooding (debe comportarse como producción)"
          - "Exigiría divergir adr.md/adr-template.yaml (hoy idénticos) → doble mantenimiento + CDC"
          - "La única excepción dogfooding documentada (restricción infraestructura) tiene un deadlock real detrás; aquí solo hay deuda"
        por_que_descartada: |
          El valor del dogfooding está en comportarse igual que producción. La deuda
          (tener update_ previos) no justifica divergir. Además el híbrido ya permite
          rigor en producción como elección local del proyecto.

      - nombre: "Status quo (regla escrita 'no toques' + práctica update_ sin documentar)"
        pros:
          - "Cero trabajo"
        contras:
          - "Contradicción viva entre regla y práctica"
          - "Cada agente fresco adivina cuándo editar vs crear ADR (CDC)"
        por_que_descartada: "Es exactamente el agujero anti-CDC que este ADR cierra."

    consecuencias:
      positivas:
        - "Regla y práctica reconciliadas: el patrón update_ queda legitimado con barandilla"
        - "El test del tipo de cambio elimina la adivinación (anti-CDC) sobre editar vs supersedir"
        - "Disciplina única preserva la fidelidad del dogfooding y el SSoT adr.md/template"
        - "Léxico citable: 'híbrido con límite (ADR-029)' como handle para futuras decisiones"
      negativas:
        - "Los agentes deben aplicar el test antes de tocar un ADR (coste cognitivo mínimo)"
      impacto: |
        Afecta:
        - `memsys3/prompts/adr.md` §3 (reescrito con principio + test + dos caminos) + espejo templates.
        - `memsys3/memory/templates/adr-template.yaml` (cabecera de instrucciones) + espejo templates.
        - Convención aplicable a todos los ADRs futuros de este repo y de proyectos desplegados.

    notes: |
      Origen: sesión 2026-06-03, derivada de una conversación sobre cómo arreglar el bridge
      de auto-memory (ADR-020/ADR-027). Al detectar que el arreglo "contradice" una decisión
      previa, surgió la pregunta de si los ADRs son inmutables → se decidió formalizar la
      disciplina ANTES de aplicarla. El arreglo del auto-memory (verbo pasivo→activo) será un
      ADR posterior que estrena esta disciplina superseando el bridge de ADR-020.

      Anclaje a PRINCIPLES.md:
      - #1 (Anti-CDC): un agente fresco ya no adivina cuándo editar un ADR; tiene archivo canónico.
      - #8 (Datos siempre preservados): la inmutabilidad del razonamiento histórico es una
        instancia de la preservación de datos.
      - #9 (Separation of Concerns): la disciplina vive en infraestructura (adr.md/template),
        el porqué en datos (este ADR).

      Referencia externa: Michael Nygard, "Documenting Architecture Decisions" (2011).

      Side-findings detectados (NO resueltos aquí, para no inflar scope):
      - adr.md/template usan estados en inglés (accepted|deprecated|superseded_by) pero el
        adr.yaml real usa español (aceptado) + un estado 'vacante' no listado en la leyenda.
      - adr.md/template dicen "añade nuevas ADRs al final" pero el repo las inserta al principio.

  - id: "028"
    titulo: "Setup Agent: tercer rol agéntico responsable del lifecycle de memsys3 (deploy + actualizar)"
    data: "2026-05-12"
    estado: aceptado
    area: "arquitectura"

    context: |
      Hasta ADR-028 memsys3 contempla dos roles agénticos:
      - Main Agent (MA): desarrolla el proyecto (features, bugs, escribe sessions/ADRs/
        backlog/memory.yaml/project-status).
      - Context Agent (CA): sintetiza memoria a `context.yaml` con criterio inteligente.

      `deploy.md` y `actualizar.md` los ejecuta hoy el MA con una "excepción al principio
      #10" (puede tocar `prompts/`, `agents/`, `memory/templates/`). Esta excepción ha
      sido históricamente fuente de fricción conceptual:
      - Solapamiento de rol: el MA, que existe para desarrollar el proyecto, hace además
        operaciones de instalación/actualización del propio sistema memsys3.
      - Cláusula ad-hoc en principio #10 ("salvo dogfooting") que reaparece cada vez que
        el sistema se auto-aplica.
      - Fricción operativa concreta detectada por el usuario en sesión 2026-05-12 tras
        un deploy real: el "Paso 2 - Primeros Pasos" del README pide ejecutar
        `compile-context.md` por separado, porque ADR-008 prohíbe al MA compilar.
        El usuario observa: *"creo que debería quedar gestionado todo el deploy, readme
        y compile en un solo paso, esta fricción me parece innecesaria"*.

      La evolución conversacional pasó por cuatro encuadres (MA→CA→subagente→tercer rol)
      antes de converger en la propuesta actual.

    decision: |
      Introducir el **Setup Agent (SA)** como tercer rol agéntico. Responsabilidades
      acotadas y exclusivas:
      - Ejecutar `deploy.md` (instalación inicial de memsys3 en un proyecto).
      - Ejecutar `actualizar.md` (actualización de memsys3 en un proyecto ya desplegado).

      El SA es el agente designado para operaciones de **lifecycle de memsys3 mismo**,
      en contraposición al MA (lifecycle del proyecto) y al CA (síntesis de memoria).

      En el flujo de deploy, el SA realiza inline la compilación inicial de `context.yaml`
      como último paso. Esto NO viola ADR-008 en su espíritu: ADR-008 prohíbe compilar
      en sesiones con tokens acumulados de trabajo de desarrollo. La sesión de deploy
      es de configuración inicial, joven, y su contenido coincide exactamente con los
      inputs del CA (project-status, README, memory.yaml recién escritos). No hay sesgo
      acumulado que la compilación pueda perpetuar.

      **Alcance reducido por diseño**. ADR-028 NO:
      - reformula el principio #10 (queda igual; la tensión "MA toca infraestructura
        para amoldar memsys al dominio" se separa a EXPLORATION-005),
      - reactiva la restricción `infraestructura_memsys3` en `main-agent.yaml`,
      - elimina la "excepción dogfooting" como concepto en PRINCIPLES.md,
      - reorganiza los launchers `commands.md` (mejoras futuras pendientes).

      Decisiones colaterales formalizadas:
      1. **Compilación inline en deploy**: SÍ. Resuelve la fricción que originó el ADR.
         Articulado por qué no viola ADR-008 (ver párrafo anterior).
      2. **Nombre**: "Setup Agent". Conciso, refiere al lifecycle (setup + re-setup
         vía actualizar). Alternativas "Infrastructure Agent" / "Deployment Agent"
         descartadas: ambiguas o suenan a DevOps.
      3. **¿SA en `newSession.md`?**: NO. SA se invoca SOLO al ejecutar
         `/deploy-memsys3` o `/actualizar-memsys3`. `newSession.md` queda limpio.
      4. **Permisos sobre infraestructura**: SA puede modificar `prompts/`, `agents/`,
         `memory/templates/`, `PRINCIPLES.md`, `AGENTS.md` en cualquier proyecto
         (desplegado o dogfooding). Es la única ruta canónica de modificación de
         infraestructura — coherente con ADR-017 ("solo /actualizar-memsys3 bumpa
         file_version") reformulado: "solo el Setup Agent bumpa file_version".
      5. **MA mantiene permisos amplios**: el MA puede seguir tocando infraestructura
         cuando amolde memsys al dominio del proyecto (memsys3 es agnóstico de
         dominio — no solo software dev). La línea exacta queda a explorar en
         EXPLORATION-005.

    alternatives:
      - nombre: "Status quo: MA con excepción al principio #10"
        pros:
          - "Cero refactor, dos agentes en lugar de tres"
        contras:
          - "Solapamiento conceptual: MA hace cosas que no son desarrollo"
          - "Cláusula 'salvo dogfooting' es muleta arquitectónica"
          - "Fricción operativa concreta tras deploy (paso 2 manual)"
        por_que_descartada: |
          El usuario detectó la fricción como problema real en uso (sesión 2026-05-12).
          Mantener el statu quo perpetúa la muleta y la fricción.

      - nombre: "CA absorbe deploy y actualizar"
        pros:
          - "Sigue siendo solo dos agentes"
        contras:
          - "El CA es batch (lee y sintetiza), no conversacional"
          - "Deploy requiere briefing interactivo con el usuario, rompe rol CA"
        por_que_descartada: "Rompe la separación de roles del CA. No encaja."

      - nombre: "Subagente lanzado por MA al final de deploy (Agent tool)"
        pros:
          - "Aprovecha herramientas del modelo (Claude Code)"
        contras:
          - "Específico de tooling (no todos los modelos exponen subagentes)"
          - "Rompe principio #2 (agnosticismo de modelo IA)"
        por_que_descartada: |
          memsys3 debe funcionar con cualquier modelo de IA. Subagentes son una
          feature de algunas herramientas, no un universal.

    consecuencias:
      positivas:
        - "Rol claro: SA cubre el lifecycle de memsys3, MA cubre el lifecycle del proyecto"
        - "Deploy en un solo paso (sin fricción Paso 2 manual)"
        - "Compilación inicial coherente: SA compila justo después de escribir canónicos"
        - "Único punto de modificación de infraestructura (auditable, predecible)"
        - "ADR-017 simplificado: 'solo SA bumpa file_version' (sin enumerar comandos)"
      negativas:
        - "Refactor antes de v1.0.0: agents/setup-agent.yaml + deploy.md + actualizar.md + commands.md descripciones + sincronización dogfooting↔templates"
        - "Riesgo terminológico bajo: 'Setup Agent' puede evocar 'DevAgent/DevAI' erradicado en Frente 5 (ISSUE-026). Mitigación: documentar en ADR-015 update y en `agents/setup-agent.yaml` la distinción"
        - "Un rol más: tres agentes en lugar de dos (más complejidad conceptual inicial, compensada por claridad de límites)"
      impacto: |
        Afecta a:
        - `memsys3/agents/setup-agent.yaml` (CREAR; nuevo archivo + template espejo).
        - `memsys3/agents/main-agent.yaml` (no cambia el rol, sí clarifica que deploy/
          actualizar las ejecuta SA).
        - `memsys3/agents/context-agent.yaml` (declaración explícita de límite: NO
          opera en deploy/actualizar).
        - `memsys3/prompts/deploy.md` (Paso 0: "actúas como Setup Agent"; nuevo paso
          final de compilación inline).
        - `memsys3/prompts/actualizar.md` (Paso 0 análogo).
        - `memsys3/prompts/commands.md` (descripciones de launchers reflejan SA).
        - `memsys3/PRINCIPLES.md` — NO cambia el principio #10 en este ADR (queda
          para EXPLORATION-005); SÍ se actualiza la mención de "solo /actualizar
          bumpa file_version" → "solo Setup Agent".
        - `README.md` raíz y wiki: añadir SA al mapa de agentes.
        - `memsys3_templates/` espejo de los archivos anteriores.

    notes: |
      Origen: sesión 2026-05-12. Fricción operativa detectada por el usuario en deploy
      real ejecutado hoy. Evolución conversacional:
      1. "deploy + readme + compile en un solo paso" (insight del usuario)
      2. "como si lo hicieran CA y MA juntos" (refinamiento)
      3. "que sea CA quien haga deploy" (cuestionamiento del rol del MA)
      4. "setup-agent" (convergencia: tercer rol)

      Decisiones de auditoría previa (subagente Explore, sesión 2026-05-12) que ADR-028
      explícitamente NO adopta:
      - Reactivar restricción infraestructura en MA: rechazado. El usuario argumenta
        que MA debe poder amoldar memsys al dominio del proyecto (principio #2
        extendido a dominio, no solo a modelo).
      - Reformular principio #10: separado a EXPLORATION-005. Tensión flexibilidad
        vs robustez estructural merece exploración propia.
      - Cargar SA en `newSession.md`: rechazado. SA es punctual (solo al ejecutar
        /deploy o /actualizar), no permanente.

      Distinción con conceptos históricos. "Setup Agent" NO es retorno de
      "Development Agent" / "DevAI" (erradicados en BLUEPRINT-001 Frente 5,
      ISSUE-026). Aquellos eran un rename fallido del MA. SA es un **rol adicional
      con responsabilidades disjuntas**, no un rename.

      Items relacionados:
      - EXPLORATION-005 (equilibrio flexibilidad vs robustez estructural): nace de
        esta conversación. Pre-condición para futura reformulación del principio #10.
      - ADR-008 (MA no compila): vigente, articulación de por qué SA inline no la viola.
      - ADR-017 (file_version): simplificada operativamente (SA es el agente
        autorizado, ya no "el comando /actualizar").
      - ADR-018 (sustitución diferencial): operación de SA por excelencia.
      - ADR-023 (scaffold canónico en deploy): operación de SA.
      - ADR-027 (memoria agnóstica multi-modelo + AGENTS.md): propagación AGENTS.md
        en deploy/actualizar es trabajo de SA.

  - id: "027"
    titulo: "Memoria de usuario agnóstica multi-modelo: invariante canónico + AGENTS.md + bridges per-modelo opcionales"
    data: "2026-05-10"
    estado: aceptado
    area: "arquitectura,agnosticismo"

    context: |
      ADR-020 (2026-05-07) fijó `memsys3/memory/memory.yaml` como lugar canónico de
      memoria de usuario/feedback y propuso un bridge `MEMORY.md` en raíz para redirigir
      la auto-memory de Claude Code (inyectada por harness, no desactivable desde
      settings.json). Esa ADR era Claude-específica.

      Investigación posterior (sesión 2026-05-10) catalogó el ecosistema actual de
      agentes IA con memoria/instrucciones por proyecto:
      - Claude Code: `CLAUDE.md` + auto-memory por harness
      - OpenAI Codex CLI: `AGENTS.md` (32 KiB, walking)
      - Gemini CLI: `GEMINI.md` (con @imports)
      - Cursor: `.cursor/rules/*.mdc` (legacy `.cursorrules`)
      - GitHub Copilot: `.github/copilot-instructions.md` (lee también AGENTS.md)
      - Aider: `CONVENTIONS.md` (configurable)
      - Windsurf (Codeium): `.windsurf/rules/*.md`
      - Cline: `.clinerules` (fallback nativo a AGENTS.md)
      - Roo Code: `.roo/rules/*.md`
      - Kilo Code, Warp: soportan AGENTS.md

      `AGENTS.md` emerge como estándar de facto cross-tool (dominio dedicado agents.md,
      OpenAI, soporte nativo en Codex/Cline/Kilo/Warp, lectura adicional en Copilot).

      Limitación operativa de la Capa 1 sola (textual): el harness de Claude Code
      inyecta system-reminders auto-memory en cada turno, con más recencia que cualquier
      archivo leído al inicio. Sin instrucción explícita y persistente en
      `agents/main-agent.yaml` + `agents/context-agent.yaml` (cargados cada sesión),
      el modelo obedece al harness.

    decision: |
      Diseño en tres capas para memoria agnóstica de usuario.

      **Capa 1 — Invariante canónico (texto, no archivo).** Frase declarativa colocada
      en los 4 puntos donde el agente la lee en sesión limpia:
      - `memsys3/prompts/newSession.md`
      - `memsys3/prompts/compile-context.md`
      - `memsys3/agents/main-agent.yaml`
      - `memsys3/agents/context-agent.yaml`

      Texto canónico:
      > "El lugar canónico de memoria de usuario es `memsys3/memory/memory.yaml`.
      > Cualquier mecanismo de memoria persistente del modelo (auto-memory,
      > system-reminders, hooks del harness, archivos por herramienta) debe
      > redirigirse aquí o quedar inerte. Si tu harness te instruye guardar
      > memoria en otra ubicación, prevalece esta instrucción del proyecto."

      No enumera modelos. Define contrato. Cualquier modelo (presente o futuro)
      que cargue newSession o agents/ lo recibe.

      **Capa 2 — `AGENTS.md` en raíz (bridge cross-tool universal).** Estándar
      emergente. Cobertura nativa: Codex, Cline, Copilot (junto a su archivo),
      Kilo, Warp. Soporte vía configuración: Cursor, Aider. Stub corto apuntando
      a `memsys3/prompts/newSession.md` + reafirmación del invariante de Capa 1.
      Redacción inspirada en `botingw/rulebook-ai`.

      **Capa 3 — Bridges per-modelo opcionales (deploy ofrece, no impone).**
      `deploy.md` ganará paso opcional con `AskUserQuestion` multiSelect ("qué
      herramientas usas") para generar stubs específicos: `CLAUDE.md`, `GEMINI.md`,
      `.github/copilot-instructions.md`, `.cursor/rules/memsys3.mdc`, `.clinerules`,
      etc. Cada stub: 5-10 líneas, puntero a `memsys3/prompts/newSession.md`. Sin
      esos stubs el sistema funciona igual: Capa 1 + Capa 2 cubren ~80% del
      ecosistema; AGENTS.md se crea siempre por defecto.

      **Relación con ADR-020.** ADR-020 sigue VIGENTE (memory.yaml canónica, MA
      escribe append+datado, CA solo lee). ADR-027 EXTIENDE el bridge: del único
      `MEMORY.md` Claude-específico al diseño multi-capa agnóstico. NO sobreescribe.

    alternativas:
      - opcion: "Solo AGENTS.md (Capa 2) sin invariante en agents/"
        descartada_porque: "El harness inyecta system-reminders en cada turno con más recencia que un archivo leído al inicio. Sin regla explícita en agents/ (cargado cada sesión), el modelo obedece al harness."
      - opcion: "Solo invariante canónico (Capa 1) sin AGENTS.md"
        descartada_porque: "Codex/Cursor leen archivos al iniciar pero NO ejecutan newSession.md. Sin AGENTS.md no reciben el contrato."
      - opcion: "Crear todos los bridges per-modelo siempre (Capa 3 obligatoria)"
        descartada_porque: "Ensucia raíz con 6+ archivos en proyectos donde el usuario usa solo una herramienta. Mejor opt-in."
      - opcion: "Mantener ADR-020 sola y crear solo AGENTS.md"
        descartada_porque: "ADR-020 sigue redactada Claude-específica. Proyectos desplegados leen ADR-020 como referencia: necesitan un doc canónico que cubra todos los casos."

    consecuencias: |
      **Inmediatas (esta sesión):**
      - Bloque invariante añadido a 4 archivos (newSession.md, compile-context.md,
        main-agent.yaml, context-agent.yaml) en dogfooding + templates.
      - `AGENTS.md` creado en raíz del repo.
      - ADR-020 sigue válida (citada para contrato de memory.yaml); ADR-027 es la
        referencia para estrategia de bridges.

      **Para deploy (sesión futura, no bloqueante v1.0.0):**
      - `deploy.md` ganará paso opcional Capa 3 (AskUserQuestion multiSelect).
      - AGENTS.md se copia siempre por defecto (Capa 2).

      **Para actualizar (sesión futura, no bloqueante):**
      - `actualizar.md` debe propagar AGENTS.md vía lógica análoga al Paso 6.6
        (sustitución diferencial si tiene file_version).

      **Autocurativo (opcional):**
      - endSession puede ofrecer migrar contenido escrito por harness en
        `~/.claude/projects/<hash>/memory/` a memory.yaml y vaciar dir.

    impacto: |
      Cierra el agujero de agnosticismo que dejaba ADR-020. Refuerza Principio #1
      (anti-CDC: archivo canónico para agente fresco sea cual sea su modelo).
      Refuerza Principio #2 (agnosticismo: el contrato no enumera modelos).
      Compatible con Principio #3 (una sola carpeta: los stubs de Capa 3 son
      punteros, no duplican contenido).

    update_2026_05_11: |
      **Refinamiento de Capa 3: trigger declarativo en lugar de AskUserQuestion estático.**

      La decisión original (2026-05-10) preveía Capa 3 como paso de `deploy.md` con
      `AskUserQuestion multiSelect` enumerando herramientas (CLAUDE.md, GEMINI.md,
      .cursor/rules, etc.). Revisión en sesión 2026-05-11 detectó tensión con el
      feedback canonizado el mismo 2026-05-10: "contratos agnósticos: definir
      invariante declarativo, NO enumerar modelos". Enumerar en deploy.md contradice
      el principio.

      Mecanismo nuevo: instrucción declarativa en `newSession.md` (y espejo en
      `main-agent.yaml` si refuerzo necesario) que dice:
      > "Si tu harness tiene un archivo específico de tu herramienta en root para
      > leer instrucciones/memoria (CLAUDE.md, GEMINI.md, .cursor/rules/, .clinerules,
      > .windsurf/rules/, .roo/rules/, .github/copilot-instructions.md, etc.) y NO
      > existe en este proyecto, créalo con el mismo invariante de memoria que
      > AGENTS.md. Si ya existe, añade el invariante sin sobrescribir contenido del
      > usuario. Triggea si te sientes aludido."

      El LLM, al leer newSession.md, evalúa si su propio harness tiene un archivo de
      ese tipo y actúa. No hay lista predefinida que mantener; modelos futuros con
      convenciones nuevas reciben el trigger sin tocar memsys3.

      AGENTS.md (Capa 2) también minimizado a solo el invariante de memoria (no
      reglas operativas redundantes con main-agent.yaml/memory.yaml). Mismo contenido
      que tendrán los stubs Capa 3 cuando un LLM los cree.

      Cancela el pendiente "deploy.md gana paso Capa 3 AskUserQuestion" en
      project-status.yaml. La propagación de stubs es ahora responsabilidad declarativa
      del agente, no procedimental del deploy.

    update_2026_06_03: |
      **El verbo pasivo de la Capa 1 se refina a activo-condicional (ver ADR-030).**

      La Capa 1 de esta ADR dice que la auto-memory del harness "debe redirigirse o quedar
      inerte" (pasivo) y la Capa 3 cubre archivos de INSTRUCCIONES en root. ADR-030 (2026-06-03)
      extiende esto: el agente además RECONCILIA su carpeta de auto-memory (la del harness, no
      root) — si está poblada con memoria de usuario, migra a memory.yaml + vacía; si está
      inerte, no hace nada. Implementa la pasada "autocurativa" que esta ADR previó en sus
      consecuencias y que nunca se implementó. El núcleo de ADR-027 (invariante declarativo
      agnóstico + AGENTS.md + stubs Capa 3) sigue vigente; ADR-030 solo refina el verbo y añade
      tabla de rutas conocidas. Implementación en newSession.md §2.

  - id: "025"
    titulo: "Estrategia dogfooding versionado: memsys3/ se commitea con protocolo anti-leak"
    data: "2026-05-08"
    estado: aceptado
    area: "dogfooding,infrastructure,workflow"

    context: |
      Tras 6 meses de uso real, el repo memsys3 mantiene `memsys3/` (instancia interna
      de dogfooding) commiteado junto a `memsys3_templates/` (producto distribuible).
      La separación agnóstico/específico vive informalmente en README:235-247, sin ADR
      formal que la respalde — la auditoría del Frente 2 (ISSUE-024) confirmó que las
      ADRs 010 y 011 son ausentes en la numeración. Por tanto NO existe "ADR-011 sobre
      separación agnóstico/específico" pese a que múltiples docs y prompts la
      mencionaban como referencia. Esta ADR-025 es la PRIMERA formalización del rol
      de `memsys3/` en el repo, no una extensión de algo previo.

      El incidente IMPROVEMENT-008 (item de dogfooding filtrado a
      memsys3_templates/backlog/, descubierto en Frente 3 y corregido manualmente)
      demostró que el riesgo de leak dogfooding → distribuible es REAL y que la
      disciplina humana/agéntica (recordar revisar antes de commitear) FALLA. Sin
      protocolo sistémico el vector queda abierto: cualquier sesión futura puede
      reintroducir el bug. v1.0 no debe salir con esta puerta sin cerrar.

      Tres opciones evaluadas con el usuario en sesión 2026-05-08:
      A) Statu quo (commitear sin protocolo).
      B) `.gitignore memsys3/`.
      C) Híbrido (commitear + protocolo anti-leak).

    decision: |
      Adoptar Opción C: `memsys3/` se commitea (statu quo conserved) + protocolo
      anti-leak en dos capas:

      **Capa 1 — Hook `pre-commit` (defensa primaria, self-enforcing).**
      Ubicación: `.githooks/pre-commit` (versionable; `.git/hooks/` no se versiona).
      Bash puro, ~20 líneas. Veta cualquier archivo
      `memsys3_templates/backlog/[A-Z]+-[0-9]+-*.md` en `git diff --cached`. Permitido
      en ese directorio: solo `README.md` y `docs/.gitkeep`. Activación una sola vez
      por dev: `git config core.hooksPath .githooks`.

      **Capa 2 — Auditoría en `comprobar_alineamiento.md` (defensa en profundidad).**
      Bloque añadido al prompt (`memsys3/prompts-dev/comprobar_alineamiento.md`) que
      verifica:
      - `ls memsys3_templates/backlog/` solo contiene `README.md` y `docs/`.
      - `find memsys3_templates -name '[A-Z]*-[0-9]*-*.md' -type f` está vacío.
      Esta capa atrapa: hooks bypasseados con `--no-verify`, devs nuevos sin
      `core.hooksPath` configurado, y vectores no anticipados por el patrón del hook.

      **Alcance del hook**: vive en este repo (protección del dev de memsys3 mismo).
      NO se distribuye al scaffold porque los proyectos del usuario no tienen el
      problema "templates vs dogfooding" — su `memsys3/` es solo data del proyecto,
      sin capa distribuible que proteger.

    alternatives:
      - nombre: "A — Statu quo (commitear sin protocolo)"
        pros:
          - "Cero cambios, cero mantenimiento"
          - "Conserva dogfooding visible como ejemplo vivo"
        contras:
          - "Riesgo IMPROVEMENT-008 conocido y NO mitigado"
          - "Confiar en disciplina humana/agéntica = CDC sobre la canonización"
          - "Aceptar un caso documentado es saber que volverá a pasar"
        por_que_descartada: |
          Aceptar un riesgo ya documentado es elegir no protegerse. La disciplina
          ya falló una vez (IMPROVEMENT-008); confiar en que ahora será distinta es
          irrazonable. Anti-CDC requiere mecanismo, no buenas intenciones.

      - nombre: "B — `.gitignore memsys3/`"
        pros:
          - "Aislamiento total del código distribuible"
          - "Cero riesgo de leak por construcción"
        contras:
          - "Pierde dogfooding visible como ejemplo de uso"
          - "Recuperación entre máquinas requiere backup separado"
          - "Incoherente con la propia recomendación de memsys3 a usuarios (deploy.md Paso 8 sugiere INCLUIR memsys3/ en su repo, opción A 'recomendada')"
        por_que_descartada: |
          La incoherencia conceptual ("haz lo que digo, no lo que hago") rompe la
          credibilidad del sistema. Además, perder dogfooding visible elimina un
          vector de validación importante: ver cómo memsys3 se usa a sí mismo es
          parte del valor pedagógico para usuarios externos.

      - nombre: "Mecanismo descartado: regla en actualizar.md"
        contexto: "Dentro de Opción C, alternativa de mecanismo anti-leak."
        por_que_descartada: |
          Capa equivocada. `actualizar.md` corre del lado del usuario que actualiza
          memsys3 en SU proyecto. Los leaks son problema del UPSTREAM (este repo) —
          si llegan a master, ya es tarde. Además bloataría un prompt agnóstico
          crítico con responsabilidades que no son suyas.

      - nombre: "Mecanismo descartado: CI check (GitHub Action)"
        contexto: "Dentro de Opción C, alternativa de mecanismo anti-leak."
        por_que_descartada: |
          No hay pipeline CI activo en el repo actualmente. Sería defensa
          complementaria al PR/push (útil para PRs externos), no sustitutiva del
          hook local. Pospuesto a ISSUE-028 para cuando se establezca CI.

    consecuencias:
      positivas:
        - "Vector IMPROVEMENT-008 cerrado sistémicamente (no por disciplina)"
        - "Dogfooding permanece visible como ejemplo vivo + validación del scaffold"
        - "Coherencia conceptual con la recomendación a usuarios preservada"
        - "Hook agnóstico (bash + git-estándar): no depende de modelo IA ni Claude Code"
        - "Defensa en profundidad (2 capas) cubre bypasses y devs nuevos"
        - "Léxico citable: 'protocolo anti-leak (ADR-025)' como handle para futuras decisiones"
      negativas:
        - "Devs del repo deben activar `git config core.hooksPath .githooks` una sola vez"
        - "Mantenimiento del hook (auditable en 20 líneas, riesgo bajo)"
      impacto: |
        Afecta:
          - `.githooks/pre-commit` (NUEVO)
          - `memsys3/prompts-dev/comprobar_alineamiento.md` (extensión)
          - `README.md` raíz (línea sobre activación de hooks)
          - `memsys3/backlog/ISSUE-028-ci-check-anti-leak.md` (NUEVO, futuro)

    notes: |
      Anclaje a PRINCIPLES.md:
      - #2 (Agnosticismo de modelo IA): hook en bash puro + git-estándar, sin
        dependencia de Claude Code ni de un modelo concreto.
      - #3 (Una sola carpeta): no se modifica la regla; `memsys3/` sigue siendo la
        única carpeta del sistema en el proyecto del usuario. El hook protege
        específicamente la frontera dogfooding/templates EN ESTE REPO.
      - #4 (Human-in-the-loop): hook bloquea, usuario decide. `--no-verify` queda
        como escape válido pero deja huella (anotable en sessions.yaml).
      - #9 (Separation of Concerns): formaliza la frontera templates (agnóstico)
        vs dogfooding (específico) que vivía solo en README:235-247.

      Relación con otras ADRs:
      - Formaliza convención previa que vivía en README:235-247.
      - Complementa ADR-016 (agnosticismo + commands opt-in) en la dimensión
        "qué se versiona y cómo se protege la frontera distribuible".
      - NO es extensión de ADR-011 (inexistente, ISSUE-024 confirma su ausencia).

      Items relacionados:
      - ISSUE-028: CI check anti-leak (futuro, cuando haya pipeline).
      - ISSUE-022: hook pre-commit anti-firma (línea de trabajo paralela; mismo
        mecanismo `.githooks/`, podría compartir infraestructura).
      - IMPROVEMENT-008: incidente histórico que motiva esta ADR (resuelto
        manualmente en Frente 3, ahora protegido sistémicamente).

      Origen: BLUEPRINT-001 Frente 6. Sesión 2026-05-08.

  - id: "026"
    titulo: "Mono-repo + multi-work distribuible (decisiones arquitectónicas v1.0)"
    data: "2026-05-10"
    estado: aceptado
    area: "arquitectura,distribución,workflow"

    context: |
      Pre-release v1.0 emergieron dos decisiones arquitectónicas que requerían
      formalización: (1) separación dev-repo vs distribuible-repo, (2) inclusión
      del sistema multi-work (locks paralelos) en el release v1.0 distribuible.

      Decisión 1 — Mono-repo: la separación agnóstico/específico ya está resuelta
      a nivel de carpeta (ADR-011, ADR-023): `memsys3_templates/` es el producto
      distribuible y `memsys3/` es la instancia dogfooding. Ambos viven en el
      mismo repo `iv0nis/memsys3`. La pregunta era si conviene split en dos repos
      antes de v1.0 (uno público para distribución, uno privado para desarrollo).

      Decisión 2 — Multi-work distribuible: en sesión 2026-05-08 se integró el
      sistema multi-work (`memsys3/prompts/multi_work.md` + `blocked_files_log.md`)
      en modo espejo dogfooding↔templates. La inclusión definitiva en v1.0 quedó
      diferida a Frente 8.

    decision: |
      Decisión 1 — MANTENER MONO-REPO. memsys3 sigue siendo un único repo público
      `iv0nis/memsys3`. La separación carpeta agnóstico/dogfooding es suficiente:
      `memsys3_templates/` se distribuye via deploy.md/actualizar.md, `memsys3/`
      es interno (gitignored selectivamente desde Fase 1 saneamiento privacidad).

      Decisión 2 — MULTI-WORK SE DISTRIBUYE EN v1.0. El sistema de locks paralelos
      (`memsys3/prompts/multi_work.md` + `blocked_files_log.md`) entra en el
      scaffold distribuible (`memsys3_templates/`). Los wildcards de deploy.md y
      actualizar.md ya lo incluyen. Aunque temporal en su origen, demostró valor
      operativo durante BLUEPRINT-001 — la solución es real, no provisional.

    alternatives:
      - nombre: "Split en dos repos (dev privado + público distribuible)"
        pros:
          - "Aislamiento total del dev en repo privado"
          - "Distribuible público sin diary granular"
        contras:
          - "Sync manual entre repos = complejidad alta"
          - "Dos sets de issues/PRs/CI"
          - "Fricción para contribuidores externos (qué repo usar)"
          - "memsys3 es 1 producto cohesionado, no 2 con vidas independientes"
        por_que_descartada: "Coste/beneficio negativo. Privacidad ya resuelta vía gitignore + history rewrite (ver PRIVACY-CLEANUP-PROCEDURE)."

      - nombre: "Eliminar multi-work del scaffold antes de v1.0"
        pros:
          - "Scaffold más mínimo"
          - "Una feature menos que mantener para usuarios externos"
        contras:
          - "Multi-work resuelve problema real (colisiones agentes paralelos humanos)"
          - "Implementación ya validada y agnóstica de modelo"
          - "Quitar y reañadir post-v1.0 es churn innecesario"
        por_que_descartada: "Multi-work demostró valor operativo durante BLUEPRINT-001. Distribuirlo es coherente con su utilidad."

      - nombre: "Multi-work como feature opt-in (NO en scaffold default)"
        pros:
          - "Scaffold más limpio por defecto"
          - "Users que no lo necesitan no lo ven"
        contras:
          - "Complejidad de configuración (¿flag en deploy.md? ¿separate prompt?)"
          - "Discoverability bajo: users que SÍ lo necesitan no saben que existe"
        por_que_descartada: "Multi-work es lightweight (1 prompt + 1 log file). Distribuirlo en scaffold default es mejor UX."

    consecuencias:
      positivas:
        - "Mono-repo simplifica contribuciones externas (un fork, una vista del histórico)"
        - "Multi-work disponible out-of-the-box para usuarios que ejecuten múltiples sesiones humanas paralelas"
        - "Cero coordinación CI entre repos"
        - "Stars/forks/issues centralizados en un único proyecto"
      negativas:
        - "El dogfooding `memsys3/` requiere disciplina de gitignore para no exponer datos personales (ya resuelto Fase 1)"
        - "Multi-work añade ~150 líneas al scaffold distribuido"
      impacto: |
        Afecta: memsys3_templates/prompts/multi_work.md, memsys3_templates/blocked_files_log.md,
        memsys3/agents/main-agent.yaml (bloque coordinacion_paralela ya distribuible),
        deploy.md y actualizar.md (wildcards los incluyen automáticamente).

    notes: |
      Decisión 1 (mono-repo): práctica OSS dominante (React, VS Code, Rust, Linux,
      Next.js, etc.). Multi-repo es excepción raramente justificada (Node.js core
      vs sub-projects con ciclos de release independientes — no aplica a memsys3).

      Decisión 2 (multi-work distribuible): la decisión se tomó tras 2 sesiones
      reales de uso paralelo durante BLUEPRINT-001 que validaron la utilidad.
      El sistema es agnóstico (bash POSIX puro, no depende de Claude Code).

      Decisiones complementarias en sesión 2026-05-09:
      - ISSUE-027 cerrado: principios_fundacionales migrados de memory.yaml a PRINCIPLES.md
      - ISSUE-029 cerrado: commands.md descriptions actualizadas con features post-Frentes 1-6
      - LICENSE MIT añadido en raíz repo

      Origen: BLUEPRINT-001 Frente 8 Bloque 1 decisiones. Sesión 2026-05-09 (continuación
      multi-día desde 2026-05-08).

