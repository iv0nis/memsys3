# ============================================
# ADRs RELEVANTES
# 14 ADRs totales en memory/full/adr.yaml. Incluidas 13 (excluida ADR-004 YAML format por obvia tras implementación)
# ============================================
adrs:
  - id: "001"
    titulo: "Criterio inteligente del Context Agent vs límites arbitrarios"
    decision: "CA usa criterio basado en '¿qué debe saber CUALQUIER agent descontextualizado?'. Límite ÚNICO: 2000 líneas en context.yaml. NO límites arbitrarios por sección."
    motivo: "Sistemas anteriores con límites rígidos (max 7 ADRs, etc.) no se adaptaban. Proyectos pequeños perdían contexto, grandes no podían expresarse."
    impacto: "Filosofía base de todo el sistema. CA decide con visión panorámica."

  - id: "002"
    titulo: "Rotación automática sessions/ADRs (flexible 1800-2000 líneas)"
    decision: |
      Escenario A (1800-2000 líneas): rotar DESPUÉS de documentar (LITE). Copiar sessions.yaml→sessions_N.yaml (incluye sesión actual), nuevo sessions.yaml vacío.
      Escenario B (>2000): rotar ANTES (PRE). Copiar sin sesión actual, documentar en nuevo. Resultado: sesión actual siempre en un único archivo.
    motivo: "Read tool tiene límite 2000 líneas. Aprovechar espacio sin duplicar sesión actual."
    impacto: "Sistema escala infinitamente. Datos preservados (sessions_N.yaml). Validado en rotación real 2025-12-03."

  - id: "003"
    titulo: "Plan de Contingencia con archivado inteligente (>150K tokens)"
    decision: "Si full/ supera 150K tokens, CA mueve ADRs/sessions irrelevantes a memory/history/ (NO se lee). Reduce a ~120K. Datos preservados, recuperables."
    motivo: "Aún con rotación, proyectos muy grandes pueden saturar al CA."
    impacto: "Escalabilidad ilimitada sin perder datos."

  - id: "005"
    titulo: "deploy.md como prompt (no script shell)"
    decision: "Deployment a través de prompt ejecutado por Main Agent que hace briefing interactivo con el usuario. Más flexible que script automático."
    motivo: "Permite personalización inteligente y adaptativa según respuestas."
    impacto: "Workflow estándar de instalación en proyectos nuevos."

  - id: "006"
    titulo: "Sistema de rutas unificado memsys3/"
    decision: "TODAS las rutas en memsys3_templates/ usan prefijo `memsys3/`. Notación @memsys3/ siempre."
    motivo: "Durante deployment, memsys3_templates/ se copia como `memsys3/` en raíz. Portabilidad y claridad."
    impacto: "Funciona en cualquier proyecto. Sin conflictos con carpetas locales."

  - id: "007"
    titulo: "Separación de meta-niveles en READMEs"
    decision: "READMEs por audiencia: README.md raíz (descubre repo), memsys3_templates/README.md (sistema desplegado, agnóstico), DEVELOPMENT.md (desarrolladores), UPDATE.md (actualización)."
    motivo: "Mezclar niveles generaba confusión sobre quién es la audiencia."
    impacto: "Documentación multi-nivel clara. Agents leen sin confusión."

  - id: "008"
    titulo: "Main Agent NO debe proponer compile-context"
    decision: "Main Agent tiene restricción explícita: NO proponer compile-context. Solo sugerir endSession. Compilación SIEMPRE en NUEVA INSTANCIA limpia, decidida por usuario."
    motivo: "compile-context lee TODO memory/full/ (~50K+ tokens). Si Main Agent acumulado lo ejecuta, supera límites + sesgo de sesión."
    impacto: "Eficiencia tokens optimizada. Validado: intento 2026-03-08 con ~100K tokens fue revertido por violar este principio."

  - id: "009"
    titulo: "Templates como documentación activa permanente + gotchas en sessions"
    decision: |
      memory/templates/ NO se borra después del deployment — son guías permanentes que Main Agent consulta.
      Gotchas se documentan en sessions.yaml (contextualizados temporalmente), NO en project-status.yaml.
      CA extrae gotchas de TODAS las sesiones y filtra los ~5 más críticos.
    motivo: "Templates son referencia activa para documentar bien. Gotchas son eventos de sesiones, no características estáticas."
    impacto: "Deployment más simple, Main Agent siempre tiene guía, gotchas con contexto temporal."

  - id: "012"
    titulo: "README como lectura directa vs duplicado en context.yaml"
    decision: "README.md se lee DIRECTAMENTE en newSession.md (identidad actual). NO se incluye en context.yaml. PASO 7 (análisis README) eliminado de compile-context."
    motivo: "README cambia frecuentemente, context se compila ocasionalmente → desincronización inevitable. Separation of Concerns: README=identidad, context=memoria histórica."
    impacto: "Imposible desincronización, ~95 líneas menos en context (~1.4K tokens), compile-context simplificado (-260 líneas). Resuelve IMPROVEMENT-004."

  - id: "013"
    titulo: "Sistema gestión ADRs con prompt dedicado (consistencia arquitectónica)"
    decision: "Crear prompts/adr.md con 3 operaciones (consultar, crear, actualizar) + leyendas integradas (3 estados + 10 áreas). adr.yaml permanece en memory/full/. Documentación integrada en prompt (no README separado)."
    motivo: "Backlog ya tenía interfaz conversacional (backlog.md). ADRs no, generaba inconsistencia arquitectónica."
    impacto: "Sistema consistente y usable. Cambio minimalista (Opción A), validado consultando 10 ADRs existentes."

  - id: "014"
    titulo: "Comandos globales auto-actualizantes con launcher pattern"
    decision: |
      /deploy-memsys3 y /actualizar-memsys3 son launchers: clone temporal del repo + ejecutan prompt del repo + limpian.
      Comandos NO contienen lógica embebida. Siempre ejecutan última versión del repo.
      Prompt commands.md instala/verifica los comandos globales en ~/.claude/commands/.
    motivo: "Mantenimiento centralizado. Si cambia deploy.md/actualizar.md, cada miembro del equipo no necesita actualizar localmente."
    impacto: "Auto-actualización transparente. Onboarding 1 comando. Específico Claude Code (opcional, ADR-016)."

  - id: "015"
    titulo: "Terminología unificada: Main Agent como nomenclatura estándar"
    decision: "'Main Agent' es término estándar único para el agente que usa memsys3. 'Development Agent' y 'DevAI' eliminados. Espacio conceptual reservado para agentes especializados futuros."
    motivo: "Inconsistencia entre 3 términos (Main Agent, Development Agent, DevAI). Si surge especialista en desarrollo, conflicto inevitable."
    impacto: "Erradicado de 15 archivos templates+docs en sesión 2026-04-16. IMPROVEMENT-006 completado de facto."

  - id: "016"
    titulo: "memsys3 agnóstico de modelo de IA + Commands como feature opcional Claude-específica"
    decision: |
      Principio fundamental: memsys3 es agnóstico de modelo IA (funciona con Claude, Gemini, Codex, etc.).
      Jerarquía fuente verdad: memsys3_templates/prompts/ (AGNÓSTICO) → memsys3/prompts/ (ESPECÍFICO proyecto) → .claude/commands/ (LOCAL Claude opcional).
      Commands NO es core, es workaround opcional. Documentación debe dejarlo MUY CLARO.
    motivo: "Surge de bug ISSUE-005 y discusión sobre rol de commands. Commands resuelve limitación Claude Code con .gitignore + @ mentions."
    impacto: "Principio guía decisiones futuras sobre features específicas de modelos. Warnings añadidos en commands.md, README.md, deploy.md, actualizar.md."

