# DECISIONES ARQUITECTÓNICAS CLAVE
decisiones_arquitectonicas:
  - id: "ADR-001"
    titulo: "Criterio inteligente del Context Agent vs límites arbitrarios"
    decision: |
      El Context Agent usa criterio inteligente basándose en la pregunta:
      "¿Qué debe saber CUALQUIER agent descontextualizado para trabajar aquí?"

      Límite ÚNICO: máximo 2000 líneas en context.yaml final.
      NO hay límites arbitrarios para ADRs, sessions, gotchas, etc.

    impacto: "Contexto adaptativo según necesidades del proyecto. CA decide con visión panorámica completa. Proyectos pequeños mantienen todo, proyectos grandes filtran inteligentemente"

    por_que_critico: "Fundamento filosófico del sistema. Diferencia memsys3 de sistemas rígidos con límites arbitrarios"

  - id: "ADR-002"
    titulo: "Rotación automática de sessions/ADRs (flexible 1800-2000 líneas)"
    decision: |
      Sistema de rotación flexible con dos escenarios:

      **Escenario A: 1800 < líneas < 2000** (Rotación LITE post-documentación)
      1. Documentar sesión normalmente en sessions.yaml
      2. DESPUÉS de documentar, si supera 1800 líneas:
         - Copiar sessions.yaml → sessions_N.yaml (incluye sesión actual)
         - Verificar copia (debe tener sesión actual)
         - Crear nuevo sessions.yaml VACÍO (solo header YAML)
      3. Resultado: Sesión actual SOLO en sessions_N.yaml (no duplicación)

      **Escenario B: líneas > 2000** (Rotación PRE-documentación)
      1. ANTES de documentar, rotar:
         - Copiar sessions.yaml → sessions_N.yaml (sin sesión actual)
         - Verificar copia
         - Crear nuevo sessions.yaml vacío
      2. Documentar sesión actual en sessions.yaml NUEVO (desde cero)
      3. Resultado: Sesión actual SOLO en sessions.yaml nuevo

      Context Agent lee TODOS los archivos rotados hasta detectar >150K tokens.

    impacto: "Sistema escala infinitamente, no se pierden datos nunca, rotación automática sin intervención manual"

    ultima_actualizacion: "2025-12-03"
    notes: "UPDATE 2025-12-03: Sistema mejorado tras primera rotación real (sessions.yaml 1849 líneas). Rotación flexible más eficiente: no rota rígidamente en 1800, aprovecha espacio hasta 2000. Evita duplicación documentando dónde queda sesión actual según escenario"

  - id: "ADR-006"
    titulo: "Sistema de rutas unificado memsys3/"
    decision: |
      TODAS las rutas en memsys3_templates/ deben usar el prefijo `memsys3/`:

      - `memsys3/memory/context.yaml`
      - `memsys3/agents/main-agent.yaml`
      - `memsys3/prompts/compile-context.md`
      - etc.

      Razón: Durante deployment, memsys3_templates/ se copia a la raíz del proyecto
      como `memsys3/`, por lo tanto todas las rutas internas funcionan correctamente.

    impacto: "Claridad total: siempre se sabe que es de memsys3. Portabilidad: funciona en cualquier proyecto. Sin conflictos con carpetas del proyecto"

    por_que_critico: "Arquitectura fundamental de cómo se estructuran y referencian todos los archivos del sistema"

  - id: "ADR-008"
    titulo: "Main-Agent NO debe proponer compile-context"
    decision: |
      Main-Agent tiene restricción explícita en agents/main-agent.yaml:
      - NO proponer ejecutar @memsys3/prompts/compile-context.md
      - Solo sugerir endSession al finalizar sesión
      - El user decide cuándo compilar (en nueva instancia limpia)

      compile-context.md debe ejecutarse en una NUEVA INSTANCIA sin tokens acumulados.

    impacto: "Eficiencia de tokens optimizada. Main-Agent se enfoca en desarrollo. Context Agent trabaja con instancia limpia. User controla cuándo compilar"

    por_que_critico: "Evita acumulación innecesaria de tokens. compile-context puede requerir >50K tokens (leer todos los archivos full/)"

  - id: "ADR-009"
    titulo: "Templates como documentación activa permanente + gotchas en sessions"
    decision: |
      **1. memory/templates/ = Guías permanentes:**
      - Main-Agent consulta templates/ durante endSession.md
      - "¿Cómo estructuro esta sesión?" → sessions-template.yaml
      - "¿Qué campos tiene un ADR?" → adr-template.yaml
      - Templates son documentación ACTIVA, no solo guías de deployment
      - NO se borran después del deployment

      **2. Gotchas documentados en sessions.yaml:**
      - Main-Agent documenta gotchas en cada sesión donde aparecen
      - Context-Agent extrae gotchas de TODAS las sesiones
      - CA usa criterio inteligente para seleccionar top 5 más críticos
      - Criterios: criticidad + recencia + impacto
      - project-status.yaml NO contiene gotchas (solo info general del proyecto)

    impacto: "Deployment más simple: copiar todo, no borrar templates/. Main-Agent siempre tiene referencia de cómo documentar correctamente. Gotchas contextualizados (cuándo aparecieron, en qué sesión)"

  - id: "ADR-012"
    titulo: "README como lectura directa vs duplicado en context.yaml"
    decision: |
      README.md se lee DIRECTAMENTE en newSession.md, NO se incluye en context.yaml.

      Cambios implementados:

      1. newSession.md:
         - Agregada instrucción explícita: "Lee README.md del proyecto"
         - Orden de carga: README.md → project-status.yaml → context.yaml
         - README proporciona identidad actual, context proporciona memoria histórica

      2. compile-context.md:
         - ELIMINADO "Paso Previo: Verificar README.md"
         - ELIMINADO "PASO 7: Análisis profundo README"
         - Context Agent ya NO incluye README en el contexto compilado

      Filosofía: Separation of Concerns
      - README = Identidad actual (fuente de verdad, siempre actualizada)
      - context = Memoria histórica (síntesis de aprendizajes)

    impacto: "Imposible desincronización: README siempre es la versión actual. No duplicación: una sola fuente de verdad. ~95 líneas menos en context.yaml (~1.4K tokens ahorrados)"

    por_que_critico: "Resuelve problema de desincronización entre README y context. README es identidad actual, context es memoria histórica - conceptos diferentes"

  - id: "ADR-014"
    titulo: "Sistema de comandos globales auto-actualizantes con launcher pattern"
    decision: |
      Implementar dos decisiones complementarias:

      **1. Launcher Pattern para comandos globales:**
      Los comandos globales (/deploy-memsys3, /actualizar-memsys3) NO contienen lógica real.
      Son "launchers" que:
      1. Clonan repositorio temporalmente: `git clone https://github.com/iv0nis/memsys3 [temp_dir]`
      2. Ejecutan prompt del repo clonado: `@[temp_dir]/memsys3_templates/prompts/[prompt].md`
      3. Limpian temporal: `rm -rf [temp_dir]`

      Ventaja crítica: Comandos siempre ejecutan la ÚLTIMA VERSIÓN del prompt del repositorio,
      sin necesidad de actualizar el comando local.

      **2. Prompt commands.md para instalación automática:**
      Crear memsys3/prompts/commands.md que:
      - Verifica qué comandos globales existen en ~/.claude/commands/
      - Detecta comandos obsoletos o faltantes
      - Pregunta al usuario si sobrescribir (si ya existen)
      - Crea/actualiza todos los comandos globales usando cat heredoc + $HOME
      - Verifica instalación exitosa

      Onboarding simplificado: `@memsys3/prompts/commands.md`

    impacto: "Mantenimiento centralizado: solo actualizar prompts en repo GitHub. Auto-actualización transparente: comandos siempre usan última versión. Consistencia garantizada: todo el equipo usa misma versión. Onboarding 1 comando"

    por_que_critico: "Permite distribución de memsys3 en equipos sin mantenimiento distribuido. Inspirado en herramientas CLI modernas (npx, brew) que auto-actualizan"

  - id: "ADR-015"
    titulo: "Terminología unificada: Main Agent como nomenclatura estándar"
    decision: |
      Adoptar "Main Agent" como terminología estándar ÚNICA para el agente que utiliza memsys3.

      **Razón del nombre:**
      - "Main" indica que es el agente principal del proyecto
      - Deja espacio conceptual para agentes especializados futuros (Development Agent,
        Testing Agent, Documentation Agent, etc.)
      - Ya usado en archivos críticos: main-agent.yaml, ADR-008

      **Decisión:** Main Agent es el agente principal. Si en el futuro surge necesidad
      de agentes especializados, podrán tener nombres específicos sin conflicto.

    impacto: "Terminología consistente en todo el sistema. Espacio conceptual claro para agentes especializados futuros. Nombre refleja su rol: agente principal del proyecto"

    por_que_critico: "Resuelve inconsistencia terminológica (Development Agent vs Main Agent vs DevAI) y previene conflictos futuros con agentes especializados"

  - id: "ADR-016"
    titulo: "memsys3 agnóstico de modelo de IA + Commands como feature opcional Claude-específica"
    decision: |
      **Principio fundamental: memsys3 es agnóstico de modelo de IA**

      **Arquitectura de fuente de verdad:**
      1. memsys3_templates/prompts/ = AGNÓSTICOS (producto final distribuible, funcionan en cualquier modelo)
      2. memsys3/prompts/ = ESPECÍFICOS del proyecto (pueden adaptarse/personalizarse)
      3. .claude/commands/ = COMANDOS LOCALES (workaround opcional Claude-específico)

      **Flujo de sincronización:**
      ```
      memsys3_templates/prompts/ (AGNÓSTICO)
          ↓ deployment/actualización
      memsys3/prompts/ (ESPECÍFICO, puede adaptarse)
          ↓ sincronización opcional
      .claude/commands/ (COMANDOS LOCALES, solo si usas Claude Code + .gitignore)
      ```

      **Decisiones concretas:**
      1. Commands NO es parte del core de memsys3
      2. Commands es un workaround opcional específico de Claude Code
      3. La documentación debe dejar MUY CLARO que commands es OPCIONAL
      4. Deployment/actualización incluye commands.md (es un prompt válido), pero documentado como feature opcional
      5. Usuarios de Gemini, Codex, u otros modelos pueden IGNORAR completamente los commands

    impacto: "memsys3 mantiene su principio fundamental: agnóstico de modelo de IA. Usuarios de Gemini, Codex, otros modelos pueden usar memsys3 sin confusión. Jerarquía de fuente de verdad bien definida: templates → prompts → commands"

    por_que_critico: "Documenta principio arquitectónico FUNDAMENTAL de memsys3. Surgió de bug ISSUE-005 y discusión sobre rol de commands. Filosofía clave: memsys3 es una herramienta universal. Features específicas de herramientas (Claude, Gemini, etc.) son bienvenidas como OPCIONALES, pero NUNCA como obligatorias"

# SESSIONS RECIENTES (síntesis inteligente)
sessions_recientes:
  - id: "2025-12-30-bug-fix-issue-005-adr-016-agnostico"
    data: "2025-12-30"
    duracion: "~2.5h"
    titulo: "Bug Fix ISSUE-005 + ADR-016: Principio Agnóstico memsys3"

    highlights:
      - "Bug crítico ISSUE-005 confirmado: actualizar.md PASO 6.1 no copiaba 3 prompts (adr.md v0.8.0, backlog.md v0.7.0, commands.md v0.8.1)"
      - "Caso real reportado por usuario: Taller Colomer (v0.6.1→v0.8.1) perdió adr.md tras actualización"
      - "Colaboración con instancia que hizo actualización: confirmación exhaustiva del bug (seguido literalmente actualizar.md que no incluía archivos)"
      - "Fix manual aplicado (Opción A): agregadas 3 líneas cp en actualizar.md PASO 6.1. Sincronizado templates + dog-fooding"
      - "Patrón detectado: 3 archivos olvidados en 3 versiones diferentes → deuda técnica sistemática"
      - "ADR-016 creada: memsys3 agnóstico modelo IA (PRINCIPIO FUNDAMENTAL). Commands es workaround OPCIONAL Claude-específico"
      - "Arquitectura fuente verdad clara: templates (agnóstico) → prompts (específico) → commands (opcional Claude)"
      - "Documentación actualizada: commands.md (warning OPCIONAL), README.md (compatibilidad agnóstica)"
      - "ISSUE-006 creado (alta prioridad): backups memsys3_backup_*/ pueden versionarse en git si memsys3/ NO está en .gitignore → riesgo seguridad"
      - "FEATURE-004 creado (media prioridad): detectar y preservar prompts/agents del proyecto durante deploy/actualizar"

    decisions:
      - "memsys3 es agnóstico de modelo de IA (Claude, Gemini, Codex, etc.) - PRINCIPIO FUNDAMENTAL"
      - "Commands como workaround opcional Claude-específico (NO parte del core)"
      - "Fix manual (Opción A) aplicado inmediatamente, Opción B (loop automático) pendiente evaluación"
      - "Backups memsys3_backup_*/ SIEMPRE deben estar en .gitignore (independiente de si memsys3/ está versionado)"

    gotchas:
      - tipo: "gotcha"
        problema: "Backups de memsys3 (memsys3_backup_*/) pueden versionarse en git si memsys3/ NO está en .gitignore (Opción B deploy)"
        solucion: "Agregar regla explícita a .gitignore durante deploy/actualizar: grep -q 'memsys3_backup_' .gitignore || echo 'memsys3_backup_*/' >> .gitignore"
        criticidad: "alta"

      - tipo: "gotcha"
        problema: "Patrón de deuda técnica: 3 archivos olvidados en actualizar.md en 3 versiones diferentes (backlog.md v0.7.0, adr.md v0.8.0, commands.md v0.8.1)"
        solucion: "Cada nuevo prompt debe recordarse agregar manualmente a actualizar.md PASO 6.1. Considerar Opción B (loop automático) para prevenir olvidos futuros"
        criticidad: "media"

  - id: "2025-12-17-terminologia-main-agent"
    data: "2025-12-17"
    duracion: "~30min"
    titulo: "ADR-015 + IMPROVEMENT-006: Unificación Terminología 'Main Agent'"

    highlights:
