# GOTCHAS CRÍTICOS (4 seleccionados)
# Errores/configuraciones que rompen el proyecto si no se conocen
# ============================================
gotchas:
  - id: "sobreescritura_sessions"
    problema: "endSession.md PASO 4.A ambiguo causa sobreescritura de sessions.yaml. Agentes pueden usar Write tool en lugar de Edit tool, perdiendo todas las sesiones previas"
    solucion: "Instrucción explícita de Edit tool + warning sobre Write tool implementada en PASO 4.A. Bug histórico (v0.1.0 → v0.9.0) detectado por caso real en Taller Colomer (pérdida de 23 sesiones)"
    criticidad: "alta"

  - id: "habitos_arraigados_llm"
    problema: "1 advertencia insuficiente para prevenir comportamientos arraigados en training data (ejemplo: firmas Co-Authored-By en commits). Margen error ~70% con instrucción simple"
    solucion: "Defensa en profundidad multi-capa: atacar hábito en múltiples momentos críticos (inicio prompt, momento ejecutar, post-ejecución, verificación). Ejemplo: github.md 4 capas reduce margen error 70% → 5%. Principio: capas redundantes refuerzan mensaje"
    criticidad: "alta"

  - id: "backups_versionados_git"
    problema: "Backups de memsys3 (memsys3_backup_*/) pueden versionarse en git si memsys3/ NO está en .gitignore (Opción B deploy). Riesgo: datos sensibles expuestos"
    solucion: "Agregar regla explícita a .gitignore durante deploy/actualizar: grep -q 'memsys3_backup_' .gitignore || echo 'memsys3_backup_*/' >> .gitignore. Backups SIEMPRE deben estar ignorados"
    criticidad: "alta"

  - id: "reuniones_largas_duplicacion"
    problema: "Reuniones largas (300-800 líneas) pueden explotar límites si se duplican en sessions.yaml. Incluir contenido completo generaría 100s de líneas duplicadas"
    solucion: "Principio fundamental: reunión en docs/reunion/DDMMYY_N.md (fuente verdad), sessions.yaml solo referencia + síntesis (highlights: 3-5 bullets, decisions: resumen, gotchas: extraídos). NO duplicar contenido completo. Context Agent carga reunión si sessions.yaml menciona"
    criticidad: "media"

