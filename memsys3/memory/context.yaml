      descripcion: "actualizar.md PASO 6.1 no copiaba 3 prompts nuevos: adr.md (v0.8.0), backlog.md (v0.7.0), commands.md (v0.8.1). Caso real: Taller Colomer (v0.6.1→v0.8.1) perdió adr.md"
      solucion: "Fix manual aplicado (Opción A): agregadas 3 líneas cp. Opción B (loop automático) evaluada pero pendiente"
      causa_raiz: "Patrón de olvido sistemático: 3 archivos olvidados en 3 versiones diferentes"

    - codigo: "FEATURE-004"
      titulo: "Detectar prompts/agents del proyecto"
      prioridad: "media"
      estado: "propuesto"
      descripcion: "Detectar y preservar /prompts o /agents existentes en raíz del proyecto (fuera de memsys3/) durante deployment/actualización"
      workflow_propuesto: "1) Detección automática directorios existentes, 2) Consulta al usuario (listar, usar como fuente info, ignorar), 3) Opcional: usar para personalizar deployment, 4) Preservación en backup (memsys3_backup_original/)"
      casos_uso: "Proyectos con deploy-production.md, test-runner.yaml propios"

# GOTCHAS CRÍTICOS
gotchas_criticos:
  - id: "backup_versionado"
    tipo: "gotcha"
    problema: "Backups de memsys3 (memsys3_backup_*/) pueden versionarse en git si memsys3/ NO está en .gitignore (Opción B deploy PASO 8)"
    solucion: "Agregar regla explícita a .gitignore durante deploy/actualizar: grep -q 'memsys3_backup_' .gitignore || echo 'memsys3_backup_*/' >> .gitignore. Backups SIEMPRE deben estar ignorados independientemente de si memsys3/ está versionado"
    criticidad: "alta"
    impacto: "Puede exponer datos sensibles (sessions, decisiones, gotchas) en repositorio público. Inflado innecesario del repositorio"
    contexto: "Descubierto sesión 2025-12-30. ISSUE-006 creado (alta prioridad)"

  - id: "deuda_tecnica_actualizar"
    tipo: "gotcha"
    problema: "Patrón de deuda técnica: 3 archivos olvidados en actualizar.md en 3 versiones diferentes (backlog.md v0.7.0, adr.md v0.8.0, commands.md v0.8.1)"
    solucion: "Cada nuevo prompt debe recordarse agregar manualmente a actualizar.md PASO 6.1. Considerar Opción B (loop automático for file in memsys3_templates/prompts/*.md) para prevenir olvidos futuros. Implementar checklist o verificación post-update"
    criticidad: "media"
    impacto: "Proyectos actualizados pierden archivos nuevos sin darse cuenta. Caso real confirmado: Taller Colomer v0.6.1→v0.8.1 perdió adr.md"
    contexto: "ISSUE-005 creado y resuelto con fix manual. Opción B (automatización) pendiente evaluación"

  - id: "write_tool_tilde"
    tipo: "bug"
    problema: "Write tool genera path incorrecto /home/xevivim/ al intentar crear ~/.claude/commands/archivo.md (usuario inexistente)"
    solucion: "Usar $HOME explícito o crear directorio con mkdir bash primero, luego Write con path absoluto. Workaround: cat heredoc con $HOME explícito"
    criticidad: "media"
    impacto: "Creación de comandos globales falla si no se usa workaround. Bug interno de Write tool al expandir ~"
    contexto: "Descubierto sesión 2025-12-09. Bug aparece al expandir ~ cuando directorio ~/.claude/commands/ no existe previamente"

  - id: "launcher_confirmacion_bash"
    tipo: "limitation"
    problema: "Launchers globales (/actualizar-memsys3, /deploy-memsys3) requieren confirmación manual de Bash para cada git clone/pull"
    solucion: "Aprovechar como feature de seguridad para validación paso a paso. Usuario puede aprobar directorio específico ('Yes, and don't ask again...') para evitar múltiples confirmaciones"
    criticidad: "baja"
    impacto: "Requiere interacción manual adicional durante ejecución de comandos globales, pero útil para seguridad y testing"
    contexto: "Descubierto sesión 2025-12-15 (testing /actualizar-memsys3). SlashCommand launcher puede auto-ejecutarse, pero Bash calls internos no heredan aprobación. Permite validar cada comando git antes de ejecutar"

  - id: "git_tags_necesarios"
    tipo: "gotcha"
    problema: "actualizar.md DEPENDE de git tags para funcionar (git log, diff entre versiones). Git tags NO son opcionales"
    solucion: "SIEMPRE crear git tags en cada release usando github.md. Tags son fuente de verdad única de versionado (no versión interna en README)"
    criticidad: "alta"
    impacto: "Sin git tags, actualizar.md no puede detectar versión actual ni comparar cambios entre versiones. Sistema de actualización completamente roto"
    contexto: "Descubierto sesión 2025-12-11 durante resolución ISSUE-002. Unificado versionado en v0.x.x con git tags como fuente de verdad"

# DECISIONES CLAVE DEL PROYECTO
decisions_clave:
  filosofia: "Criterio inteligente del CA, NO límites arbitrarios (ADR-001)"
  agnosticismo: "memsys3 funciona en CUALQUIER modelo de IA (Claude, Gemini, Codex, etc.). Commands es OPCIONAL y Claude-específico (ADR-016)"
  escalabilidad: "Rotación automática (ADR-002) + archivado inteligente (Plan Contingencia >150K tokens)"
  preservacion: "Datos SIEMPRE preservados (history/, sessions_N.yaml, adr_N.yaml)"
  rutas: "Sistema unificado memsys3/ para portabilidad y claridad (ADR-006)"
  documentacion: "Meta-niveles separados según audiencia (README repo, README templates, DEVELOPMENT, UPDATE)"
  workflow: "Main-Agent NO compila, solo sugiere endSession. compile-context en instancia limpia (ADR-008)"
  templates: "memory/templates/ son guías permanentes, NO se borran post-deployment (ADR-009)"
  gotchas: "Se documentan en sessions.yaml (contextualizados), NO en project-status"
  deployment: "Clone temporal memsys3_temp, copiar, briefing con templates, borrar temp"
  backlog: "Sistema unificado: memsys3/backlog/ (dog-fooding con items reales) + memsys3_templates/backlog/ (distribuible, solo README)"
  notacion_rutas: "Estándar @memsys3/ siempre (notación Claude Code, funciona en otros modelos como instrucción directa)"
  readme: "README lectura directa en newSession (identidad actual), NO en context (memoria histórica). Separation of Concerns (ADR-012)"
  versionado: "Git tags = fuente de verdad única. actualizar.md DEPENDE de tags (git log, diff). github.md SIEMPRE propone tag con justificación"
  comandos_globales: "Launcher pattern: comandos clonan repo y ejecutan prompts actualizados. Mantenimiento centralizado (ADR-014)"
  terminologia: "Main Agent = agente principal. Deja espacio para agentes especializados futuros (Development Agent, Testing Agent, etc.) (ADR-015)"

