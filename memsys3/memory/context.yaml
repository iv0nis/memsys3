    decisiones:
      - "Documentar la observación en el backlog en lugar de implementar inmediatamente (requiere análisis detallado de cada prompt)"
      - "Prioridad Media: no es urgente, sistema actual funciona correctamente"

  - id: "2025-11-14-mejora-context-agent-analisis-readme-backlog"
    data: "2025-11-14"
    duracion: "~3h"
    que_es_va_fer:
      - "MEJORA CRÍTICA compile-context.md: Análisis profundo README automático (PASO 7 obligatorio)"
      - "10 categorías exhaustivas (A-J) con evidencia concreta: Versión, Features, Decisiones arquitectónicas, Stack, Prompts, Pendientes, Gotchas, Backlog, Enlaces, Historial"
      - "Reporte estructurado automático con 3 niveles de severidad (🔴 CRÍTICA, 🟡 IMPORTANTE, 🟢 MEJORA)"
      - "Optimización: CA usa datos ya en memoria (200K tokens), NO releer archivos"
      - "FEATURE NUEVA: Integración backlog con lectura selectiva (Opción B)"
      - "Fase 1 ampliada: Lee backlog/README.md + cuenta items + lee SOLO items referenciados en pendientes_prioritarios"
    decisiones:
      - "Análisis README debe ser AUTOMÁTICO (PASO 7 en Fase 2), no pregunta opcional. Motivo: CA ya tiene TODO en memoria después de compilar context.yaml, aprovechar 200K tokens evita relecturas"
      - "Backlog: Elegida Opción B (lectura selectiva) vs A (no leer) o C (leer todo). Justificación: Escalable, eficiente (lee solo referenciados), contextual (da visión futuro)"
    meta_aprendizaje:
      - "Context Agent tiene 200K tokens de contexto - debe aprovecharse haciendo análisis en el mismo flujo de compilación, no como paso posterior opcional"
      - "Lectura selectiva es clave para escalabilidad: leer TODO el backlog puede saturar tokens, leer NADA pierde contexto. Opción B (selectiva) es el balance correcto"

  - id: "2025-11-14-feature-backlog-distribuible"
    data: "2025-11-14"
    duracion: "~2h"
    que_es_va_fer:
      - "Sistema Backlog convertido de feature específica (docs/backlog/) a feature distribuible (memsys3/backlog/)"
      - "README.md agnóstico creado (315 líneas) con 3 ejemplos ilustrativos integrados (ISSUE, FEATURE, IMPROVEMENT)"
      - "Prompt backlog.md mejorado (38 líneas) con 3 operaciones: Consultar, Crear, Actualizar (antes solo Crear)"
      - "Desplegado en 4 ubicaciones: memsys3_templates/, memsys3/, Fundamentos de Programación, pokerezza-html"
      - "Migración completa: 3 items movidos de docs/backlog/ a memsys3/backlog/ (ISSUE-001, IMPROVEMENT-001, FEATURE-002)"
      - "Eliminado docs/backlog/ completamente: sistema unificado en memsys3/backlog/"

  - id: "2025-11-13-fix-endsession-history-folder"
    data: "2025-11-13"
    duracion: "~1h"
    que_es_va_fer:
      - "Fix endSession.md: agregado warning explícito que NO se deben crear archivos en memory/history/ durante sesiones normales"
      - "Aclarado que memory/history/ es SOLO para archivado del Plan de Contingencia (ADR-003, cuando full/ supera 150K tokens)"
      - "Limpiado CLIENT_A: movidos 3 archivos incorrectos de history/ a history_backup/"

# ============================================
# GOTCHAS CRÍTICOS (8 totales, 5 incluidos)
# Priorizados por criticidad + recencia + impacto
# ============================================
gotchas:
  - id: "limitacion_mentions_gitignore"
    problema: "@ mentions NO funcionan cuando archivos están en .gitignore (limitación de seguridad Claude Code)"
    solucion: "Usar instrucciones directas: 'Ejecuta memsys3/prompts/newSession.md' en lugar de @memsys3/prompts/newSession.md"
    criticidad: "alta"
    contexto: "Detectado en CLIENT_A al excluir memsys3/ de git. Sistema funciona perfectamente, solo cambia la forma de invocar prompts. ADR-010 documenta el workaround."

  - id: "endsession_no_crear_history"
    problema: "endSession.md sin warning explícito puede causar que agentes creen archivos detallados en memory/history/ (confundiendo su propósito: Plan Contingencia vs documentación activa)"
    solucion: "Agregar warning explícito: '⚠️ NO crear archivos detallados en memory/history/ - toda la info va DIRECTAMENTE en sessions.yaml'. Aclarar que history/ es SOLO para archivado >150K tokens"
    criticidad: "media"
    contexto: "Detectado en CLIENT_A donde 3 sesiones crearon archivos incorrectos (session-2025-11-13-*.yaml). Campo arxiu_detall inventado por agente no está en diseño original."

  - id: "deploy_proteccion_sobrescritura"
    problema: "deploy.md sin verificaciones puede sobrescribir datos al ejecutarse dos veces"
    solucion: "Verificar si memsys3/ existe antes de mkdir. Limpiar memsys3_temp/ si existe de ejecución previa"
    criticidad: "alta"
    contexto: "Previene pérdida de datos en deployment. deploy.md ahora incluye estas verificaciones."

  - id: "estructura_antigua_incompatible"
    problema: "Estructura pre-ADR-006 puede coexistir con estructura nueva sin migrar datos"
    solucion: "Detectar con: ls -la memory/ && ls -la memsys3/ → si ambos existen, verificar cuál tiene datos reales"
    criticidad: "alta"
    contexto: "CLIENT_B tenía /memory con datos reales + /memsys3 con datos template. Context Agent leería datos incorrectos. actualizar.md tiene PASO 0 para detectar este escenario."

  - id: "yaml_keys_vs_valores"
    problema: "Traducir 'keys YAML' NO es lo mismo que traducir 'valores descriptivos YAML' - son dos tareas diferentes y ambas necesarias"
    solucion: "Después de traducir keys estructurales (descripcio:), hacer verificación exhaustiva con grep de palabras catalanas distintivas (automàtica, rotació, intel·ligent, etc.) en TODO el contenido, no solo en keys. Usar sed con word boundaries (\\b) para correcciones masivas seguras."
    criticidad: "alta"
    contexto: "FASE 3 tradujo correctamente keys YAML pero dejó valores descriptivos en catalán (101 instancias)"

