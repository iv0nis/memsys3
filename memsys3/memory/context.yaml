# Context - memsys3
# Compilado automáticamente por Context Agent
# Este es el contexto optimizado que los Development Agents leen al iniciar sesión
#
# NOTA: README.md se lee directamente en newSession.md (ADR-012: identidad actual del proyecto)
#       context.yaml contiene solo memoria histórica (sessions, ADRs, gotchas)

metadata:
  compilado_por: "Context Agent"
  ultima_compilacion: "2025-12-04"
  version_context: "1.10"

# ============================================
# PROJECT INFO
# ============================================
project:
  nombre: "memsys3"
  descripcion: "Sistema de gestión de contexto para AI Development Agents"
  fase: "Development v1.9"
  ultima_feature: "IMPROVEMENT-004 completado + Sistema rotación flexible documentado. README lectura directa en newSession (Separation of Concerns). compile-context sin PASO 7 (-260 líneas). ADR-012 creado. Primera rotación real ejecutada (sessions_1.yaml, 1849 líneas). Sistema rotación mejorado: flexible 1800-2000 (post-documentar LITE) vs >2000 (pre-documentar). endSession.md + ADR-002 actualizados con 2 escenarios. Resuelto conflicto IMPROVEMENT-001 vs 004. 13 archivos (+445/-2515 líneas). ~3h."
  siguiente_milestone: "Testing compile-context sin README + Validar rotación flexible + Reconsiderar IMPROVEMENT-001"

# ============================================
# FEATURES OPERATIVAS
# ============================================
features:
  context_agent:
    nombre: "Context Agent"
    estado: "operativo"
    descripcion: "Agente que compila contexto completo con criterio inteligente (máx 2000 líneas). Filosofía: '¿Qué debe saber CUALQUIER agent descontextualizado?'"

  rotacion_automatica:
    nombre: "Rotación Automática Flexible"
    estado: "operativo"
    descripcion: "Sistema rotación sessions/ADRs flexible: 1800-2000 líneas (post-documentar LITE) vs >2000 (pre-documentar). Evita duplicación sesión actual"

  plan_contingencia:
    nombre: "Plan de Contingencia"
    estado: "operativo"
    descripcion: "Archivado inteligente a history/ cuando >150K tokens. Reduce a ~120K preservando datos"

  visualizador:
    nombre: "Memory Visualizer"
    estado: "operativo"
    descripcion: "Dashboard web para ver la 'mente' de los agentes (4 pestañas: Agent View, Full History, Project Status, Stats)"

  prompts:
    nombre: "Prompts Reutilizables"
    estado: "operativo"
    descripcion: "newSession, endSession, compile-context, mind, deploy, actualizar, actualizar_cat, backlog, github - TODOS con rutas memsys3/"

  sistema_rutas:
    nombre: "Sistema de Rutas Unificado"
    estado: "operativo"
    descripcion: "TODAS las rutas usan prefijo memsys3/ para portabilidad y claridad (ADR-006)"

  backlog_distribuible:
    nombre: "Sistema Backlog Distribuible"
    estado: "operativo"
    descripcion: "memsys3/backlog/ con README agnóstico (315 líneas) + 3 ejemplos ilustrativos + prompt backlog.md (3 operaciones: consultar, crear, actualizar). 6 tipos de items: ISSUE, FEATURE, SPEC, BLUEPRINT, IMPROVEMENT, EXPLORATION"

  readme_separado:
    nombre: "README Lectura Directa"
    estado: "operativo"
    descripcion: "README.md se lee directamente en newSession (ADR-012). Separation of Concerns: README = identidad actual, context = memoria histórica"

# ============================================
# STACK TECNOLÓGICO
# ============================================
stack:
  frontend: "HTML/CSS/JS (visualizador web)"
  backend: "Python 3.x (servidor visualizador)"
  database: "Ninguno (YAML files como almacenamiento)"
  deploy: "GitHub + clonado local"
  lenguaje_docs: "YAML + Markdown"

# ============================================
# URLS PRINCIPALES
# ============================================
urls:
  repository: "https://github.com/iv0nis/memsys3"

# ============================================
# ADRs RELEVANTES (12 totales, 8 incluidas)
# Seleccionadas con criterio inteligente según impacto global
# ============================================
adrs:
  - id: "001"
    titulo: "Criterio inteligente del Context Agent vs límites arbitrarios"
    decision: "El Context Agent usa criterio inteligente basándose en la pregunta: '¿Qué debe saber CUALQUIER agent descontextualizado para trabajar aquí?'. Límite ÚNICO: máximo 2000 líneas en context.yaml final. NO hay límites arbitrarios para ADRs, sessions, gotchas, etc."
    motivo: "Los sistemas anteriores usaban límites rígidos (máx 7 ADRs, máx 15 líneas por sesión) que no se adaptaban a la realidad del proyecto. Proyectos pequeños perdían contexto, proyectos grandes no podían expresarse adecuadamente."
    impacto: "Contexto adaptativo según necesidades del proyecto. CA decide con visión panorámica completa. Proyectos pequeños mantienen todo, proyectos grandes filtran inteligentemente. Más flexible y escalable."

  - id: "002"
    titulo: "Rotación automática de sessions/ADRs (flexible 1800-2000 líneas)"
    decision: |
      Sistema de rotación flexible con dos escenarios:

      **Escenario A: 1800 < líneas < 2000** (Rotación LITE post-documentación)
      1. Documentar sesión normalmente en sessions.yaml
      2. DESPUÉS de documentar, si supera 1800 líneas:
         - Copiar sessions.yaml → sessions_N.yaml (incluye sesión actual)
         - Verificar copia (debe tener sesión actual)
         - Crear nuevo sessions.yaml VACÍO (solo header YAML)
      3. Resultado: Sesión actual SOLO en sessions_N.yaml (no duplicación)

      **Escenario B: líneas > 2000** (Rotación PRE-documentación)
      1. ANTES de documentar, rotar:
         - Copiar sessions.yaml → sessions_N.yaml (sin sesión actual)
         - Crear nuevo sessions.yaml vacío
      2. Documentar sesión actual en sessions.yaml NUEVO
      3. Resultado: Sesión actual SOLO en sessions.yaml nuevo

      Context Agent lee TODOS los archivos rotados hasta detectar >150K tokens.
    motivo: "Read tool tiene límite de 2000 líneas. Si sessions.yaml o adr.yaml crecen demasiado, agents no pueden leerlos. Sistema mejorado tras primera rotación real (sessions.yaml 1849 líneas) aprovecha espacio disponible 1800-2000 y evita duplicación"
    impacto: "Sistema escala infinitamente. No se pierden datos nunca. Automático sin intervención manual. Rotación flexible más eficiente: no rota rígidamente en 1800, aprovecha espacio hasta 2000. Evita duplicación: sesión actual solo en un archivo"

  - id: "003"
    titulo: "Plan de Contingencia con archivado inteligente (>150K tokens)"
    decision: |
      Cuando total de full/ supera 150K tokens:
      1. CA identifica ADRs/sessions irrelevantes con criterio inteligente
      2. Los mueve a memory/history/ (que NO se lee)
      3. Reduce a ~120K tokens
      4. Continúa compilación normal

      Datos en history/ están preservados, recuperables si es necesario.
    motivo: "Incluso con rotación, proyectos muy grandes pueden acumular demasiados datos. Si full/ (con todos los archivos rotados) supera 150K tokens, el CA no puede procesarlo eficientemente."
    impacto: "Ahorro real de tokens (history/ NO se lee). Datos preservados, no perdidos. Sistema escala ilimitadamente. Reversible (puedes recuperar de history/)."

  - id: "005"
    titulo: "deploy.md como prompt (no script shell)"
    decision: |
      Crear prompts/deploy.md que el Main-Agent ejecuta.
      El agent hace briefing con user para personalizar el deployment:
      - Pregunta sobre proyecto, stack, comportamiento
      - Copia templates
      - Crea archivos específicos basándose en respuestas

      Más flexible que script automático.
    motivo: "Necesitábamos manera de desplegar memsys3 en nuevos proyectos. Script shell automático no puede hacer briefing con user ni adaptarse a respuestas"
    impacto: "Deployment guiado e inteligente. Personalización según necesidades. Agent puede adaptarse a respuestas. Consistente con filosofía de prompts"

  - id: "006"
    titulo: "Sistema de rutas unificado memsys3/"
    decision: |
      TODAS las rutas en memsys3_templates/ deben usar el prefijo `memsys3/`:

      - `memsys3/memory/context.yaml`
      - `memsys3/agents/main-agent.yaml`
      - `memsys3/prompts/compile-context.md`
      - etc.

      Razón: Durante deployment, memsys3_templates/ se copia a la raíz del proyecto
      como `memsys3/`, por lo tanto todas las rutas internas funcionan correctamente.

      Además:
      - compile-context.md debe referenciar explícitamente `memsys3/agents/context-agent.yaml`
      - main-agent.yaml incluye restricción de NO proponer compile-context.md
      - READMEs separados por meta-nivel (repositorio vs sistema desplegado)
    motivo: "Durante el desarrollo inicial se creó confusión sobre las rutas en el sistema. Los prompts referencian archivos usando rutas relativas, pero cuando memsys3 se despliega en diferentes proyectos, esas rutas deben ser consistentes."
    impacto: "Claridad total: siempre se sabe que es de memsys3. Portabilidad: funciona en cualquier proyecto. Actualizable: fácil saber qué archivos actualizar. Sin conflictos con carpetas del proyecto."

  - id: "008"
    titulo: "Main-Agent NO debe proponer compile-context"
    decision: |
      Main-Agent tiene restricción explícita en agents/main-agent.yaml:
      - NO proponer ejecutar @memsys3/prompts/compile-context.md
      - Solo sugerir endSession al finalizar sesión
      - El user decide cuándo compilar (en nueva instancia limpia)

      compile-context.md debe ejecutarse en una NUEVA INSTANCIA sin tokens acumulados.
    motivo: "El Main-Agent trabaja durante sesiones acumulando tokens. compile-context.md requiere leer TODOS los archivos de memory/full/ (puede ser >50K tokens). Si Main-Agent propone ejecutar compile-context, acumula tokens de sesión + tokens de leer todo memory/full/ + tokens de generar context.yaml. Ineficiente y puede superar límites"
    impacto: "Eficiencia de tokens optimizada. Main-Agent se enfoca en desarrollo. Context Agent trabaja con instancia limpia. User controla cuándo compilar"

  - id: "009"
    titulo: "Templates como documentación activa permanente + gotchas en sessions"
    decision: |
      **1. memory/templates/ = Guías permanentes:**
      - Main-Agent consulta templates/ durante endSession.md
      - "¿Cómo estructuro esta sesión?" → sessions-template.yaml
      - "¿Qué campos tiene un ADR?" → adr-template.yaml
      - Templates son documentación ACTIVA, no solo guías de deployment
      - NO se borran después del deployment

      **2. Gotchas documentados en sessions.yaml:**
      - Main-Agent documenta gotchas en cada sesión donde aparecen
      - Estructura en sessions.yaml:
        ```yaml
        sessions:
          - id: "2025-10-31"
            gotchas:
              - tipo: "warning|gotcha|issue"
                problema: "[DESCRIPCIÓN]"
                solucion: "[CÓMO RESOLVER]"
                criticidad: "alta|media|baja"
        ```
      - Context-Agent extrae gotchas de TODAS las sesiones
      - CA usa criterio inteligente para seleccionar top 5 más críticos
      - project-status.yaml NO contiene gotchas (solo info general del proyecto)
    motivo: "Durante validación deployment surgió confusión sobre uso de templates/ y ubicación de gotchas. Templates contienen estructura exacta, instrucciones de uso, ejemplos de buena vs mala documentación - información que endSession.md no detalla. Gotchas surgen DURANTE sesiones de trabajo, no son características estáticas del proyecto"
    impacto: "Main-Agent siempre tiene referencia de cómo documentar correctamente. Gotchas contextualizados (cuándo aparecieron, en qué sesión). CA tiene flexibilidad para priorizar gotchas según criterio. project-status.yaml más limpio (solo info general). ~15KB extra en proyecto (4 templates, aceptable)"

  - id: "012"
    titulo: "README como lectura directa vs duplicado en context.yaml"
    decision: |
      README.md se lee DIRECTAMENTE en newSession.md, NO se incluye en context.yaml.

      Cambios implementados:

      1. newSession.md:
         - Agregada instrucción explícita: "Lee README.md del proyecto"
         - Orden de carga: README.md → project-status.yaml → context.yaml
         - README proporciona identidad actual, context proporciona memoria histórica

      2. compile-context.md:
         - ELIMINADO "Paso Previo: Verificar README.md" (creación automática)
         - ELIMINADO "PASO 7: Análisis profundo README" (comparación vs realidad)
         - ELIMINADO de lista de archivos a leer
         - Context Agent ya NO incluye README en el contexto compilado

      3. context-template.yaml:
         - ELIMINADA sección `readme_proyecto:`
         - Agregado comentario: "README.md se lee directamente en newSession.md"

      Filosofía: Separation of Concerns
      - README = Identidad actual (fuente de verdad, siempre actualizada)
      - context = Memoria histórica (síntesis de aprendizajes)
    motivo: "Durante deployment en otros proyectos se detectó que README.md cambia frecuentemente (versiones, features nuevas, URLs, stack), pero context.yaml solo se actualiza cuando se ejecuta compile-context.md. Problema: README sintetizado en context.yaml quedaba desactualizado, requería re-ejecutar compile-context por cambios triviales en README, análisis README paradójico (comparar contra sí mismo)"
    impacto: "Imposible desincronización: README siempre es la versión actual. No duplicación: una sola fuente de verdad. Menos mantenimiento: no re-compilar por cambios en README. Overhead trivial: 1 Read adicional (~200-400 líneas) es irrelevante. Coherencia conceptual: README = identidad, context = memoria. compile-context más enfocado: solo memoria histórica. ~95 líneas menos en context.yaml (~1.4K tokens ahorrados)"

