# ============================================
# GOTCHAS CRÍTICOS
# Filtrados con criterio: alta criticidad + activos + repetibles
# ============================================
gotchas:
  - id: "sobreescritura_sessions"
    problema: "endSession.md ambiguo causa que agentes usen Write tool y sobreescriban sessions.yaml (perdiendo histórico completo)"
    solucion: "Instrucción explícita Edit tool + warning ⚠️ NO uses Write en PASO 4.A endSession.md. Implementado en v0.10.x. Si reaparece: fix en endSession.md."
    criticidad: "alta"
    origen: "ISSUE-007 (CLIENT_A perdió 23 sesiones)"

  - id: "habitos_arraigados_llm_firmas"
    problema: "1 advertencia insuficiente para hábitos arraigados LLM (ej: añadir Co-Authored-By: Claude en commits)"
    solucion: "Defensa en profundidad multi-capa. github.md tiene 4 capas: (1) sección prominente inicio, (2) recordatorio commit + verificación git log, (3) recordatorio tag, (4) verificación automática grep. Margen error 70%→5%."
    criticidad: "alta"
    origen: "Reunión 030226_1.md"

  - id: "rm_rf_actualizar_borra_custom"
    problema: "rm -f memsys3/docs/*.md en actualizar.md fallback borraba archivos custom del usuario silenciosamente"
    solucion: "Eliminado en v0.18.x. Reemplazado por loop dinámico que solo sobrescribe archivos del template. Paso 5.5 detecta archivos custom comparando proyecto vs template."
    criticidad: "alta"
    origen: "ISSUE-018 (WORKSPACE_Y)"

  - id: "monorepos_memsys3_root"
    problema: "En monorepos con múltiples memsys3/, el agente puede operar en el equivocado (bug silencioso)"
    solucion: "Paso 0 estándar en 6 prompts: $MEMSYS3_ROOT=$(pwd)/memsys3 con fallback find -maxdepth 4 + AskUserQuestion si ambigüedad. Variables bash NO persisten entre tool calls — cada bloque redefine."
    criticidad: "alta"
    origen: "ISSUE-019"

  - id: "context_agent_instancia_limpia"
    problema: "Si Main Agent ejecuta compile-context tras sesión larga, acumula tokens (~100K) → sesgo sesión + violación ADR-008"
    solucion: "compile-context SIEMPRE en NUEVA INSTANCIA limpia. Main Agent NO debe proponerlo (restricción explícita en main-agent.yaml). Validado: intento 2026-03-08 fue revertido."
    criticidad: "alta"
    origen: "ADR-008 + sesión 2026-03-08"

  - id: "backups_versionados_git"
    problema: "memsys3_backup_*/ se versionan en git si memsys3/ NO está en .gitignore (Opción B deploy) — datos sensibles expuestos"
    solucion: "Agregar regla automática en deploy/actualizar: grep -q 'memsys3_backup_' .gitignore || echo 'memsys3_backup_*/' >> .gitignore. Backups SIEMPRE temporales, NUNCA versionados."
    criticidad: "alta"
    origen: "ISSUE-006 (pendiente implementación)"

  - id: "auto_memory_claude_code"
    problema: "Auto-memory de Claude Code (MEMORY.md + feedback_*/project_*/user_*.md) inyecta datos sin contexto, rompe ADR-016 (agnóstico) y human-in-the-loop. Síntoma: defaults silenciosos sin verificar"
    solucion: "Pendiente. Auto-memory NO editable desde settings.json (harness). 4 opciones en ISSUE-021. Mientras tanto: revisar ~/.claude/projects/<hash>/memory/ y eliminar/reorganizar manualmente."
    criticidad: "alta"
    origen: "ISSUE-021"

  - id: "at_mentions_indexacion"
    problema: "@ mentions dejan de funcionar en Claude Code hasta reiniciar (probable cache indexación). También NO funcionan con archivos en .gitignore"
    solucion: "Reinicio: /exit y volver a entrar. Para .gitignore Opción A: usar instrucciones directas ('Ejecuta memsys3/prompts/X.md') o instalar comandos locales /adr, /backlog (Claude-específico, ADR-016)."
    criticidad: "media"
    origen: "Sesión 2026-04-16 + ADR-010 UPDATE 2025-11-13"

