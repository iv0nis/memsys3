# Context - memsys3
# Compilado automáticamente por Context Agent
# Este es el contexto optimizado que los Development Agents leen al iniciar sesión

metadata:
  compilado_por: "Context Agent"
  ultima_compilacion: "2025-12-01"
  version_context: "1.9"

# ============================================
# README DEL PROYECTO
# ============================================
readme_proyecto: |
  # memsys3 - Sistema de Memoria para Agentes de IA

  Sistema replicable de gestión de contexto para optimizar el trabajo con AI Development Agents

  ## Problema que Resuelve

  Cuando trabajas con AI agents en proyectos grandes:
  - Los agents deben leer decenas de archivos de código para entender el proyecto
  - Cada sesión nueva consume miles de tokens repitiendo el mismo contexto
  - Decisiones y aprendizajes se pierden entre sesiones
  - No hay visibilidad de qué "sabe" el agent

  ## Solución

  memsys3 proporciona:
  - Context compilado en un único archivo (~2500-3000 tokens)
  - Sistema de documentación estructurado (ADRs, sessions, status)
  - Context Agent que filtra automáticamente la información relevante
  - Visualizador web para ver la "mente" de los agents
  - Prompts reutilizables (newSession, endSession, compile-context, mind, deploy, actualizar, backlog, github)
  - Sistema de rotación automática cuando supera límites (>1800 líneas)
  - Plan de contingencia con archivado inteligente (>150K tokens)
  - README opcional: Context Agent acepta proyectos sin README o puede crear automáticamente
  - Consulta .gitignore durante deployment: pregunta si excluir memsys3/ de git (privacidad)

  ## Quick Start

  Desde la raíz de tu proyecto, con tu AI agent ejecuta:

  ```bash
  @memsys3/prompts/deploy.md
  ```

  El workflow es:
  1. Clone temporal de memsys3 desde GitHub
  2. Copia de estructura a tu proyecto/memsys3/
  3. Briefing sobre tu proyecto (stack, objetivos, etc.)
  4. Personalización de archivos (project-status.yaml, newSession.md)
  5. Limpieza del clone temporal

  Resultado: Sistema memsys3 completamente funcional y personalizado.

  ## Uso con AI Agents

  Comenzar sesión: @memsys3/prompts/newSession.md
  Acabar sesión: @memsys3/prompts/endSession.md
  Recompilar contexto: @memsys3/prompts/compile-context.md
  Ver la "mente" del agent: @memsys3/prompts/mind.md

  ## Estructura

  ```
  memsys3/
  ├── agents/             # Main-Agent y Context-Agent
  ├── memory/
  │   ├── context.yaml    # Contexto compilado (este archivo)
  │   ├── project-status.yaml # Estado actual del proyecto
  │   ├── full/           # Documentación completa
  │   │   ├── adr.yaml   # Architecture Decision Records
  │   │   └── sessions.yaml # Histórico de sesiones
  │   ├── templates/      # Guías permanentes
  │   └── history/        # Archivado (Plan Contingencia >150K tokens)
  ├── prompts/            # Prompts reutilizables
  └── viz/                # Visualizador web
  ```

  ## Features Principales

  - **Context Agent con Criterio Inteligente**: Filosofía "¿Qué debe saber CUALQUIER agent descontextualizado?". Límite único: máx 2000 líneas. NO límites arbitrarios. Lee TODO primero, después filtra con criterio.

  - **Rotación Automática (>1800 líneas)**: Detecta automáticamente cuando sessions.yaml o adr.yaml superan 1800 líneas. Rotación segura: copia → verifica → crea nuevo.

  - **Plan de Contingencia (>150K tokens)**: Cuando contexto supera 150K tokens, CA archiva datos irrelevantes a memsys3/memory/history/ (que NO se lee → ahorro real). Reduce a ~120K tokens. Datos preservados, no perdidos.

  - **Sistema de Templates YAML**: Templates agnósticos reutilizables. Consistencia total. ~30% ahorro tokens vs Markdown.

  - **Sistema de Actualización**: Prompt actualizar.md para actualización segura de memsys3 en proyectos existentes. PASO 0: detección inteligente de estructura antigua incompatible (3 escenarios). Backups automáticos antes de tocar datos.

  - **Deployment con Privacidad**: Consulta .gitignore (PASO 8 en deploy.md): pregunta si excluir memsys3/ de git.

  ## Dog-fooding

  Este proyecto usa memsys3 para desarrollarse a sí mismo.
  - memsys3_templates/ = PRODUCTO FINAL (lo que se distribuye)
  - memsys3/ = Instancia de dog-fooding (desarrollo interno, NO se distribuye)

  Repositorio: https://github.com/iv0nis/memsys3

# ============================================
