# Context compilado del proyecto memsys3
# Compilado por Context Agent siguiendo compile-context.md
# README.md se lee directamente en newSession.md (identidad actual)
# Este archivo contiene memoria histórica: ADRs, sesiones, gotchas, pendientes

metadata:
  compilado_por: "Context Agent"
  ultima_compilacion: "2026-05-05"
  version_context: "0.13.0"
  memsys3_version: "v0.21.1"
  tiers_leidos: "1 (project-status, adr.yaml, sessions.yaml + sessions_1/_2.yaml), 2 (README.md), 3 (backlog completo), 5 (git log -30)"
  tokens_estimados_ingesta: "~140K"

# ============================================
# PROJECT INFO
# ============================================
project:
  nombre: "memsys3"
  descripcion: "Sistema de gestión de memoria/contexto para AI Agents (open source, agnóstico de modelo)"
  fase: "Development v0.21.1"
  ultima_feature: "Release v0.21.1: restricción operaciones_git en MA + decisión dominio memsys3.org canónico (.com redirect 301)"
  siguiente_milestone: "Desplegar web memsys3.org + FEATURE-012 (glosario conceptos) + testing deployments con .gitignore"
  client: "Open Source — GitHub: iv0nis/memsys3"

# ============================================
# FEATURES OPERATIVAS
# ============================================
features:
  context_agent:
    nombre: "Context Agent (CA)"
    estado: "operativo"
    descripcion: "Compila contexto completo con criterio inteligente. Ingesta por 5 tiers hasta ~150K tokens. Output máx 2000 líneas (ADR-001, ADR-008)."

  rotacion_automatica:
    nombre: "Rotación automática sessions/ADRs"
    estado: "operativo"
    descripcion: "Flexible 1800-2000 líneas (Escenario A post-doc) o >2000 (Escenario B pre-doc). Preserva sesión actual sin duplicación (ADR-002)."

  plan_contingencia:
    nombre: "Plan de Contingencia"
    estado: "operativo"
    descripcion: "Cuando ingesta >150K tokens, CA archiva entradas irrelevantes a memory/history/ (no se lee). Datos preservados, recuperables (ADR-003)."

  prompts_reutilizables:
    nombre: "Prompts reutilizables"
    estado: "operativo"
    descripcion: "newSession, endSession, compile-context, deploy, actualizar, adr, backlog, github, git, meet, reunion, migrate, agent-identity, commands, comprobar_alineamiento, actualizar_cat. Todos con $MEMSYS3_ROOT y rutas memsys3/."

  sistema_versionado:
    nombre: "Sistema versionado v0.X.Y (git tags = fuente verdad)"
    estado: "operativo"
    descripcion: "github.md workflow semi-automático: análisis cambios desde último tag, propuesta Minor/Patch con justificación, AskUserQuestion confirma versión, metadata rica en tags. Sin firma Co-Authored-By (defensa 4 capas)."

  sistema_file_version:
    nombre: "Sistema file_version por archivo (0.Y.Z)"
    estado: "operativo"
    descripcion: "Cada archivo de infraestructura (21 archivos) tiene versión independiente. .md usa <!-- version: 0.1.0 -->, agents .yaml usa file_version field, templates .yaml usa # version comment. Solo bumpa con /actualizar-memsys3."

  restricciones_infraestructura:
    nombre: "Restricciones infraestructura en agents"
    estado: "operativo"
    descripcion: "Main Agent y Context Agent NO modifican prompts/, agents/, memory/templates/ en proyectos destino. Excepción: memory/full/ y project-status.yaml son datos. En dog-fooding la restricción está quitada (deadlock). Solo /actualizar-memsys3 modifica infraestructura."

  comandos_globales:
    nombre: "Comandos globales auto-actualizantes (launcher pattern)"
    estado: "operativo"
    descripcion: "/deploy-memsys3 y /actualizar-memsys3 son launchers: clonan repo temporal, ejecutan prompt del repo, limpian. Mantenimiento centralizado (ADR-014). Específicos de Claude Code, opcionales (ADR-016)."

  sistema_backlog:
    nombre: "Sistema Backlog distribuible"
    estado: "operativo"
    descripcion: "memsys3/backlog/ con README agnóstico (315 líneas) + prompt backlog.md (3 operaciones). 6 prefijos: ISSUE, FEATURE, IMPROVEMENT, SPEC, BLUEPRINT, EXPLORATION. 33 items actuales."

  sistema_adrs:
    nombre: "Sistema gestión ADRs"
    estado: "operativo"
    descripcion: "Prompt adr.md (71 líneas) conversacional: consultar/crear/actualizar. Leyendas integradas: 3 estados + 10 áreas. Consistencia arquitectónica con backlog.md (ADR-013)."

  sistema_reuniones:
    nombre: "Sistema Reuniones Colaborativas (multi-agente)"
    estado: "operativo"
    descripcion: "Prompt reunion.md (905 líneas) workflow 6 fases + meet.md v2.0 unificado (coord+research). Filosofía 5 principios. Reuniones en memsys3/docs/reunion/DDMMYY_N.md. sessions.yaml solo referencia."

  sistema_pesos_sesiones:
    nombre: "Sistema de pesos por sesión"
    estado: "operativo"
    descripcion: "Campo peso: bajo (~70 líneas), medio (~95), alto (~140). Orientativos NO rígidos. CA filtra/sintetiza por peso + recencia. 100% retrocompatible (default 'medio'). FEATURE-006."

  operations_log:
    nombre: "Operations log"
    estado: "operativo"
    descripcion: "memsys3/memory/full/operations.log YAML append-only para trazabilidad de actualizar/compilar. Rotación >=1800 líneas. NO se lee en newSession ni compile-context (FEATURE-009)."

  wiki_github:
    nombre: "Wiki GitHub pública"
    estado: "operativo"
    descripcion: "4 páginas + sidebar: Home (propuesta valor), Prompts Reference, Workflow, Agents. URL: github.com/iv0nis/memsys3/wiki"

  visualizador:
    nombre: "Memory Visualizer"
    estado: "archivado"
    descripcion: "Dashboard web 4 pestañas para ver 'mente' agentes. Archivado en memsys3/docs/archivo/viz/. Eliminado de producción (memsys3_templates/) en v0.20.0."

