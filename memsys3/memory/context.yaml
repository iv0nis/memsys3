# Context - memsys3
# Contexto compilado para AI Development Agents
# NOTA: README.md se lee directamente en newSession.md (identidad actual del proyecto)
#       context.yaml contiene solo memoria histórica (sessions, ADRs, gotchas)

metadata:
  compilado_por: "Context Agent"
  ultima_compilacion: "2026-03-08"
  version_context: "v0.12.0"

# ============================================
# PROJECT INFO
# ============================================
project:
  nombre: "memsys3"
  descripcion: "Sistema de gestión de contexto para AI Development Agents - optimiza tokens proporcionando contexto compacto y relevante"
  fase: "Development v0.18.0"
  ultima_feature: "Fixes críticos actualizar.md (bootstrap, git diff --name-status, docs consolidado) + sistema reuniones autónomas meet.md v2.0 + docs/ referencia técnica + sistema agent_id"
  siguiente_milestone: "Testear deployment con .gitignore + testear actualizar_cat.md + validar compile-context con README auto + resolver ISSUE-010/011"

# ============================================
# FEATURES OPERATIVAS
# ============================================
features:
  context_agent:
    nombre: "Context Agent"
    estado: "operativo"
    descripcion: "Agente que compila contexto completo con criterio inteligente (máx 2000 líneas)"

  rotacion_automatica:
    nombre: "Rotación Automática"
    estado: "operativo"
    descripcion: "Sistema de rotación sessions/ADRs cuando superan 1800 líneas (flexible 1800-2000)"

  plan_contingencia:
    nombre: "Plan de Contingencia"
    estado: "operativo"
    descripcion: "Archivado inteligente a history/ cuando >150K tokens"

  visualizador:
    nombre: "Memory Visualizer"
    estado: "archivado"
    descripcion: "Dashboard web - Archivado en memsys3/docs/archivo/viz/ (feature futura)"

  prompts_reutilizables:
    nombre: "Prompts Reutilizables"
    estado: "operativo"
    descripcion: "newSession, endSession, compile-context, mind, deploy, actualizar, actualizar_cat, adr, backlog, github, meet, agent-identity - TODOS con rutas memsys3/"

  sistema_documentacion:
    nombre: "Sistema de Documentación Multi-nivel"
    estado: "operativo"
    descripcion: "4 niveles: README repo, README templates, DEVELOPMENT, UPDATE. docs/reference.md consolidado (9 archivos fusionados)"

  sincronizacion_catalan:
    nombre: "Sistema Sincronización Versión Catalana"
    estado: "operativo"
    descripcion: "Prompt actualizar_cat.md sincroniza memsys3_templates/ español → catalán, branch catalan en GitHub"

  backlog_distribuible:
    nombre: "Sistema Backlog Distribuible"
    estado: "operativo"
    descripcion: "memsys3/backlog/ con README agnóstico + prompt backlog.md (3 operaciones: consultar, crear, actualizar)"

  sistema_gestion_adrs:
    nombre: "Sistema Gestión ADRs"
    estado: "operativo"
    descripcion: "Prompt adr.md para gestionar ADRs conversacionalmente: consultar, crear, actualizar"

  comandos_globales:
    nombre: "Sistema Comandos Globales Auto-actualizantes"
    estado: "operativo"
    descripcion: "Launcher pattern: /deploy-memsys3, /actualizar-memsys3 clonan repo temp → ejecutan prompt actualizado → limpian"

  sistema_pesos_sesiones:
    nombre: "Sistema de Pesos para Sesiones"
    estado: "operativo"
    descripcion: "Clasificación sesiones: bajo/medio/alto. Context Agent filtra por peso + recencia. Límites orientativos NO rígidos (ADR-001)"

  sistema_reuniones:
    nombre: "Sistema Reuniones Multi-agente"
    estado: "operativo"
    descripcion: "meet.md v2.0 unificado: Modo coordinación + Modo investigación. Protocolo polling obligatorio 3 pasos (ESCRIBIR → RESUMIR → POLLING). Headers → [destinatario], marcador CIERRE. Reuniones en memsys3/docs/meets/DDMMYY_N.md"

  sistema_agent_id:
    nombre: "Sistema Agent Identity"
    estado: "operativo"
    descripcion: "Prompt agent-identity.md asigna agent_id a sesión. Persiste entre compacts via /tmp/memsys3_agent_X.md. Independiente de meets"

  actualizar_inteligente:
    nombre: "Actualización Inteligente memsys3"
    estado: "operativo"
    descripcion: "actualizar.md con bootstrap (Paso 0a/0b), git diff --name-status como estrategia principal (A/M/D), backups en memsys3/docs/backups/ (máx 3), fallback si git diff falla"

# ============================================
# STACK TECNOLÓGICO
# ============================================
stack:
  database: "Ninguno (YAML files)"
  deploy: "GitHub + clonado local"
  lenguaje_docs: "YAML + Markdown"

# ============================================
# URLS PRINCIPALES
# ============================================
urls:
  repository: "https://github.com/iv0nis/memsys3"

# ============================================
# ADRs RELEVANTES (10 de 14 totales)
# Criterio: Impacto global, arquitectónicas, no obvias, explican "por qué"
# ============================================
adrs:
  - id: "001"
    titulo: "Criterio inteligente del Context Agent vs límites arbitrarios"
    decision: "Context Agent usa criterio inteligente: ¿Qué debe saber CUALQUIER agent descontextualizado? Límite ÚNICO: máximo 2000 líneas en context.yaml. NO límites arbitrarios por sección"
    motivo: "Sistemas anteriores usaban límites rígidos que no se adaptaban a la realidad del proyecto"
    impacto: "Contexto adaptativo. CA decide con visión panorámica completa"

  - id: "002"
    titulo: "Rotación automática de sessions/ADRs (flexible 1800-2000 líneas)"
    decision: "Escenario A (1800-2000): Rotación LITE post-documentación → sesión solo en sessions_N.yaml. Escenario B (>2000): Rotación PRE-documentación → sesión solo en sessions.yaml nuevo. CA lee TODOS los archivos rotados hasta >150K tokens"
    motivo: "Read tool tiene límite 2000 líneas. Rotación flexible aprovecha espacio disponible y evita duplicación"
    impacto: "Sistema escala infinitamente, no se pierden datos, automático"

  - id: "003"
    titulo: "Plan de Contingencia con archivado inteligente (>150K tokens)"
    decision: "Cuando full/ supera 150K tokens: CA mueve datos irrelevantes a memory/history/ (NO se lee), reduce a ~120K tokens. Datos preservados y recuperables"
    motivo: "Proyectos muy grandes pueden acumular demasiados datos para procesar"
    impacto: "Ahorro real de tokens, sistema escala ilimitadamente, reversible"

  - id: "006"
    titulo: "Sistema de rutas unificado memsys3/"
    decision: "TODAS las rutas usan prefijo memsys3/. Durante deployment, memsys3_templates/ se copia como memsys3/ → rutas internas funcionan"
    motivo: "Inconsistencias entre memory/, @memory/, sin prefijo causaban confusión"
    impacto: "Claridad total, portabilidad entre proyectos, sin conflictos de carpetas"

  - id: "008"
    titulo: "Main-Agent NO debe proponer compile-context"
    decision: "Main-Agent tiene restricción: NO proponer compile-context.md. Solo sugerir endSession. compile-context.md debe ejecutarse en NUEVA INSTANCIA sin tokens acumulados"
    motivo: "Si Main-Agent ejecuta compile-context, acumula demasiados tokens (sesión + full/ + generación)"
    impacto: "Eficiencia de tokens optimizada. User controla cuándo compilar"

  - id: "009"
    titulo: "Templates como documentación activa permanente + gotchas en sessions"
    decision: "memory/templates/ NO se borran, son guías permanentes. Gotchas en sessions.yaml (contextualizados). project-status.yaml NO contiene gotchas"
    motivo: "Templates contienen estructura, instrucciones, ejemplos que Main-Agent consulta durante endSession"
    impacto: "Deployment simple, Main-Agent con referencia permanente, gotchas contextualizados"

  - id: "012"
    titulo: "README como lectura directa vs duplicado en context.yaml"
    decision: "README.md se lee DIRECTAMENTE en newSession.md, NO en context.yaml. ELIMINADO PASO 7 de compile-context"
    motivo: "README = 'Quién soy ahora' (identidad actual). context = 'Qué he aprendido' (memoria histórica). Conceptos diferentes"
    impacto: "Imposible desincronización, no duplicación, ~1.4K tokens ahorrados"

  - id: "014"
    titulo: "Sistema de comandos globales auto-actualizantes con launcher pattern"
    decision: "Comandos globales son launchers: clonan repo → ejecutan prompt actualizado → limpian. Prompt commands.md automatiza instalación"
    motivo: "Evolución de prompts requería actualizar manualmente comandos en todas las máquinas. Insostenible"
    impacto: "Mantenimiento centralizado, auto-actualización transparente, onboarding 1 comando"

  - id: "015"
    titulo: "Terminología unificada: Main Agent como nomenclatura estándar"
    decision: "Main Agent = terminología estándar única. Deja espacio para agentes especializados futuros (Development Agent, Testing Agent)"
    motivo: "3 términos diferentes (Main Agent, Development Agent, DevAI) para mismo concepto"
    impacto: "Terminología consistente, escalable, sin conflictos futuros"

  - id: "016"
    titulo: "memsys3 agnóstico de modelo de IA + Commands opcional Claude-específica"
    decision: "Principio fundamental: memsys3 agnóstico de modelo IA. Jerarquía: templates (agnóstico) → prompts (específico) → commands (opcional Claude). Commands NO es core"
    motivo: "memsys3 debe funcionar en Claude, Gemini, Codex, cualquier modelo. Commands es workaround para .gitignore + @ mentions"
    impacto: "Universalidad preservada, workaround útil disponible como opcional"

# ============================================
# SESIONES RECIENTES
# Estrategia: ALTO ~90%, MEDIO ~60-70%, BAJO omitidos
# ============================================
sesiones:
  - id: "2026-03-08-fixes-actualizar-meet-docs"
    titulo: "Fixes críticos actualizar.md + protocolo polling meet.md + docs consolidado"
    peso: "alto"
    que_hizo:
      - "6 fixes en actualizar.md detectados en ejecución real (v0.15.0): bug auto-recursión backup (cp -r → rsync --exclude), docs/ no copiada, backlog/ no creado, orden pasos incorrecto"
      - "Bootstrap en actualizar.md (v0.16.0): Paso 0a verifica WD, Paso 0b clona repo y sobrescribe prompt local — resuelve problema chicken-and-egg de prompts desactualizados"
      - "Protocolo polling meet.md: checklist obligatorio 3 pasos (ESCRIBIR → RESUMIR → POLLING) con task ID en resumen"
      - "docs/ consolidado: 9 archivos individuales fusionados en reference.md (v0.17.0)"
      - "5 reuniones multi-agente ejecutadas (20260306_1 a _5)"
      - "3 versiones tagueadas: v0.15.0, v0.16.0, v0.17.0"
    decisions:
      - "Bootstrap en actualizar.md: Paso 0b clona repo y sobrescribe prompt local antes de continuar. Resuelve problema estructural de prompt desactualizado"
      - "Consolidar 9 archivos docs/ en reference.md: archivos sueltos crean ruido visual"
      - "Polling es responsabilidad del que acaba de escribir su turno, siempre"
    gotchas:
      - "actualizar.md local siempre está desactualizado → Bootstrap Paso 0b sobrescribe con versión del repo"
      - "cp -r memsys3 memsys3/docs/backups/ crea recursión infinita → rsync -a --exclude='docs/backups'"
      - "Polling en meet se lanza una vez y no se relanza tras cada turno → checklist obligatorio 3 pasos"

  - id: "2026-03-08-actualizar-name-status-backups"
    titulo: "actualizar.md: git diff --name-status + limpieza backups + borrado obsoletos"
    peso: "medio"
    que_hizo:
      - "Paso 6.1 reescrito: git diff --name-status como estrategia principal (A/M/D), fallback solo si falla"
      - "Archivos D (eliminados) se borran del proyecto — resuelve problema de archivos obsoletos"
      - "Limpieza backups: máx 3 (2 antiguos + actual) tras crear backup nuevo"
    decisions:
      - "git diff --name-status reemplaza --name-only: muestra A/M/D en un solo comando"

  - id: "2026-03-06-docs-referencia-agent-id-actualizar-mejoras"
    titulo: "docs/ referencia técnica + sistema agent_id + mejoras actualizar.md"
    peso: "alto"
    que_hizo:
      - "Creados 9 archivos en memsys3_templates/docs/ (referencia técnica)"
      - "Nuevo prompt agent-identity.md para asignación de agent_id de sesión, persiste via /tmp/memsys3_agent_X.md"
      - "actualizar.md: git diff por versiones como estrategia principal, lista hardcodeada como fallback"
      - "actualizar.md: backups en memsys3/docs/backups/ + migración backups antiguos"
      - "actualizar.md: incluye meet.md, agent-identity.md y docs/"
      - "meet.md: briefing obligatorio del convocante, convocar por path"
      - "backlog.md: crea carpeta y README si no existen"
      - "fix ISSUE-015: deploy.md warning ruta project-status.yaml"
      - "Versión bumpeada a v0.14.0"
    decisions:
      - "agent-identity.md separado de meets.md: agent_id tiene alcance más amplio — identidad de sesión general"
      - "actualizar.md usa git diff como estrategia principal, lista hardcodeada como fallback"
      - "Backups en memsys3/docs/backups/: centralizado, no ensucia raíz del proyecto"
    gotchas:
      - "grep -c en WSL devuelve output con newlines que rompe comparación numérica → añadir | tr -d '[:space:]'"

  - id: "2026-02-20-sistema-reuniones-autonomas-meet-unificado"
    titulo: "Sistema Reuniones Autónomas + meet.md Unificado"
    peso: "alto"
    que_hizo:
      - "Test real reunión autónoma multi-agente con polling bash background"
      - "Protocolo reuniones robustizado: headers siempre → [agente], marcador CIERRE, polling en contexto principal"
      - "meet.md v2.0 creado: Protocolo común + Modo coordinación + Modo investigación"
      - "Unificado meet-coord.md + meet-research.md → meet.md único"
      - "5 reuniones ejecutadas (200226_1 a 200226_5)"
    decisions:
      - "Unificar meet-coord + meet-research: evita divergencia de protocolo"
      - "Polling en contexto principal no subagente: subagentes Task tool no heredan permisos Bash"
      - "CIERRE como marcador explícito de fin de turno"
    gotchas:
      - "Subagentes lanzados con Task tool no heredan permisos Bash del contexto principal — fallan silenciosamente. Usar Bash run_in_background en contexto principal para polling"

  - id: "2026-02-04-compilacion-context-v0110"
    titulo: "Compilación context.yaml v0.11.0 + Propuesta Extended Thinking"
    peso: "alto"
    que_hizo:
      - "Primera compilación exitosa post-FEATURE-006 (sistema pesos): context.yaml v0.11.0 (467 líneas)"
      - "Reducción 96% tokens (95K → 3.5K), 13 ADRs, 7 sesiones sintetizadas"
      - "Propuesta optimización: Subagent con extended thinking (una lectura ~95K, +5% calidad, -34% tokens)"
      - "Refactor: docs/ → memsys3/docs/ (14 archivos). ISSUE-008 creado"
      - "IMPROVEMENT-007 creado (backlog): Extended Thinking compile-context"
    decisions:
      - "Propuesta futura: Subagent con Extended Thinking para compile-context. Usuario acepta trade-off: menos transparencia previa a cambio de máxima eficiencia + calidad"

  - id: "2026-02-03-reuniones-colaborativas-fix-firmas"
    titulo: "Sistema Reuniones Colaborativas + Fix Firmas Commits"
    peso: "alto"
    que_hizo:
      - "Sistema completo Reuniones Colaborativas: metodología formal debugging multi-agente"
      - "Prompt reunion.md (905L): workflow 6 fases formales"
      - "docs/reunion/README.md (836L): filosofía 5 principios fundamentales"
      - "Fix github.md: defensa en profundidad 4 capas contra firmas Co-Authored-By"
    decisions:
      - "Reuniones en docs/reunion/ (no memory/full/): documentos largos (300-800L) explotan límites. sessions.yaml solo referencia"
      - "Defensa 4 capas para hábitos arraigados: warning inicio + recordatorio commit + recordatorio tag + verificación grep"

  - id: "2025-02-02-feature-006-pesos"
    titulo: "FEATURE-006: Sistema de Pesos para Sesiones"
    peso: "alto"
    que_hizo:
      - "Sistema completo de pesos: bajo (~70L), medio (~95L), alto (~140L)"
      - "PASO 2.5 nuevo en endSession.md: evaluar peso con criterios claros"
      - "Estrategia síntesis diferenciada en compile-context.md"
      - "100% retrocompatible: sesiones sin peso asumen 'medio'"
    decisions:
      - "3 pesos (bajo/medio/alto): minimalismo y claridad"
      - "Pesos orientativos NO rígidos (ADR-001). CA puede ignorar si inconsistencia flagrante"
      - "Consejo anti-inflación: 'Si dudas, elige el menor'"

  - id: "2025-01-30-issue-007-sobreescritura"
    titulo: "ISSUE-007: Fix crítico sobreescritura sessions.yaml"
    peso: "alto"
    que_hizo:
      - "Bug crítico: Taller Colomer perdió 23 sesiones por sobreescritura sessions.yaml"
      - "Causa raíz: endSession.md PASO 4.A ambiguo sobre Write vs Edit tool"
      - "Fix minimalista: Edit tool explícito + warning (margen error 40-50% → 5-10%)"
      - "FEATURE-006/007 creadas (pesos + auditoría)"
    decisions:
      - "Fix minimalista: prompts pulidos y concisos mejor que verbosos. 80-90% efectividad suficiente"

  - id: "2025-12-30-issue-005-adr-016"
    titulo: "Bug Fix ISSUE-005 + ADR-016: Principio Agnóstico"
    peso: "alto"
    que_hizo:
      - "Bug: actualizar.md no copiaba 3 prompts nuevos (adr.md, backlog.md, commands.md)"
      - "ADR-016: memsys3 agnóstico de modelo IA, commands opcional"
      - "ISSUE-006: backups siempre en .gitignore"

  - id: "2026-02-17-release-v0112"
    titulo: "Release v0.11.2 + Fix ISSUE-009 rutas inseguras"
    peso: "medio"
    que_hizo:
      - "Fix ISSUE-009: PASO 0 checkpoint MEMSYS=$(find...) + rutas \$MEMSYS en PASO 3"
      - "Limpieza: firma Co-Authored-By eliminada de actualizar.md PASO 11"
      - "ISSUE-010/011 creados"
    decisions:
      - "Variables bash en prompts: cada bloque redefine, NO usar variables de pasos anteriores"

  - id: "2026-02-06-deployment-businesshub"
    titulo: "Deployment Testing Real - BusinessHub"
    peso: "medio"
    que_hizo:
      - "Primera validación completa deployment en proyecto real externo (BusinessHub)"
      - "Workflow /deploy-memsys3 end-to-end exitoso"
      - "Compilación context.yaml inicial v0.1.0 (140 líneas)"
    gotchas:
      - "newSession.md sin instrucción 'TRABAJA EN ESPAÑOL' → otra instancia respondió en inglés. Agregar bloque idioma en deploy.md PASO 6"

# ============================================
# GOTCHAS CRÍTICOS (5 seleccionados)
# Errores que rompen el proyecto si no se conocen
# ============================================
gotchas:
  - id: "sobreescritura_sessions"
    problema: "endSession.md PASO 4.A: agentes pueden usar Write tool en lugar de Edit tool, perdiendo TODAS las sesiones previas"
    solucion: "Instrucción explícita de Edit tool + warning sobre Write tool. Bug histórico (v0.1.0 → v0.9.0), caso real: Taller Colomer perdió 23 sesiones"
    criticidad: "alta"

  - id: "habitos_arraigados_llm"
    problema: "1 advertencia insuficiente para comportamientos arraigados en training data (ej: firmas Co-Authored-By). Margen error ~70%"
    solucion: "Defensa multi-capa en múltiples momentos críticos. Ejemplo github.md: 4 capas reduce margen error a ~5%"
    criticidad: "alta"

  - id: "backups_versionados_git"
    problema: "memsys3_backup_*/ pueden versionarse si memsys3/ NO está en .gitignore → datos sensibles expuestos"
    solucion: "Regla automática .gitignore: grep -q 'memsys3_backup_' .gitignore || echo 'memsys3_backup_*/' >> .gitignore"
    criticidad: "alta"

  - id: "bootstrap_actualizar"
    problema: "actualizar.md local siempre está desactualizado — agente ejecuta instrucciones viejas con bugs"
    solucion: "Bootstrap Paso 0b: clonar repo y sobrescribir prompt local antes de continuar"
    criticidad: "alta"

  - id: "subagents_no_heredan_bash"
    problema: "Subagentes lanzados con Task tool no heredan permisos Bash del contexto principal — fallan silenciosamente en polling"
    solucion: "Usar Bash tool con run_in_background: true en contexto principal para polling de archivos"
    criticidad: "alta"

