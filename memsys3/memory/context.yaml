# ============================================
# GOTCHAS CRÍTICOS
# Top 5 más críticos de todas las sesiones
# ============================================
gotchas:
  - id: "endsession_history_folder"
    problema: "endSession.md sin warning explícito puede causar que agentes creen archivos detallados en memory/history/ (confundiendo su propósito: Plan Contingencia vs documentación activa)"
    solucion: "⚠️ NO crear archivos detallados en memory/history/ - toda la info va DIRECTAMENTE en sessions.yaml. Aclarar que history/ es SOLO para archivado >150K tokens (Plan de Contingencia ADR-003)"
    criticidad: "media"
    contexto: "Detectado en CLIENT_A donde 3 sesiones crearon archivos incorrectos (session-2025-11-13-*.yaml)"

  - id: "mentions_archivos_ignorados"
    problema: "@ mentions NO funcionan con archivos ignorados en .gitignore (limitación Claude Code)"
    solucion: "Workaround: usar instrucciones directas en lugar de @ mentions. Ejemplo: 'Ejecuta memsys3/prompts/newSession.md' en lugar de '@memsys3/prompts/newSession.md'"
    criticidad: "media"
    contexto: "Documentado en deploy.md PASO 8 con warning explícito. ADR-010 actualizado con UPDATE 2025-11-13"

  - id: "rotacion_flexible_evitar_duplicacion"
    problema: "Rotación rígida en 1800 líneas no aprovechaba espacio disponible (1800-2000) y podía duplicar sesión actual"
    solucion: "Sistema flexible: Escenario A (1800-2000 post-documentar LITE) vs Escenario B (>2000 pre-documentar). Sesión actual queda solo en un archivo"
    criticidad: "alta"
    contexto: "Mejorado tras primera rotación real (sessions.yaml 1849 líneas). Documentado en endSession.md y ADR-002 UPDATE 2025-12-03"

  - id: "context_agent_criterio_inteligente"
    problema: "CA debe leer TODO primero, después decidir con criterio. NO límites rígidos arbitrarios (máx 7 ADRs, máx 15 líneas sesión, etc.)"
    solucion: "Filosofía: '¿Qué debe saber CUALQUIER agent descontextualizado para trabajar aquí?'. Límite ÚNICO: máx 2000 líneas context.yaml. Criterio basado en impacto global, relevancia, información no obvia"
    criticidad: "alta"
    contexto: "ADR-001: sistemas anteriores con límites rígidos no se adaptaban a realidad del proyecto"

  - id: "templates_documentacion_activa"
    problema: "memory/templates/ puede parecer residual post-deployment, pero son documentación ACTIVA"
    solucion: "NO borrar memory/templates/ después del deployment. Main-Agent consulta templates/ durante endSession.md para estructurar correctamente sessions, ADRs, etc."
    criticidad: "media"
    contexto: "ADR-009: Templates contienen estructura exacta, instrucciones de uso, ejemplos de buenas prácticas que endSession.md no detalla"

# ============================================
# PENDIENTES PRIORITARIOS
# Del project-status.yaml actual
# ============================================
pendientes:
