# ============================================
# ADRs RELEVANTES (11 totales, 8 incluidas)
# Seleccionadas con criterio inteligente según impacto global
# ============================================
adrs:
  - id: "001"
    titulo: "Criterio inteligente del Context Agent vs límites arbitrarios"
    decision: "El Context Agent usa criterio inteligente basándose en la pregunta: '¿Qué debe saber CUALQUIER agent descontextualizado para trabajar aquí?'. Límite ÚNICO: máximo 2000 líneas en context.yaml final. NO hay límites arbitrarios para ADRs, sessions, gotchas, etc."
    motivo: "Los sistemas anteriores usaban límites rígidos (máx 7 ADRs, máx 15 líneas por sesión) que no se adaptaban a la realidad del proyecto. Proyectos pequeños perdían contexto, proyectos grandes no podían expresarse adecuadamente."
    impacto: "Contexto adaptativo según necesidades del proyecto. CA decide con visión panorámica completa. Proyectos pequeños mantienen todo, proyectos grandes filtran inteligentemente. Más flexible y escalable."

  - id: "002"
    titulo: "Rotación automática de sessions/ADRs (>1800 líneas)"
    decision: "Cuando sessions.yaml o adr.yaml superen 1800 líneas: endSession.md detecta automáticamente, hace rotación segura: copia → verifica → crea nuevo. sessions.yaml → sessions_N.yaml, adr.yaml → adr_N.yaml. Context Agent lee TODOS los archivos rotados hasta detectar >150K tokens."
    motivo: "Read tool tiene límite de 2000 líneas. Si sessions.yaml o adr.yaml crecen demasiado, los agents no pueden leerlos."
    impacto: "Sistema escala infinitamente. No se pierden datos nunca. Automático, sin intervención manual. Preserva histórico completo."

  - id: "003"
    titulo: "Plan de Contingencia con archivado inteligente (>150K tokens)"
    decision: "Cuando total de full/ supera 150K tokens: CA identifica ADRs/sessions irrelevantes con criterio inteligente, los mueve a memory/history/ (que NO se lee), reduce a ~120K tokens, continúa compilación normal. Datos en history/ están preservados, recuperables si es necesario."
    motivo: "Incluso con rotación, proyectos muy grandes pueden acumular demasiados datos. Si full/ (con todos los archivos rotados) supera 150K tokens, el CA no puede procesarlo eficientemente."
    impacto: "Ahorro real de tokens (history/ NO se lee). Datos preservados, no perdidos. Sistema escala ilimitadamente. Reversible (puedes recuperar de history/)."

  - id: "004"
    titulo: "YAML para todo (incluyendo sessions)"
    decision: "Todo el sistema usa YAML: sessions.yaml (antes sessions.md), adr.yaml, project-status.yaml, context.yaml, todos los templates .yaml"
    motivo: "Sessions originalmente eran .md (Markdown). Templates y ADRs ya eran YAML. Inconsistencia de formatos dificultaba parsing y ahorro de tokens."
    impacto: "Consistencia total del sistema. ~30% ahorro tokens vs Markdown. Mejor para LLMs (estructura clara). Fácil parsear con js-yaml."

  - id: "006"
    titulo: "Sistema de rutas unificado memsys3/"
    decision: "TODAS las rutas en memsys3_templates/ deben usar el prefijo memsys3/: memsys3/memory/context.yaml, memsys3/agents/main-agent.yaml, memsys3/prompts/compile-context.md, etc. Durante deployment, memsys3_templates/ se copia a la raíz del proyecto como memsys3/, por lo tanto todas las rutas internas funcionan correctamente."
    motivo: "Durante el desarrollo inicial se creó confusión sobre las rutas en el sistema. Los prompts referencian archivos usando rutas relativas, pero cuando memsys3 se despliega en diferentes proyectos, esas rutas deben ser consistentes."
    impacto: "Claridad total: siempre se sabe que es de memsys3. Portabilidad: funciona en cualquier proyecto. Actualizable: fácil saber qué archivos actualizar. Sin conflictos con carpetas del proyecto."

  - id: "009"
    titulo: "Templates como documentación activa permanente + gotchas en sessions"
    decision: "memory/templates/ = Guías permanentes que Main-Agent consulta durante endSession.md. Gotchas documentados en sessions.yaml (contextualizados temporalmente). Context-Agent extrae gotchas de TODAS las sesiones y usa criterio inteligente para seleccionar top 5 más críticos (criterios: criticidad + recencia + impacto)."
    motivo: "Durante validación del deployment surgió confusión: ¿qué es template de qué? Templates dentro de templates genera la pregunta. Análisis reveló que memory/templates/ contiene: estructura exacta de ADRs/sessions, instrucciones de uso, ejemplos de buenas prácticas. Gotchas en project-status.yaml no tiene sentido conceptual: surgen DURANTE sesiones de trabajo, no son características estáticas del proyecto."
    impacto: "Deployment más simple: copiar todo, no borrar templates/. Main-Agent siempre tiene referencia de cómo documentar correctamente. Gotchas contextualizados (cuándo aparecieron, en qué sesión). CA tiene flexibilidad para priorizar gotchas según criterio. project-status.yaml más limpio (solo info general)."

  - id: "010"
    titulo: "Consulta .gitignore durante deployment de memsys3"
    decision: "Agregar PASO 8 en deploy.md que pregunte al usuario si quiere excluir memsys3/ de GitHub ANTES de finalizar el deployment. Opción A (RECOMENDADO): Excluir - contexto local privado. Opción B: Incluir - para equipos que compartan contexto. WARNING: @ mentions NO funcionan con archivos ignorados (limitación Claude Code). Workaround: usar instrucciones directas ('Ejecuta memsys3/prompts/newSession.md')."
    motivo: "Durante deployment en CLIENT_A se identificó que memsys3/ no estaba excluido de git, lo que significa que todo el contexto local (sessions, ADRs, gotchas) se subiría al repositorio. memsys3/ contiene: sesiones de trabajo con Claude, decisiones arquitectónicas internas, gotchas y aprendizajes específicos del proceso, contexto que es útil localmente pero NO debe ser público."
    impacto: "Usuario es consciente de la decisión de privacidad. Flexibilidad: equipos pueden elegir compartir contexto si quieren. Deployment completo y correcto desde el inicio. No hay sorpresas después. Recomendación clara (Opción A recomendada). Warning explícito sobre limitación @ mentions con workaround claro."

  - id: "011"
    titulo: "Separación de prompts agnósticos (distribuibles) vs específicos (proyecto memsys3)"
    decision: "Regla de Oro: '¿Tiene sentido este archivo en CUALQUIER proyecto que use memsys3?' SI SÍ → Agnóstico: va en memsys3_templates/ (se distribuye). SI NO → Específico: va en /prompts/ raíz (NO se distribuye). AGNÓSTICOS: newSession.md, endSession.md, compile-context.md, deploy.md, actualizar.md, mind.md, backlog.md, github.md, agents/*.yaml, memory/templates/*.yaml, viz/*. ESPECÍFICOS: actualizar_cat.md (solo memsys3 tiene versión catalana), comprobar_alineamiento.md (solo memsys3 tiene dog-fooding). Práctica emerge del contexto: Context Agent incluye esta ADR en context.yaml, futuros agents la ven al cargar newSession.md."
    motivo: "Durante el desarrollo de memsys3 surgió la necesidad de crear prompts que solo tienen sentido en el contexto del desarrollo del propio memsys3, NO en proyectos que usen memsys3. Problema: Inicialmente estos archivos se crearon en memsys3/prompts/ y memsys3_templates/prompts/, lo que significa que se DISTRIBUIRÍAN a otros proyectos durante el deployment. Esto contaminaría los deployments con herramientas internas específicas del desarrollo de memsys3 que no tienen sentido fuera de este repositorio."
    impacto: "Deployments limpios: solo archivos agnósticos se distribuyen. Claridad sobre qué es producto (templates) vs desarrollo interno. Regla simple y memorable para tomar decisiones. Práctica emerge del contexto (dog-fooding real de memsys3). No requiere enforcement rígido (confía en el sistema). Flexible: nuevos archivos se clasifican fácilmente."

# ============================================
# SESIONES RECIENTES (17 totales, 4 incluidas)
# ============================================
sesiones_recientes:
