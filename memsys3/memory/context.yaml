# ============================================
# GOTCHAS CRÍTICOS (vigentes)
# ============================================
gotchas:
  - id: "endsession_post_commit"
    problema: "endSession escribe en sessions.yaml + project-status + BLUEPRINT [x] DESPUÉS del commit principal del frente, generando deuda recurrente sin commitear."
    solucion: "Ejecutar endSession ANTES del commit final del frente. Si ya se ejecutó después: commit puente 'docs(sessions)' separado antes de mezclar contextos nuevos."
    criticidad: "media"

  - id: "reflejo_bumpeo_file_version"
    problema: "Reflejo automático 'modifico archivo → bumpo versión' se dispara antes de pasar por la regla file_version_inmutable. Solo /actualizar-memsys3 puede bumpar."
    solucion: "Defensa multi-capa: regla escrita en archivo + restricción dura en main-agent.yaml (cargada en cada newSession). Las reglas en feedback NO bastan si se leen retrospectivamente."
    criticidad: "alta"

  - id: "git_clone_quiet_oculta_errores"
    problema: "git clone --quiet --depth 1 file:///<repo> falla silenciosamente con commits locales no pusheados, dando inventario vacío sin causa visible."
    solucion: "Para validar cambios LOCALES: NO usar git clone, usar cp -r al tmpdir. Eliminar --quiet ayuda a ver el error real."
    criticidad: "media"

  - id: "auto_memory_claude_vs_memsys3"
    problema: "Auto-memory de Claude Code (MEMORY.md + feedback_*/project_*/user_*.md) inyectada por harness, NO editable desde settings.json. Rompe ADR-016, una-sola-carpeta, human-in-the-loop. Síntoma original: defaults silenciosos ('***')."
    solucion: "ADR-020: memory.yaml agnóstica en memsys3/memory/ + bridge MEMORY.md raíz como puntero opcional. Revisar ~/.claude/projects/<hash>/memory/ periódicamente y re-redirigir si necesario."
    criticidad: "alta"

  - id: "firma_commits_co_authored_by"
    problema: "LLM tiende a firmar commits con 'Co-Authored-By: Claude' por defecto. Margen error histórico ~70%. Convención del proyecto lo prohíbe."
    solucion: "Defensa 4 capas: warning en github.md + recordatorio crítico + verificación grep post-commit + regla dura inline en main-agent.yaml. Cargada en cada newSession."
    criticidad: "alta"

  - id: "deployment_protection_vercel"
    problema: "Vercel activa Deployment Protection por defecto (general)."
    solucion: "Desactivar en Settings > Deployment Protection si proyecto debe ser público."
    criticidad: "media"

  - id: "at_mentions_gitignore"
    problema: "Si memsys3/ está en .gitignore, @ mentions de Claude Code NO funcionan (limitación)."
    solucion: "Workaround en deploy.md PASO 8: avisar al usuario. Alternativas: (a) instrucciones directas 'Ejecuta memsys3/prompts/...', (b) commands locales en .claude/commands/ (Claude-específico opcional)."
    criticidad: "media"

