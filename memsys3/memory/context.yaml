# Context compilado del proyecto memsys3
# Compilado por Context Agent siguiendo compile-context.md
# README.md se lee directamente en newSession.md (identidad actual)
# Este archivo contiene memoria histórica: ADRs, sesiones, gotchas, pendientes

metadata:
  compilado_por: "Context Agent"
  ultima_compilacion: "2026-05-08"
  version_context: "0.14.0"
  memsys3_version: "v0.23.0"
  tiers_leidos: "1 (project-status, adr.yaml [24 ADRs], sessions.yaml + sessions_1/_2.yaml, memory.yaml), 2 (README raíz), 3 (backlog/README.md + listado items), 5 (git log -20)"
  tokens_estimados_ingesta: "~85K"

# ============================================
# PROJECT INFO
# ============================================
project:
  nombre: "memsys3"
  descripcion: "Sistema de gestión de contexto para AI Agents (open source). Optimiza consumo de tokens proporcionando contexto compacto y relevante."
  fase: "Development v0.23.0 (preparando release v1.0 — BLUEPRINT-001 Frente 4/8 completado)"
  ultima_feature: |
    BLUEPRINT-001 Frente 4 completado (2026-05-07): Completitud de templates 1:1 data ↔ template
    + ADR-024 (criterio data-vs-as-is, handle citable). operations-template.log creado en
    distribuible + sync dogfooting. Side-finding sync context-template.yaml dogfooting (DevAI
    → Main Agent). Cierra pendiente prioritario 3.
  siguiente_milestone: |
    BLUEPRINT-001 Frente 5 (Eliminación de residualidad: 0 strings catalanes, 0 referencias
    muertas a viz/mind.md, 0 archivos huérfanos, 3 hits DevAgent extra detectados en Frente 4).
    Sesión fresca recomendada (anti-CDC). Plan en backlog/docs/plan_BLUEPRINT-001.md.

# ============================================
# PRINCIPIOS FUNDACIONALES
# ============================================
principios:
  fuente_canonica: "memsys3/PRINCIPLES.md (10 principios sistémicos, ADR-022)"
  cdc:
    nombre: "Casualidad de Contexto (CDC) — principio #1"
    definicion: |
      Lucidez agéntica generada por eventualidad del contexto de la sesión actual,
      NO por archivos canónicos. memsys3 ES la solución a CDC: garantizar lucidez
      sostenida via archivos canónicos, no fluctuante según azar de cada sesión.
    test_mental: "¿esto requiere que un agente fresco adivine, o le doy archivo canónico?"
  resumen_10:
    - "1. Anti-CDC (foundational)"
    - "2. Agnosticismo de modelo IA"
    - "3. Una sola carpeta"
    - "4. Human-in-the-loop"
    - "5. Criterio inteligente vs límites arbitrarios"
    - "6. Templates como documentación activa permanente"
    - "7. file_version inmutable salvo /actualizar-memsys3"
    - "8. Datos siempre preservados"
    - "9. Separation of Concerns"
    - "10. Restricciones de infraestructura en agents"

# ============================================
# FEATURES OPERATIVAS
# ============================================
features:
  context_agent:
    estado: "operativo"
    descripcion: "Compila contexto con criterio inteligente (5 tiers ingesta hasta ~150K tokens, máx 2000 líneas output)."
  rotacion_automatica:
    estado: "operativo"
    descripcion: "Rotación flexible 1800-2000 líneas (ADR-002) en sessions/ADRs. Lee todos los rotados (sessions_N.yaml)."
  plan_contingencia:
    estado: "operativo"
    descripcion: "Archivado a memory/history/ (no leído) cuando >150K tokens. Reduce a ~120K. Datos preservados."
  prompts:
    estado: "operativo"
    descripcion: "newSession, endSession, compile-context, deploy, actualizar, actualizar_cat, adr, backlog, github, commands, reunion, git, migrate, comprobar_alineamiento."
  documentacion_multinivel:
    estado: "operativo"
    descripcion: "4 niveles: README repo, README templates, DEVELOPMENT, UPDATE."
  sincronizacion_catalan:
    estado: "operativo"
    descripcion: "actualizar_cat.md sincroniza memsys3_templates/ español → catalán, branch catalan en GitHub."
  backlog_distribuible:
    estado: "operativo"
    descripcion: "memsys3/backlog/ con README agnóstico (355 líneas) + 50 items dogfooding. ADR-021: docs/ opcionales (informe/plan) anti-CDC."
  sistema_gestion_adrs:
    estado: "operativo"
    descripcion: "Prompt adr.md (3 operaciones: consultar, crear, actualizar). 24 ADRs activas (010-011 ausentes, ISSUE-024)."
  sistema_reuniones_colaborativas:
    estado: "operativo"
    descripcion: "reunion.md (905 líneas) workflow 6 fases formales. Reuniones en memsys3/docs/reunion/DDMMYY_N.md."
  sistema_file_version:
    estado: "operativo"
    descripcion: "ADR-017. Cada archivo infraestructura tiene versión 0.Y.Z. Solo /actualizar-memsys3 bumpa. 21 archivos."
  restricciones_infraestructura:
    estado: "operativo"
    descripcion: "MA y CA NO modifican prompts/agents/templates en proyectos destino. Excepción dogfooting documentada."
  memoria_usuario:
    estado: "operativo"
    descripcion: "memsys3/memory/memory.yaml agnóstica (ADR-020). Schema flexible (usuario/feedback/referencias). MA escribe, CA solo lee. Bridge MEMORY.md opcional Claude."
  backlog_docs_extendidos:
    estado: "operativo"
    descripcion: "ADR-021. backlog/docs/informe_*.md y plan_*.md opcionales. CA NO los lee por defecto en Tier 3. Primer caso: BLUEPRINT-001."
  principles_canonico:
    estado: "operativo"
    descripcion: "PRINCIPLES.md (ADR-022). SSoT en memsys3_templates/, copia real dogfooting, stub raíz repo. deploy.md propaga, actualizar.md Paso 6.6 sustitución diferencial."
  scaffold_canonico:
    estado: "operativo"
    descripcion: "ADR-023. Inventario canónico post-deploy. memsys3_templates/memory/full/ es fuente única de archivos vacíos (cp directo, sin heredocs)."
  visualizador:
    estado: "archivado"
    descripcion: "Memory Visualizer dashboard archivado en memsys3/docs/archivo/viz/."

