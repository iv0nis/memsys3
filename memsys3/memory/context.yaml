# ============================================
# ADRs RELEVANTES
# 24 ADRs aceptadas (010-011 ausentes — ISSUE-024 baja). Selección por impacto global.
# ============================================
adrs:
  - id: "001"
    titulo: "Criterio inteligente del Context Agent vs límites arbitrarios"
    decision: "Filosofía '¿qué debe saber CUALQUIER agent descontextualizado?'. Único límite rígido: 2000 líneas output."
    motivo: "Límites arbitrarios no escalan con complejidad del proyecto."
    impacto: "Compilación adaptativa, criterio CA prima sobre rigidez."

  - id: "002"
    titulo: "Rotación automática sessions/ADRs (flexible 1800-2000 líneas)"
    decision: "Escenario A (1800<x<2000, post-doc LITE) o B (>2000, pre-doc). CA lee todos los rotados."
    motivo: "Read tool límite 2000 líneas. Preservar histórico sin duplicar sesión actual."
    impacto: "Sistema escala infinitamente, datos nunca se pierden."

  - id: "003"
    titulo: "Plan de Contingencia con archivado >150K tokens"
    decision: "CA mueve sessions/ADRs irrelevantes a memory/history/ (NO leído). Reduce a ~120K."
    motivo: "Proyectos muy grandes saturan ingesta CA."
    impacto: "Escalabilidad ilimitada, reversible."

  - id: "004"
    titulo: "YAML para todo (incluyendo sessions)"
    decision: "Toda memoria en YAML (sessions, adr, project-status, context, templates)."
    motivo: "Consistencia + ~30% ahorro tokens vs Markdown + estructura clara para LLMs."
    impacto: "Formato uniforme de toda la documentación."

  - id: "005"
    titulo: "deploy.md como prompt (no script shell)"
    decision: "deploy.md ejecutado por Main Agent con briefing al usuario."
    motivo: "Más flexible que script automático. Permite personalización conversacional."
    impacto: "Deployment guiado e inteligente."

  - id: "006"
    titulo: "Sistema de rutas unificado memsys3/"
    decision: "Todas las rutas usan prefijo `memsys3/` (no `@memory/` ni relativas)."
    motivo: "Portabilidad y claridad entre proyectos. Notación @memsys3/ estándar."
    impacto: "Estructura uniforme de referencias en todos los prompts."

  - id: "007"
    titulo: "Separación de meta-niveles en READMEs"
    decision: "4 READMEs por audiencia: raíz repo, memsys3_templates/, docs/DEVELOPMENT, docs/UPDATE."
    motivo: "Mezclar audiencias genera confusión sobre qué leer cuándo."
    impacto: "Documentación clara por audiencia. ISSUE-025 detecta link roto pendiente fix."

  - id: "008"
    titulo: "Main-Agent NO debe proponer compile-context"
    decision: "MA solo sugiere endSession; usuario decide cuándo compilar (en NUEVA INSTANCIA limpia)."
    motivo: "Compilación en sesión cargada acumula tokens y sesga síntesis."
    impacto: "Eficiencia tokens. Validación: intento 2026-03-08 revertido."

  - id: "009"
    titulo: "Templates como documentación activa permanente + gotchas en sessions"
    decision: "memory/templates/ NO se borra post-deploy (guías permanentes). Gotchas en sessions.yaml (contextualizados temporalmente), NO en project-status."
    motivo: "MA consulta templates durante endSession. Gotchas son eventos de sesión."
    impacto: "Templates como referencia activa, gotchas trazables."

  - id: "012"
    titulo: "README como lectura directa vs duplicado en context.yaml"
    decision: "newSession.md lee README directamente. compile-context NO lo incluye en context."
    motivo: "README ES identidad actual; context ES memoria histórica. Separation of Concerns."
    impacto: "Imposible desincronización. ~95 líneas y ~1.4K tokens ahorrados."

  - id: "013"
    titulo: "Sistema de gestión de ADRs con prompt dedicado (consistencia con backlog)"
    decision: "prompt adr.md (consultar/crear/actualizar). adr.yaml permanece en memory/full/."
    motivo: "Consistencia arquitectónica con sistema backlog."
    impacto: "ADRs gestionables conversacionalmente."

  - id: "014"
    titulo: "Comandos globales auto-actualizantes con launcher pattern"
    decision: "/deploy-memsys3 y /actualizar-memsys3 clonan repo temporal y ejecutan prompt remoto. Prompt commands.md instala comandos."
    motivo: "Mantenimiento centralizado, auto-actualización transparente."
    impacto: "Onboarding 1 comando. Comandos siempre usan última versión."

  - id: "015"
    titulo: "Terminología unificada: Main Agent como nomenclatura estándar"
    decision: "'Main Agent' único nombre. NO 'Development Agent' ni 'DevAI' (deja espacio para especialistas futuros)."
    motivo: "Evitar conflicto con futuros agentes especializados (Testing Agent, Doc Agent, etc.)."
    impacto: "Consistencia terminológica. ISSUE-026 (deploy.md:3 DevAgent) pendiente Frente 5."

  - id: "016"
    titulo: "memsys3 agnóstico de modelo IA + commands como feature opcional Claude-específica"
    decision: "Jerarquía templates(agnóstico) → prompts(específico) → .claude/commands/(opcional Claude). commands NO es core."
    motivo: "Principio fundamental: portabilidad universal. Otros modelos pueden ignorar commands."
    impacto: "Documentación clara core vs opcional. Funciona en Gemini/Codex/etc."

  - id: "017"
    titulo: "Sistema file_version por archivo (versionado independiente infraestructura)"
    decision: "Cada archivo infraestructura tiene file_version 0.Y.Z (.md HTML comment, .yaml templates # version, .yaml agents campo). Solo /actualizar-memsys3 bumpa."
    motivo: "Trazabilidad fina, audit trail, hot-fixes individuales sin bump global."
    impacto: "21 archivos versionados. Habilita ADR-018."

  - id: "018"
    titulo: "Sustitución diferencial de templates de schema en actualizar.md"
    decision: "Para memory/templates/: comparar file_version upstream vs destino. Sobrescribir si upstream>destino. NO aplica a prompts/agents (personalizables)."
    motivo: "Templates schema son canónicos por contrato (no editables); prompts/agents personalizables (precedente ISSUE-018 WORKSPACE_Y)."
    impacto: "Updates limpios. Tres rutas en actualizar.md según clase de archivo."

  - id: "019"
    titulo: "Política evolución schema: deprecation contextualizada"
    decision: "upstream marca `# DEPRECATED` con motivo. Agente del proyecto evalúa contra contexto y propone al usuario (mantener/migrar/eliminar). upstream NUNCA elimina automáticamente."
    motivo: "Agnosticismo memsys3: solo el usuario y agente contextualizado conocen su proyecto."
    impacto: "Templates pueden conservar campos legacy. Encaja con modo Extendido."

  - id: "020"
    titulo: "Memoria usuario/feedback agnóstica (memory.yaml) + bridge opcional MEMORY.md"
    decision: "memsys3/memory/memory.yaml schema flexible (usuario/feedback/referencias). MA escribe append+datado, CA solo lee. MEMORY.md raíz opcional como puntero para auto-memory de Claude."
    motivo: "Auto-memory Claude rompe ADR-016 + 'una sola carpeta' + human-in-the-loop. Cierra ISSUE-021 con Opción D."
    impacto: "Lugar canónico de memoria de usuario. Bridge graceful degradation."

  - id: "021"
    titulo: "Backlog extendido con informe/plan opcionales (anti-CDC)"
    decision: "backlog/docs/informe_*.md y plan_*.md opcionales por item. SIEMPRE para BLUEPRINTs. CA NO lee docs/ por defecto Tier 3."
    motivo: "Items cortos generan CDC en items complejos cuando agente fresco los ejecuta."
    impacto: "Reduce CDC. Habilita delegación entre sesiones. Templates en memory/templates/."

  - id: "022"
    titulo: "PRINCIPLES.md como documento canónico de principios sistémicos"
    decision: "10 principios. Fuente única en memsys3_templates/PRINCIPLES.md, copia real dogfooting, stub raíz repo. Hereda ADR-017 (file_version) + ADR-018 (sustitución diferencial)."
    motivo: "Anti-CDC: agente fresco necesita archivo canónico de principios desde primera sesión."
    impacto: "Foundational para release v1.0. Cada principio enlaza ADRs que lo formalizan."

  - id: "023"
    titulo: "Scaffold completo en deploy: inventario canónico + memory/full/ fuente única"
    decision: "deploy.md Paso 2 hace cp directo desde memsys3_templates/memory/full/* (eliminados heredocs divergentes). Inventario canónico documentado."
    motivo: "Heredocs divergentes generaban CDC sobre schema vacío. Resuelve brecha leak IMPROVEMENT-008."
    impacto: |
      Una sola fuente de verdad para scaffold vacío. Matiz semántico: misma forma física, distinta
      semántica según ubicación (en templates/ es infraestructura; tras cp al destino es datos).

  - id: "024"
    titulo: "Completitud templates: criterio data-vs-as-is + operations-template.log"
    decision: |
      Criterio data-vs-as-is (handle citable): un archivo necesita template si es DATA EVOLUTIVA;
      no si es INFRAESTRUCTURA/DOC canónica versionada por /actualizar-memsys3. operations-template.log
      creado (extensión .log espejando data, no .yaml).
    motivo: "Sin nombre formal, cada futura decisión 'qué necesita template' redefine el criterio (CDC operativa)."
    impacto: "Léxico sistémico citable: 'aplicamos data-vs-as-is (ADR-024)'. Cierra pendiente prioritario 3."

