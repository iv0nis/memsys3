    tasca: "Testear deployment con consulta .gitignore en nuevo proyecto"
    detall: "Validar que PASO 8 funciona correctamente con warning @ mentions y usuario puede elegir Opción A o B"

  - prioritat: 2
    tasca: "Testear actualizar_cat.md en futuras sincronizaciones"
    detall: "Cuando haya nuevos cambios en master, validar que actualizar_cat.md sincroniza y traduce correctamente a branch catalan"

  - prioritat: 3
    tasca: "Testear actualizar.md en proyecto con estructura correcta (Escenario C)"
    detall: "Validar actualización en proyecto que solo tenga /memsys3 (no estructura antigua). Probar en CLIENT_F."

  - prioritat: 4
    tasca: "Validar compile-context.md con creación automática de README"
    detall: "Ejecutar compile-context en CLIENT_B (sin README), probar Opción A (crear automáticamente desde project-status.yaml)"

  - prioritat: 5
    tasca: "IMPROVEMENT-001 PARCIALMENTE RESUELTO - Evaluar siguiente fase"
    detall: "README ya incluido en contexto (opcional). Evaluar si agregar DEVELOPMENT.md, UPDATE.md según necesidad"

# ============================================
# BACKLOG
# Sistema de gestión de trabajo futuro
# ============================================
backlog:
  sistema: |
    Sistema de gestión de trabajo futuro estructurado con 6 tipos de items:
    - ISSUE-XXX: Problemas técnicos, bugs, tech debt
    - FEATURE-XXX: Nueva funcionalidad a implementar
    - SPEC-XXX: Especificación técnica detallada
    - BLUEPRINT-XXX: Diseño arquitectónico de alto nivel
    - IMPROVEMENT-XXX: Mejora de funcionalidad existente
    - EXPLORATION-XXX: Investigación sin solución clara

    Estados: Propuesto, Abierto, En Progreso, Bloqueado, Completado, Cancelado

