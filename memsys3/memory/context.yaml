# Context - memsys3
# Contexto compilado para AI Development Agents
# NOTA: README.md se lee directamente en newSession.md (identidad actual del proyecto)
#       context.yaml contiene solo memoria histórica (sessions, ADRs, gotchas)

metadata:
  compilado_por: "Context Agent"
  ultima_compilacion: "2026-02-03"
  version_context: "v0.11.0"

# ============================================
# PROJECT INFO
# ============================================
project:
  nombre: "memsys3"
  descripcion: "Sistema de gestión de contexto para AI Development Agents - optimiza tokens proporcionando contexto compacto y relevante"
  fase: "Development v0.11.0"
  ultima_feature: "Sistema Reuniones Colaborativas + Fix Firmas Commits: Metodología formal 6 fases para debugging multi-agente. Prompt reunion.md (905L) + docs completa (836L). Filosofía 5 principios. Fix github.md defensa 4 capas firmas Co-Authored-By. Basado reunión 030226_1.md análisis forense. Escalable 50+ reuniones. ~2.5h peso alto"
  siguiente_milestone: "Testear fix firmas commits en próximo workflow github.md completo + Validar metodología reuniones en próximo incidente crítico + Git commit/push"

# ============================================
# FEATURES OPERATIVAS
# ============================================
features:
  context_agent:
    nombre: "Context Agent"
    estado: "operativo"
    descripcion: "Agente que compila contexto completo con criterio inteligente (máx 2000 líneas)"

  rotacion_automatica:
    nombre: "Rotación Automática"
    estado: "operativo"
    descripcion: "Sistema de rotación sessions/ADRs cuando superan 1800 líneas (flexible 1800-2000)"

  plan_contingencia:
    nombre: "Plan de Contingencia"
    estado: "operativo"
    descripcion: "Archivado inteligente a history/ cuando >150K tokens"

  visualizador:
    nombre: "Memory Visualizer"
    estado: "operativo"
    descripcion: "Dashboard web para ver la 'mente' de los agentes (4 pestañas)"

  prompts_reutilizables:
    nombre: "Prompts Reutilizables"
    estado: "operativo"
    descripcion: "newSession, endSession, compile-context, mind, deploy, actualizar, actualizar_cat, adr, backlog, github, reunion - TODOS con rutas memsys3/"

  sistema_documentacion:
    nombre: "Sistema de Documentación Multi-nivel"
    estado: "operativo"
    descripcion: "4 niveles: README repo, README templates, DEVELOPMENT, UPDATE"

  sincronizacion_catalan:
    nombre: "Sistema Sincronización Versión Catalana"
    estado: "operativo"
    descripcion: "Prompt actualizar_cat.md sincroniza memsys3_templates/ español → catalán, branch catalan en GitHub"

  backlog_distribuible:
    nombre: "Sistema Backlog Distribuible"
    estado: "operativo"
    descripcion: "memsys3/backlog/ con README agnóstico (315 líneas) + 3 ejemplos ilustrativos + prompt backlog.md (3 operaciones: consultar, crear, actualizar)"

  sistema_gestion_adrs:
    nombre: "Sistema Gestión ADRs"
    estado: "operativo"
    descripcion: "Prompt adr.md (71 líneas) para gestionar ADRs conversacionalmente: consultar, crear, actualizar. Leyendas integradas (3 estados + 10 áreas)"

  comandos_globales:
    nombre: "Sistema Comandos Globales Auto-actualizantes"
    estado: "operativo"
    descripcion: "Launcher pattern: /deploy-memsys3, /actualizar-memsys3 clonan repo temp → ejecutan prompt actualizado → limpian. Prompt commands.md automatiza instalación. Mantenimiento centralizado GitHub"

  sistema_pesos_sesiones:
    nombre: "Sistema de Pesos para Sesiones"
    estado: "operativo"
    descripcion: "Clasificación sesiones: bajo (~70L), medio (~95L), alto (~140L) según impacto arquitectónico. Context Agent filtra por peso + recencia. Límites orientativos NO rígidos (ADR-001). Estrategia síntesis diferenciada: alto 90%, medio 60-70%, bajo 40-50%"

  sistema_reuniones_colaborativas:
    nombre: "Sistema Reuniones Colaborativas"
    estado: "operativo"
    descripcion: "Metodología formal debugging multi-agente. Prompt reunion.md (905L) workflow 6 fases + docs/reunion/README.md (836L). Filosofía 5 principios: transparencia radical, no culpabilización, análisis riguroso, respeto formal, compromiso concreto. Reuniones docs/reunion/DDMMYY_N.md, sessions.yaml solo referencia. Context Agent carga selectivamente. Escalable 50+ reuniones"

# ============================================
# STACK TECNOLÓGICO
# ============================================
stack:
  frontend: "HTML/CSS/JS (visualizador)"
  backend: "Python 3.x (servidor visualizador)"
  database: "Ninguno (YAML files)"
  deploy: "GitHub + clonado local"
  lenguaje_docs: "YAML + Markdown"

# ============================================
# URLS PRINCIPALES
# ============================================
urls:
  repository: "https://github.com/iv0nis/memsys3"

# ============================================
# ADRs RELEVANTES (13 de 16 totales)
# Criterio: Impacto global, arquitectónicas, no obvias, explican "por qué"
# ============================================
adrs:
  - id: "001"
    titulo: "Criterio inteligente del Context Agent vs límites arbitrarios"
    decision: "Context Agent usa criterio inteligente basándose en la pregunta: ¿Qué debe saber CUALQUIER agent descontextualizado para trabajar aquí? Límite ÚNICO: máximo 2000 líneas en context.yaml final. NO hay límites arbitrarios para ADRs, sessions, gotchas"
    motivo: "Sistemas anteriores usaban límites rígidos (máx 7 ADRs, máx 15 líneas por sesión) que no se adaptaban a la realidad del proyecto. Proyectos pequeños perdían contexto, proyectos grandes no podían expresarse adecuadamente"
    impacto: "Contexto adaptativo según necesidades del proyecto. CA decide con visión panorámica completa. Proyectos pequeños mantienen todo, proyectos grandes filtran inteligentemente. Más flexible y escalable"

  - id: "002"
    titulo: "Rotación automática de sessions/ADRs (flexible 1800-2000 líneas)"
    decision: |
      Sistema de rotación flexible con dos escenarios:

      Escenario A (1800-2000): Rotación LITE post-documentación. Documentar sesión normalmente, DESPUÉS si supera 1800: copiar sessions.yaml → sessions_N.yaml (incluye sesión actual), crear nuevo sessions.yaml VACÍO. Sesión actual SOLO en sessions_N.yaml (no duplicación).

      Escenario B (>2000): Rotación PRE-documentación. ANTES de documentar, rotar: copiar sessions.yaml → sessions_N.yaml (sin sesión actual), crear nuevo sessions.yaml vacío. Documentar sesión en sessions.yaml NUEVO. Sesión actual SOLO en sessions.yaml nuevo.

      Context Agent lee TODOS los archivos rotados hasta detectar >150K tokens.
    motivo: "Read tool tiene límite 2000 líneas. Sistema rotación mejorado flexible aprovecha espacio disponible (1800-2000) y evita duplicación de sesión actual. UPDATE 2025-12-03: Primera rotación real mostró que rotación rígida en 1800 no era eficiente"
    impacto: "Sistema escala infinitamente, no se pierden datos nunca, automático sin intervención manual. Rotación flexible más eficiente: aprovecha espacio disponible, evita duplicación, solo rota cuando REALMENTE necesario (>2000)"

  - id: "003"
    titulo: "Plan de Contingencia con archivado inteligente (>150K tokens)"
    decision: "Cuando total de full/ supera 150K tokens: CA identifica ADRs/sessions irrelevantes con criterio inteligente, los mueve a memory/history/ (que NO se lee), reduce a ~120K tokens, continúa compilación normal. Datos en history/ están preservados, recuperables si es necesario"
    motivo: "Incluso con rotación, proyectos muy grandes pueden acumular demasiados datos. Si full/ (con todos los archivos rotados) supera 150K tokens, el CA no puede procesarlo eficientemente"
    impacto: "Ahorro real de tokens (history/ NO se lee), datos preservados no perdidos, sistema escala ilimitadamente, reversible (puedes recuperar de history/)"

  - id: "004"
    titulo: "YAML para todo (incluyendo sessions)"
    decision: "Todo el sistema usa YAML: sessions.yaml (antes sessions.md), adr.yaml, project-status.yaml, context.yaml, todos los templates .yaml"
    motivo: "Sessions originalmente eran .md (Markdown). Templates y ADRs ya eran YAML. Inconsistencia de formatos dificultaba parsing y ahorro de tokens"
    impacto: "Consistencia total del sistema, ~30% ahorro tokens vs Markdown, mejor para LLMs (estructura clara), fácil parsear con js-yaml"

  - id: "006"
    titulo: "Sistema de rutas unificado memsys3/"
    decision: |
      TODAS las rutas en memsys3_templates/ deben usar el prefijo memsys3/:
      - memsys3/memory/context.yaml
      - memsys3/agents/main-agent.yaml
      - memsys3/prompts/compile-context.md

      Razón: Durante deployment, memsys3_templates/ se copia a la raíz del proyecto como memsys3/, por lo tanto todas las rutas internas funcionan correctamente.
    motivo: "Durante desarrollo inicial se creó confusión sobre las rutas en el sistema. Los prompts referencian archivos usando rutas relativas, pero cuando memsys3 se despliega en diferentes proyectos, esas rutas deben ser consistentes. Inicialmente había inconsistencias entre memory/, @memory/, sin prefijo"
    impacto: "Claridad total: siempre se sabe que es de memsys3. Portabilidad: funciona en cualquier proyecto. Actualizable: fácil saber qué archivos actualizar. Sin conflictos con carpetas del proyecto"

  - id: "007"
    titulo: "Separación de meta-niveles en READMEs"
    decision: |
      Crear READMEs separados por meta-nivel:
      1. README.md (raíz repositorio): Meta-nivel REPOSITORIO PÚBLICO. Audiencia: Quien descubre memsys3 en GitHub
      2. memsys3_templates/README.md: Meta-nivel SISTEMA DESPLEGADO. Audiencia: Agents y developers DENTRO de un proyecto. NO menciona templates, deployment, ni meta-información
      3. docs/DEVELOPMENT.md: Meta-nivel DESARROLLO DE MEMSYS3. Audiencia: Contribuidores/desarrolladores de memsys3
      4. docs/UPDATE.md: Meta-nivel ACTUALIZACIÓN. Audiencia: Quien ya tiene memsys3 y quiere actualizar
    motivo: "Inicialmente había un solo README que mezclaba: explicación de qué es memsys3, instrucciones de uso del sistema, información de templates y deployment, dog-fooding del propio memsys3. Esto generaba confusión porque no estaba claro el 'nivel' de cada información"
    impacto: "Claridad total de meta-niveles. Cada README tiene audiencia específica. Agents leen README agnóstico sin confusión. Developers tienen guía clara de contribución"

  - id: "008"
    titulo: "Main-Agent NO debe proponer compile-context"
    decision: "Main-Agent tiene restricción explícita en agents/main-agent.yaml: NO proponer ejecutar @memsys3/prompts/compile-context.md. Solo sugerir endSession al finalizar sesión. El user decide cuándo compilar (en nueva instancia limpia). compile-context.md debe ejecutarse en una NUEVA INSTANCIA sin tokens acumulados"
    motivo: "El Main-Agent trabaja durante sesiones acumulando tokens. compile-context.md requiere leer TODOS los archivos de memory/full/ (puede ser >50K tokens). Si el Main-Agent propone ejecutar compile-context, acumula tokens de la sesión actual + tokens de leer todo memory/full/ + tokens de generar context.yaml. Esto es ineficiente y puede superar límites de contexto"
    impacto: "Eficiencia de tokens optimizada. Main-Agent se enfoca en desarrollo. Context Agent trabaja con instancia limpia. User controla cuándo compilar"

  - id: "009"
    titulo: "Templates como documentación activa permanente + gotchas en sessions"
    decision: |
      1. memory/templates/ NO se borran, son guías permanentes. Main-Agent consulta templates/ durante endSession.md
      2. Gotchas documentados en sessions.yaml donde aparecen. Context-Agent extrae gotchas de TODAS las sesiones, usa criterio inteligente para seleccionar top críticos. Criterios: criticidad + recencia + impacto
      3. project-status.yaml NO contiene gotchas (solo info general del proyecto)
      4. Workflow deployment: Clone temporal → copiar TODO (incluido memory/templates/) → briefing → borrar temp
    motivo: "Durante validación deployment surgió confusión: templates dentro de templates (memsys3_templates/ es carpeta-template completa, pero dentro tiene memory/templates/). Al revisar contenido se descubrió que contiene: estructura exacta de ADRs, sessions, project-status; instrucciones de uso; ejemplos de buenas prácticas; especificaciones que endSession.md no detalla. Gotchas surgen DURANTE sesiones de trabajo, no son características estáticas del proyecto"
    impacto: "Deployment más simple: copiar todo, no borrar templates/. Main-Agent siempre tiene referencia de cómo documentar correctamente. Gotchas contextualizados (cuándo aparecieron, en qué sesión). CA tiene flexibilidad para priorizar gotchas según criterio. project-status.yaml más limpio (solo info general). ~15KB extra en proyecto (4 templates, aceptable)"

  - id: "012"
    titulo: "README como lectura directa vs duplicado en context.yaml"
    decision: "README.md se lee DIRECTAMENTE en newSession.md, NO se incluye en context.yaml. ELIMINADO PASO 7 (Análisis profundo README) de compile-context.md. ELIMINADA sección readme_proyecto: en context-template.yaml"
    motivo: "Durante deployment en otros proyectos se detectó que README.md cambia frecuentemente (versiones, features nuevas, URLs, stack tecnológico), pero context.yaml solo se actualiza cuando se ejecuta compile-context.md. README sintetizado en context.yaml quedaba desactualizado. Requería re-ejecutar compile-context por cambios triviales en README. Observación arquitectónica: README.md = 'Quién soy ahora' (identidad actual del proyecto), context.yaml = 'Qué he aprendido' (memoria histórica: sessions, ADRs, gotchas). Estos son dos conceptos diferentes que no deberían mezclarse"
    impacto: "Imposible desincronización: README siempre es la versión actual. No duplicación: una sola fuente de verdad. Menos mantenimiento: no re-compilar por cambios en README. Overhead trivial: 1 Read adicional (~200-400 líneas) es irrelevante. Coherencia conceptual: README = identidad, context = memoria. compile-context más enfocado: solo memoria histórica. ~95 líneas menos en context.yaml (~1.4K tokens ahorrados)"

  - id: "013"
    titulo: "Sistema de gestión de ADRs con prompt dedicado (consistencia arquitectónica)"
    decision: "Crear prompt memsys3/prompts/adr.md para gestionar ADRs con: 3 Operaciones (Consultar ADRs, Crear Nuevo ADR, Actualizar ADR Existente), Leyendas integradas (Estados: accepted/deprecated/superseded_by, Áreas: 10 categorías). adr.yaml permanece en memory/full/ (NO moverlo a subcarpeta). Documentación integrada en prompt (NO README separado)"
    motivo: "El sistema backlog tiene: memsys3/backlog/README.md + memsys3/prompts/backlog.md. El sistema ADRs tenía: memsys3/memory/full/adr.yaml + memsys3/memory/templates/adr-template.yaml, pero sin prompt dedicado para gestionar ADRs ni documentación de estados/áreas disponibles. Usuario observó inconsistencia arquitectónica: backlog tiene interfaz conversacional para gestión, ADRs no"
    impacto: "Consistencia arquitectónica: backlog y ADRs tienen misma interfaz gestión. Usabilidad mejorada: usuarios pueden gestionar ADRs conversacionalmente. Documentación accesible: estados/áreas explicadas en prompt. Bajo riesgo: cambio minimalista, no toca estructura datos"

  - id: "014"
    titulo: "Sistema de comandos globales auto-actualizantes con launcher pattern"
    decision: |
      Launcher Pattern para comandos globales: Los comandos globales (/deploy-memsys3, /actualizar-memsys3) NO contienen lógica real. Son "launchers" que:
      1. Clonan repositorio temporalmente: git clone https://github.com/iv0nis/memsys3 [temp_dir]
      2. Ejecutan prompt del repo clonado: @[temp_dir]/memsys3_templates/prompts/[prompt].md
      3. Limpian temporal: rm -rf [temp_dir]

      Prompt commands.md para instalación automática: Verifica qué comandos globales existen en ~/.claude/commands/, detecta comandos obsoletos o faltantes, pregunta al usuario si sobrescribir, crea/actualiza todos los comandos globales usando cat heredoc + $HOME, verifica instalación exitosa
    motivo: "memsys3 necesita distribuirse en equipos de desarrollo. Dos problemas: (1) Evolución de prompts: deploy.md y actualizar.md cambian frecuentemente con mejoras. Si los comandos globales contienen lógica completa, cada miembro del equipo debe actualizar manualmente su ~/.claude/commands/ cada vez. (2) Onboarding de nuevos miembros: Cada miembro debe crear manualmente los comandos globales copiando contenido. Proceso propenso a errores"
    impacto: "Mantenimiento centralizado: solo actualizar prompts en repo GitHub. Auto-actualización transparente: comandos siempre usan última versión. Consistencia garantizada: todo el equipo usa misma versión. Onboarding 1 comando: @memsys3/prompts/commands.md → listo. Detección comandos obsoletos: commands.md verifica y actualiza. Solo requiere git (ya requisito de memsys3). Clone temporal agrega 2-3 segundos por ejecución (aceptable)"

  - id: "015"
    titulo: "Terminología unificada: Main Agent como nomenclatura estándar"
    decision: "Adoptar 'Main Agent' como terminología estándar ÚNICA para el agente que utiliza memsys3. Archivos/lugares a actualizar: main-agent.yaml línea 3, README.md, compile-context.md, todos los prompts que referencien 'Development Agent'"
    motivo: "Durante revisión del sistema se detectó inconsistencia terminológica para referirse al agente que utiliza memsys3: 'Main Agent', 'Development Agent', 'DevAI'. Tres términos diferentes para el mismo concepto generan confusión. Si existiera un agente especialista en desarrollo futuro, se llamaría 'Development Agent' o similar, generando conflicto con el uso actual del término"
    impacto: "Terminología consistente en todo el sistema. Espacio conceptual claro para agentes especializados futuros. Nombre refleja su rol: agente principal del proyecto. Evita conflictos terminológicos futuros. Más fácil explicar el sistema (Main Agent usa contexto, Context Agent compila)"

  - id: "016"
    titulo: "memsys3 agnóstico de modelo de IA + Commands como feature opcional Claude-específica"
    decision: |
      Principio fundamental: memsys3 es agnóstico de modelo de IA.

      Arquitectura de fuente de verdad:
      1. memsys3_templates/prompts/ = AGNÓSTICOS (producto final distribuible, funcionan en cualquier modelo)
      2. memsys3/prompts/ = ESPECÍFICOS del proyecto (pueden adaptarse/personalizarse)
      3. .claude/commands/ = COMANDOS LOCALES (workaround opcional Claude-específico)

      Decisiones concretas: Commands NO es parte del core de memsys3. Commands es workaround opcional específico de Claude Code. La documentación debe dejar MUY CLARO que commands es OPCIONAL. Deployment/actualización incluye commands.md (es un prompt válido), pero documentado como feature opcional. Usuarios de Gemini, Codex, u otros modelos pueden IGNORAR completamente los commands
    motivo: "Durante investigación del bug ISSUE-005 (archivos faltantes en actualizar.md), surgió discusión sobre la naturaleza de los comandos locales (.claude/commands/). memsys3 se diseñó para funcionar con CUALQUIER modelo de IA (Claude, Gemini, Codex, etc.). Commands (.claude/commands/) es una feature ESPECÍFICA de Claude Code. Existe confusión sobre si commands es parte del core de memsys3 o un workaround opcional. Contexto adicional: Commands sirve como workaround para limitación de Claude Code con .gitignore. Si excluyes memsys3/ en .gitignore, @ mentions dejan de funcionar. Con commands locales (/adr, /backlog) funcionan aunque memsys3/ esté ignorado"
    impacto: "memsys3 mantiene su principio fundamental: agnóstico de modelo de IA. Usuarios de Gemini, Codex, otros modelos pueden usar memsys3 sin confusión. Usuarios Claude tienen workaround útil para .gitignore (opcional pero disponible). Documentación clara sobre qué es core vs qué es específico de herramienta. Jerarquía de fuente de verdad bien definida: templates → prompts → commands. Sistema escalable: si Gemini implementa algo similar, podemos documentarlo como opcional también"

# ============================================
# SESIONES RECIENTES (5 sesiones peso ALTO, 2 sesiones peso MEDIO)
# Estrategia: ALTO ~90%, MEDIO ~60-70%, BAJO omitidos (criterio ADR-001)
# ============================================
sesiones:
  - id: "2026-02-03"
    titulo: "Sistema Reuniones Colaborativas + Fix Firmas Commits (Defensa en Profundidad)"
    peso: "alto"
    que_hizo:
      - "Implementado sistema completo Reuniones Colaborativas: metodología formal debugging multi-agente"
      - "Prompt reunion.md ejecutable (905L): workflow 6 fases estructuradas (Presentación → Respuesta Inicial → Respuesta Detallada → Análisis Profundo → Implementación → Cierre Formal)"
      - "Documentación completa docs/reunion/README.md (836L): filosofía 5 principios fundamentales, anatomía reunión, ejemplos reales"
      - "Fix github.md implementado: defensa en profundidad 4 capas contra firmas Co-Authored-By (hábito arraigado detectado en reunión 030226_1.md)"
      - "Sincronización completa: memsys3_templates/ (producto final) + memsys3/ (dog-fooding)"
      - "Filosofía: transparencia radical + no culpabilización + análisis riguroso + respeto formal + compromiso concreto"
    decisions:
      - "Sistema Reuniones Colaborativas para debugging multi-agente: Incidentes críticos requieren análisis forense con dos perspectivas (investigador + investigado). Documentación unilateral en sessions.yaml es insuficiente para problemas complejos con patrones recurrentes. Formato formal garantiza trazabilidad completa y mejora sistémica"
      - "Defensa en profundidad 4 capas para prevención firmas commits: Reunión colaborativa reveló que hábito arraigado de añadir 'Co-Authored-By: Claude' requiere múltiples capas de prevención. 1 advertencia insuficiente. Defensa multi-capa ataca en 4 momentos críticos: inicio, commit version, tag, verificación post-push"
      - "Ubicación docs/reunion/ para reuniones (vs memory/full/): Reuniones son documentos largos (300-800 líneas). Incluirlas en memory/full/ sessions.yaml explota límites rápidamente. docs/reunion/ separado permite archivos independientes, sessions.yaml solo referencia (NO duplica), Context Agent carga selectivamente, escalable 50+ reuniones"
    gotchas:
      - "Reuniones largas (300-800L) pueden explotar límites si se duplican en sessions.yaml. Principio: reunión en docs/reunion/DDMMYY_N.md (fuente verdad), sessions.yaml solo referencia + síntesis. NO duplicar contenido completo"
      - "1 advertencia insuficiente para prevenir comportamientos arraigados en training data (firmas Co-Authored-By). Defensa en profundidad multi-capa: atacar hábito en múltiples momentos críticos. Ejemplo: github.md 4 capas (warning prominente + recordatorio commit + recordatorio tag + verificación grep). Margen error esperado: 70% → 5%"

  - id: "2025-02-02"
    titulo: "FEATURE-006: Sistema de Pesos para Sesiones (bajo/medio/alto)"
    peso: "alto"
    que_hizo:
      - "Implementado sistema completo de pesos para sesiones: bajo (~70), medio (~95), alto (~140 líneas)"
      - "Modificados 11 archivos: 5 templates (producto final) + 5 dog-fooding (sincronizados) + 1 testing"
      - "PASO 2.5 nuevo en endSession.md: 'Evaluar Peso de la Sesión' con tabla de criterios clara"
      - "Estrategia de síntesis diferenciada en compile-context.md: Context Agent filtra por peso + recencia"
      - "Límites orientativos por peso en context-agent.yaml: alto (35 líneas), medio (20), bajo (8)"
      - "100% retrocompatible: sesiones sin campo peso asumen 'medio' por defecto"
      - "Sesiones existentes migradas: 2025-01-30 y 2025-12-30 marcadas como peso 'alto'"
      - "Filosofía preservada: pesos son orientativos NO rígidos (alineado ADR-001)"
    decisions:
      - "Sistema de 3 pesos (bajo/medio/alto) en lugar de 5 o escala numérica: Minimalismo y claridad. 3 categorías intuitivas y suficientes"
      - "Pesos orientativos (~70, ~95, ~140 líneas) NO rígidos: Preservar filosofía ADR-001 (criterio inteligente vs límites arbitrarios)"
      - "PASO 2.5 en endSession.md (no 1.5): Main Agent necesita primero entender QUÉ hizo (paso 2) antes de evaluar importancia"
      - "Retrocompatibilidad asumiendo peso 'medio' por defecto: Proyectos existentes deben funcionar sin cambios"
      - "Context Agent puede IGNORAR peso si detecta inconsistencia flagrante: CA tiene visión panorámica completa, pesos son sugerencias no órdenes"

  - id: "2025-01-30"
    titulo: "ISSUE-007: Fix crítico sobreescritura sessions.yaml + Reunión colaborativa Taller Colomer"
    peso: "alto"
    que_hizo:
      - "Bug crítico reportado: Taller Colomer perdió 23 sesiones por sobreescritura de sessions.yaml"
      - "Reunión colaborativa debugging con agente Taller Colomer (archivo reunión: tallersColomer/reunion/300126_1.md)"
      - "Análisis forense exhaustivo: causa raíz identificada (endSession.md PASO 4.A ambiguo sobre Write vs Edit tool)"
      - "Fix minimalista implementado: Edit tool explícito + warning en endSession.md (mejora margen error 40-50% → 5-10%)"
