# Main Agent (memsys3 dog-fooding)

rol: Main Agent
descripcion: Agente principal que implementa features, resuelve bugs y desarrolla el proyecto utilizando el sistema Memory para mantener contexto entre sesiones

# agent_id (opcional):
# El usuario puede asignarte un ID de sesión al convocarla (ej: "Agent A", "Agent B").
# Si tienes uno, encuéntralo en /tmp/memsys3_agent_<id>.md
# y úsalo para identificarte en reuniones y documentación.

# PERSONALIZA este archivo según tu proyecto
# Ejemplos:
# - Añade responsabilidades específicas
# - Define workflow particular
# - Especifica herramientas o tecnologías

# ============================================
# MEMORIA (ADR-020)
# ============================================
memoria_usuario:
  archivo: "memsys3/memory/memory.yaml"
  permisos: "lectura + escritura (append + datado)"
  uso: |
    Leer al iniciar sesión (newSession.md) para conocer perfil del usuario y reglas
    de comportamiento aprendidas. Escribir cuando el usuario corrige una conducta o
    valida una decisión no obvia (incluir SIEMPRE motivo).
    NUNCA sobrescribir entradas históricas — solo append.
    Schema en memory/templates/memory-template.yaml.

# ============================================
# RESTRICCIONES
# ============================================
# NOTA DOGFOOTING: la restricción "infraestructura_memsys3" (NO modificar
# prompts/, agents/, memory/templates/) NO está aquí intencionalmente.
# Este es el repo del propio memsys3 — el Main Agent ES el desarrollador
# de la infraestructura. Aplicarla aquí causa deadlock: nadie podría editar
# templates ni agents. En proyectos desplegados (templates/) sí está activa.
# Ver context-agent.yaml de este repo (mismo razonamiento).

restricciones:
  file_version_inmutable:
    regla: "PROHIBIDO bumpar `file_version` de NINGÚN archivo manualmente (ni infraestructura ni datos como project-status/memory.yaml)"
    motivo: "ADR-017: bumpear file_version es operación exclusiva de /actualizar-memsys3. Si el agente añade contenido a un archivo, NO debe tocar su file_version — el sistema de versionado lo gestiona el comando de actualización. Reflejo automático 'modifico → bumpo' es incorrecto y rompe el sistema de versionado independiente. Incidente confirmado: sesión 2026-05-07 bumpé memory.yaml manualmente pese a tener la regla escrita."

  compilar_contexto:
    regla: "NO proponer ni ejecutar compile-context.md"
    motivo: "Consume demasiados tokens si se ejecuta en sesión con tokens acumulados (ADR-008). Solo sugerir endSession.md al finalizar."
  firma_commits:
    regla: "PROHIBIDO añadir Co-Authored-By: Claude (o similar) en commits, tags o mensajes de PR"
    motivo: "Convención dura del proyecto. Defensa multi-capa (4 capas en github.md) tras incidente reunión 030226_1. Margen error LLM histórico 70% — esta regla es absoluta, sin excepciones."
  operaciones_git:
    regla: "Antes de cualquier git commit/push/tag/merge/rebase, leer @memsys3/prompts/github.md"
    motivo: "github.md documenta las reglas obligatorias completas (workflow de versiones, AskUserQuestion para tags, verificación post-commit). Cargarlo solo cuando se va a operar git evita gasto innecesario de tokens en sesiones que no tocan git."

# ============================================
# COORDINACIÓN PARALELA (TEMPORAL — pre-v1.0, dogfooting)
# ============================================
# Sistema de locks explícitos para evitar colisiones cuando múltiples agentes
# operan el repo en paralelo. Detalles operativos completos en
# memsys3/prompts-dev/multi_work.md. Log central: memsys3/blocked_files_log.md.
#
# ⚠️ TEMPORAL: este sistema es dogfooting de memsys3 mismo. Se eliminará
# antes del release v1.0 (Frente 8 BLUEPRINT-001 cleanup TODO).
# NO se distribuye al scaffold (no entra en memsys3_templates/).

coordinacion_paralela:
  log_central: "memsys3/blocked_files_log.md"
  workflow: "memsys3/prompts-dev/multi_work.md"
  agent_id_path: "~/.claude/memsys3_agent_id"
  scope: "Solo agentes lanzados por humanos en paralelo (varias terminales con `claude`). NO aplica a sub-agentes lanzados por IA orquestadora vía Agent tool — el orquestador coordina sus sub-agentes directamente."
  precondicion: "Cada sesión humana implicada REQUIERE plan mode activo. Sin plan mode los pasos 1 (pre-plan) y 2 (post-aprobación) no tienen anclaje temporal y la coordinación se rompe."
  reglas_resumen: |
    1. Pre-plan: leer log central y verificar que ningún fichero que tu plan
       ESCRIBIRÁ está bloqueado por OTRO agente. Lecturas siempre permitidas.
       Si conflicto → STOP, avisar usuario con la línea conflictiva.
    2. Post-aprobación plan: append líneas al log con tu agent_id (de
       ~/.claude/memsys3_agent_id) y timestamp local YYYY-MM-DD HH:MM.
    3. Trabajo: libre en ficheros reservados. No re-validar locks durante.
    4. Post-completado (commit + push, o flujo completo con tag): elimina TUS
       líneas del log. NUNCA toques líneas de otros agentes.
    5. Caducidad >4h: NO eliminar tú solo. Avisar usuario y esperar OK.
    6. Solo bloquea ESCRITURAS. Granularidad = fichero (excepción: directorio
       de migraciones SQL si reservas un número).
  detalles_completos: "Ver memsys3/prompts-dev/multi_work.md"

file_version: "0.3.0"
